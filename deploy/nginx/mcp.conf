# AMOSKYS MCP Server — nginx reverse proxy
# Include this in the main nginx.conf server block:
#   include /etc/nginx/conf.d/amoskys-mcp.conf;

# MCP SSE endpoint (separate upstream for long-lived connections)
upstream amoskys_mcp {
    server 127.0.0.1:8444;
    keepalive 32;
}

server {
    listen 8444 ssl;
    server_name ops.amoskys.com;

    # TLS (reuse ops certs)
    ssl_certificate     /etc/ssl/certs/amoskys-ops.pem;
    ssl_certificate_key /etc/ssl/private/amoskys-ops.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # SSE-specific settings — these connections live forever
    proxy_read_timeout    86400;
    proxy_send_timeout    86400;
    proxy_connect_timeout 30;
    proxy_buffering       off;
    proxy_cache           off;

    # SSE endpoint
    location /sse {
        proxy_pass http://amoskys_mcp;
        proxy_http_version 1.1;
        proxy_set_header Connection '';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Critical for SSE
        chunked_transfer_encoding off;
        proxy_buffering off;
        proxy_cache off;
    }

    # MCP message endpoint
    location /messages {
        proxy_pass http://amoskys_mcp;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Health check
    location /health {
        proxy_pass http://amoskys_mcp;
    }

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=mcp:10m rate=30r/m;
    limit_req zone=mcp burst=10 nodelay;
}

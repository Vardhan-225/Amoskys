probe_id: dylib_injection
agent: proc
version: "1.0.0"
mitre_techniques:
  - id: T1547
    name: "Boot or Logon Autostart Execution"
  - id: T1574.006
    name: "Hijack Execution Flow: Dynamic Linker Hijacking"
mitre_tactic: persistence
intent: >
  Detect DYLD_INSERT_LIBRARIES abuse on macOS. This environment variable
  forces the dynamic linker to pre-load a specified dylib into every process,
  enabling code injection, keychain hooking, and API interception. Any process
  with this variable set is extremely suspicious — legitimate apps do not
  require it in production.
required_inputs:
  - source: ps_eww
    fields: [pid, env_DYLD_INSERT_LIBRARIES]
platforms: [darwin]
correlation_group: process_injection
severity_policy:
  dylib_injection_detected: CRITICAL
confidence_policy:
  dylib_injection_detected: 0.95
thresholds:
  scan_interval_seconds: 30.0
testing_approach: subprocess_mock
known_evasions:
  - id: SIP_protection
    title: "System Integrity Protection blocks DYLD_INSERT_LIBRARIES on SIP-protected binaries"
    description: >
      On macOS with SIP enabled, DYLD_INSERT_LIBRARIES is silently ignored
      for SIP-protected system binaries. The probe fires on the env var
      presence regardless of whether injection succeeded.
    status: CAUGHT
    note: "Probe detects intent, not success"
  - id: environment_cleared_before_exec
    title: "Attacker sets var in parent, clears before child exec"
    description: >
      If the malicious env var is cleared in the process's own env before
      ps eww reads it, detection is missed. Short-lived presence window.
    status: EVADES
    reason: "Polling-based detection has timing window"

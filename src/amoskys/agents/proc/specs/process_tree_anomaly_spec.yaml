probe_id: process_tree_anomaly
agent: proc
version: "1.0.0"
mitre_techniques:
  - id: T1055
    name: "Process Injection"
  - id: T1059
    name: "Command and Scripting Interpreter"
mitre_tactic: defense_evasion
intent: >
  Detect unexpected parent-child process relationships that indicate malicious
  document exploitation or code injection. Classic patterns: Officeâ†’PowerShell,
  Chromeâ†’cmd, PDF readerâ†’bash, svchostâ†’PowerShell. These relationships are
  strongly anomalous in production environments.
required_inputs:
  - source: psutil.process_iter
    fields: [name, exe, ppid]
  - source: psutil.Process.parent
    fields: [name]
correlation_group: execution
severity_policy:
  suspicious_process_tree: HIGH
confidence_policy:
  suspicious_process_tree: 0.85
thresholds: {}
testing_approach: psutil_mock
known_evasions:
  - id: grandparent_chain
    title: "Word spawns cmd spawns PowerShell (two hops)"
    description: >
      Probe checks direct parent only (ppid). If Wordâ†’cmdâ†’PowerShell, the
      probe sees cmdâ†’PowerShell which is in the suspicious tree (cmd is a
      parent of powershell in SUSPICIOUS_TREES). Still caught.
    status: CAUGHT
  - id: new_parent_name
    title: "Attacker uses unknown LOLBin as parent: 'msbuildâ†’cmd'"
    description: >
      If the parent isn't in SUSPICIOUS_TREES as a key, the relationship
      is not flagged. The dictionary must be kept updated.
    status: EVADES
    reason: "Fixed dictionary; new parent names not yet added"

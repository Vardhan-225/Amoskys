probe_id: code_signing
agent: proc
version: "1.0.0"
mitre_techniques:
  - id: T1036
    name: "Masquerading"
  - id: T1070.005
    name: "Indicator Removal: Network Share Connection Removal"
mitre_tactic: defense_evasion
intent: >
  Verify code signatures on critical macOS system binaries (sshd, securityd,
  sudo, bash, python). An invalid or missing signature on these binaries
  indicates tampering, trojanization, or binary replacement. Uses the macOS
  codesign tool with --verify --deep flags.
required_inputs:
  - source: codesign_verify
    fields: [binary_path, signature_valid]
platforms: [darwin]
correlation_group: defense_evasion
severity_policy:
  code_signature_invalid: HIGH
confidence_policy:
  code_signature_invalid: 0.90
thresholds:
  scan_interval_seconds: 300.0
  critical_binaries:
    - /usr/sbin/sshd
    - /usr/libexec/securityd
    - /usr/bin/sudo
    - /bin/bash
    - /bin/sh
    - /usr/bin/python3
testing_approach: subprocess_mock
known_evasions:
  - id: resigned_malicious_binary
    title: "Attacker resigns trojanized binary with stolen certificate"
    description: >
      If the attacker has a valid Apple Developer certificate, they can
      re-sign a modified binary. codesign --verify passes. The probe does
      not check certificate revocation lists (CRL) in real-time.
    status: EVADES
    reason: "No CRL check; trusts certificate validity only"
  - id: non_critical_binary
    title: "Attacker replaces /usr/bin/python2 (not in critical_binaries)"
    description: >
      The probe only checks a fixed list of critical binaries. Replacing
      a binary not on the list is undetected by this probe.
    status: EVADES
    reason: "Fixed critical binary list; must be maintained"

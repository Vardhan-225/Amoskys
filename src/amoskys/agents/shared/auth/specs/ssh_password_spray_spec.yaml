probe_id: ssh_password_spray
agent: auth
version: "1.0.0"
mitre_techniques:
  - id: T1110.003
    name: "Brute Force: Password Spraying"
mitre_tactic: credential_access
intent: >
  Detect password spraying — an attacker using one or few passwords across
  many usernames from the same source IP. Unlike brute force (many passwords,
  one user), spraying evades per-account lockout policies. Fires when a single
  IP attempts SSH login against >= 10 distinct usernames within 5 minutes.
required_inputs:
  - event_type: SSH_LOGIN
    status: FAILURE
    required_fields: [source_ip, username, timestamp_ns]
correlation_group: credential_access
severity_policy:
  ssh_password_spray_detected: HIGH
confidence_policy:
  ssh_password_spray_detected: 0.85
thresholds:
  password_spray_user_threshold: 10
  password_spray_window_seconds: 300
known_evasions:
  - id: multi_ip_rotation
    title: "Attacker rotates across 10 IPs, each trying 1 user"
    description: >
      Spray distributed across many source IPs — each IP stays under the
      per-IP user threshold. Probe aggregates per source_ip only.
    status: EVADES
    reason: "No cross-IP aggregation; would require network-level correlation"
  - id: slow_spray
    title: "1 user/IP/minute over 20 minutes"
    description: >
      Attacker tries 1 user per minute, 10 users over 10 minutes — exceeds
      300s window. The 5-minute window catches bursts; slow sprays across
      multiple windows evade if spread past the window boundary.
    status: PARTIAL
    note: "Fires if 10 users hit within any 300s window"

probe_id: ssh_geo_impossible_travel
agent: auth
version: "1.0.0"
mitre_techniques:
  - id: T1078
    name: "Valid Accounts"
mitre_tactic: initial_access
intent: >
  Detect physically impossible login sequences — a user logging in from two
  geographic locations faster than any commercial transport allows. Fires when
  two consecutive successful logins from the same username are > 1000 km apart
  and < 1 hour apart (implying > 1000 km/h travel speed).
required_inputs:
  - event_type: SSH_LOGIN
    status: SUCCESS
    required_fields: [username, timestamp_ns, src_latitude, src_longitude]
correlation_group: account_compromise
severity_policy:
  impossible_travel_detected: CRITICAL
confidence_policy:
  impossible_travel_detected: 0.88
thresholds:
  geo_min_distance_km: 1000
  geo_min_time_seconds: 3600
  geo_max_speed_kmh: 1000
known_evasions:
  - id: no_geo_enrichment
    title: "Auth events lack geolocation (src_latitude/longitude absent)"
    description: >
      If the agent's GeoIP enrichment is unavailable, the fields are null
      and the probe cannot compute distances. Probe goes DEGRADED.
    status: EVADES
    reason: "Depends on GeoIP enrichment pipeline"
  - id: vpn_exit_node
    title: "Attacker uses VPN exit node near victim's last location"
    description: >
      Attacker connects via VPN in the same city as the victim's last login,
      producing a plausible travel distance and speed.
    status: EVADES
    reason: "GeoIP cannot distinguish VPN exit nodes from physical location"

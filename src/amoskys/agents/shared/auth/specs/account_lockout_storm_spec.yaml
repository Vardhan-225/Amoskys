probe_id: account_lockout_storm
agent: auth
version: "1.0.0"
mitre_techniques:
  - id: T1110
    name: "Brute Force"
  - id: T1499
    name: "Endpoint Denial of Service"
mitre_tactic: credential_access
intent: >
  Detect mass account lockout events that indicate large-scale credential
  stuffing or brute force attacks causing collateral disruption. Also detects
  when a single source IP is responsible for multiple lockouts, indicating
  a targeted attack. Fires when >= 5 accounts lock out within 5 minutes.
required_inputs:
  - event_type: ACCOUNT_LOCKED
    required_fields: [username, timestamp_ns]
correlation_group: credential_access
severity_policy:
  account_lockout_storm: HIGH
  lockout_storm_source: HIGH
confidence_policy:
  account_lockout_storm: 0.80
  lockout_storm_source: 0.85
thresholds:
  lockout_storm_threshold: 5
  lockout_storm_window_seconds: 300
  lockout_per_ip_threshold: 3
known_evasions:
  - id: one_lockout_per_account_slow
    title: "Lockout 4 accounts over 10 minutes"
    description: >
      Attacker locks out accounts slowly, keeping count below 5 in any
      300s window. The threshold of 5 accounts/5min means a careful attacker
      can lock out many accounts undetected if spreading the timing.
    status: EVADES
    reason: "4 lockouts in window stays below threshold of 5"
  - id: no_lockout_policy
    title: "System has no account lockout policy configured"
    description: >
      On systems without account lockout enabled, ACCOUNT_LOCKED events are
      never emitted. The probe has no data to work with.
    status: EVADES
    reason: "Depends on account lockout policy being enabled"

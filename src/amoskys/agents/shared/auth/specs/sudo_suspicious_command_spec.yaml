probe_id: sudo_suspicious_command
agent: auth
version: "1.0.0"
mitre_techniques:
  - id: T1548
    name: "Abuse Elevation Control Mechanism"
  - id: T1059
    name: "Command and Scripting Interpreter"
  - id: T1547
    name: "Boot or Logon Autostart Execution"
mitre_tactic: privilege_escalation
intent: >
  Detect dangerous sudo commands that indicate post-exploitation: remote code
  execution via curl|sudo bash, sudoers backdoor via tee/echo, file system
  destruction (rm -rf /), disk wipe (dd), setuid backdoors (chmod +s), and
  shell spawning. These are the canonical "attacker got sudo" actions.
required_inputs:
  - event_type: SUDO_EXEC
    status: SUCCESS
    required_fields: [username, command, timestamp_ns]
correlation_group: privilege_escalation
severity_policy:
  sudo_suspicious_download_execute: CRITICAL
  sudo_suspicious_sudoers_backdoor: CRITICAL
  sudo_suspicious_destructive: CRITICAL
  sudo_suspicious_setuid_chmod: CRITICAL
  sudo_suspicious_root_chown: HIGH
  sudo_suspicious_shell_spawn: HIGH
  sudo_suspicious_interpreter_exec: HIGH
confidence_policy:
  sudo_suspicious_command: 0.88
thresholds: {}
known_evasions:
  - id: base64_obfuscation
    title: "sudo bash -c 'echo <b64> | base64 -d | bash'"
    description: >
      The regex patterns check for 'bash', 'sh', curl/wget patterns. A
      base64-obfuscated command where the outer call is just 'sudo bash -c'
      matches shell_spawn (HIGH) but may not match download_execute (CRITICAL).
    status: PARTIAL
    catch_event: sudo_suspicious_shell_spawn
    catch_severity: HIGH
  - id: env_variable_trick
    title: "sudo EVIL_CMD='curl|bash' sh -c '$EVIL_CMD'"
    description: >
      The actual dangerous command is in an environment variable; the visible
      command is just 'sh -c'. Fires shell_spawn but not download_execute.
    status: PARTIAL
    catch_event: sudo_suspicious_shell_spawn

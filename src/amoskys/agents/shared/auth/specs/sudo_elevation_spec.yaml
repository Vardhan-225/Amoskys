probe_id: sudo_elevation
agent: auth
version: "1.0.0"
mitre_techniques:
  - id: T1548.003
    name: "Abuse Elevation Control Mechanism: Sudo and Sudo Caching"
mitre_tactic: privilege_escalation
intent: >
  Monitor sudo privilege escalation for anomalies: first-time sudo users
  (unexpected admin), denied sudo attempts (probing for sudoers access),
  and sudden spikes in sudo usage (scripted post-exploitation). All three
  patterns indicate an attacker testing or abusing elevated access.
required_inputs:
  - event_type: SUDO_EXEC
    required_fields: [username, timestamp_ns, status]
correlation_group: privilege_escalation
severity_policy:
  first_time_sudo_user: MEDIUM
  sudo_denied_attempt: MEDIUM
  sudo_usage_spike: HIGH
confidence_policy:
  first_time_sudo_user: 0.70
  sudo_denied_attempt: 0.75
  sudo_usage_spike: 0.80
thresholds:
  sudo_spike_multiplier: 3.0
  sudo_baseline_window_seconds: 3600
known_evasions:
  - id: single_sudo_call
    title: "Attacker makes exactly one sudo call — no spike"
    description: >
      A single successful sudo call by an existing sudo user does not trigger
      any of the three detectors. First-time user check requires no prior
      sudo history for that user.
    status: EVADES_SPIKE
    note: "first_time_sudo_user fires on brand new sudo users only"
  - id: baseline_poisoning
    title: "Attacker gradually builds up baseline before the burst"
    description: >
      If attacker has had low-level access for hours, establishing a high
      baseline makes subsequent spikes appear within normal range.
    status: EVADES
    reason: "Baseline is per-user rolling window, susceptible to poisoning"

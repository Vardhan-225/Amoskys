probe_id: off_hours_login
agent: auth
version: "1.0.0"
mitre_techniques:
  - id: T1078
    name: "Valid Accounts"
mitre_tactic: initial_access
intent: >
  Detect SSH or local logins outside business hours (8pm–6am) or on weekends.
  Legitimate users occasionally work late; attackers operating from different
  time zones or automating access almost always trigger this. It is a
  low-specificity but high-sensitivity indicator — useful for correlation.
required_inputs:
  - event_type: SSH_LOGIN
    status: SUCCESS
    required_fields: [username, timestamp_ns]
  - event_type: LOCAL_LOGIN
    status: SUCCESS
    required_fields: [username, timestamp_ns]
correlation_group: account_compromise
severity_policy:
  off_hours_login: MEDIUM
confidence_policy:
  off_hours_login: 0.55
thresholds:
  off_hours_start: 20    # 8pm local time
  off_hours_end: 6       # 6am local time
known_evasions:
  - id: timezone_mismatch
    title: "Server in UTC, attacker in UTC+0 during business hours"
    description: >
      Probe uses server-local time (UTC). An attacker in a UTC+5 timezone
      working at 2pm local = 9am UTC, which is within business hours on
      the server clock. Timezone-unaware.
    status: EVADES
    reason: "No timezone normalization; probe uses server-local time"
  - id: legitimate_oncall
    title: "On-call engineer logging in at 2am for incident response"
    description: >
      High FP scenario. The probe fires on any off-hours login including
      legitimate emergency access. Always needs correlation with other signals.
    status: FP_RISK
    note: "Designed as a correlation signal, not a standalone alert"

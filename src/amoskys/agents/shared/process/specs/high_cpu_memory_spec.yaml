probe_id: high_cpu_memory
agent: proc
version: "1.0.0"
mitre_techniques:
  - id: T1496
    name: "Resource Hijacking"
mitre_tactic: impact
intent: >
  Detect cryptomining, compute abuse, and resource exhaustion attacks. Fires
  when a process sustains > 80% CPU or > 50% memory for >= 60 seconds.
  The sustained threshold reduces FPs from short compilation bursts while
  catching continuous mining activity.
required_inputs:
  - source: psutil.process_iter
    fields: [pid, name, exe, cpu_percent, memory_percent, username]
correlation_group: impact
severity_policy:
  high_resource_process: MEDIUM
confidence_policy:
  high_resource_process: 0.70
thresholds:
  cpu_threshold_percent: 80.0
  memory_threshold_percent: 50.0
  sustained_seconds: 60
  scan_interval_seconds: 30.0
testing_approach: psutil_mock
known_evasions:
  - id: cpu_throttling
    title: "Miner throttles to 75% CPU to stay under threshold"
    description: >
      Sophisticated miners throttle CPU usage to a percentage just below the
      detection threshold. The probe fires at > 80% so a 75% cap evades.
    status: EVADES
    reason: "Fixed threshold; sophisticated miners can calibrate below it"
  - id: distributed_mining
    title: "Mining spread across 10 processes at 15% CPU each"
    description: >
      Each process stays well under 80%. Per-process aggregation only.
      The system-wide CPU impact is caught by OS-level monitoring but
      not this per-process probe.
    status: EVADES
    reason: "Per-process threshold, not system-wide"

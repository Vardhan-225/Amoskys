probe_id: script_interpreter
agent: proc
version: "1.0.0"
mitre_techniques:
  - id: T1059
    name: "Command and Scripting Interpreter"
  - id: T1059.001
    name: "PowerShell"
  - id: T1059.004
    name: "Unix Shell"
  - id: T1059.006
    name: "Python"
mitre_tactic: execution
intent: >
  Detect script interpreters running with suspicious command-line patterns
  that indicate staged attack activity: encoded commands (-enc, base64),
  socket connections (socket.connect, /dev/tcp), download execution
  (requests.get + exec), IEX/DownloadString (PowerShell), and reverse shells
  (nc -e, ncat listeners).
required_inputs:
  - source: psutil.process_iter
    fields: [name, cmdline]
correlation_group: execution
severity_policy:
  suspicious_script_execution: HIGH
confidence_policy:
  suspicious_script_execution: 0.80
thresholds: {}
testing_approach: psutil_mock
known_evasions:
  - id: cmdline_empty
    title: "Process started from Python API — cmdline not in /proc/pid/cmdline"
    description: >
      Some processes launched programmatically (e.g., via multiprocessing)
      may show an empty or minimal cmdline in psutil. The probe skips
      processes with empty cmdlines.
    status: EVADES
    reason: "Empty cmdline not inspectable"
  - id: heredoc_obfuscation
    title: "python3 <<'EOF' ... EOF — heredoc hides content from cmdline"
    description: >
      Heredoc content is not in the process cmdline; the cmdline just shows
      'python3'. The suspicious pattern is never visible.
    status: EVADES
    reason: "Heredoc content is stdin, not in cmdline"

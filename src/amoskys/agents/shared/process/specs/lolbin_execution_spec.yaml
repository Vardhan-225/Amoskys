probe_id: lolbin_execution
agent: proc
version: "1.0.0"
mitre_techniques:
  - id: T1218
    name: "System Binary Proxy Execution"
  - id: T1218.010
    name: "Regsvr32"
  - id: T1218.011
    name: "Rundll32"
mitre_tactic: defense_evasion
intent: >
  Detect abuse of legitimate system binaries (LOLBins — Living Off the Land
  Binaries) to proxy execution, download payloads, or encode/decode data.
  Platform-specific lists cover macOS (curl, python, osascript, screencapture),
  Linux (wget, nc, python, perl), and Windows (certutil, wscript, mshta).
  Escalates severity based on suspicious cmdline patterns.
required_inputs:
  - source: psutil.process_iter
    fields: [name, exe, cmdline]
correlation_group: execution
severity_policy:
  lolbin_execution_suspicious_cmdline: HIGH
  lolbin_execution: LOW
confidence_policy:
  lolbin_execution_suspicious: 0.70
  lolbin_execution_baseline: 0.40
thresholds: {}
testing_approach: psutil_mock
known_evasions:
  - id: renamed_lolbin
    title: "Attacker renames curl to systemd-resolved"
    description: >
      Probe checks process name against a fixed LOLBin list. A renamed
      binary escapes name-based detection. Catching this requires hash-based
      or signature-based identity verification.
    status: EVADES
    reason: "Name-based detection only; no binary fingerprinting"
  - id: legitimate_curl
    title: "Package manager using curl to download package metadata"
    description: >
      apt, brew, pip all use curl/wget legitimately. These fire at LOW
      because no suspicious cmdline patterns match. Many legitimate FPs.
    status: FP_RISK
    mitigation: "Filter parent process is package manager"

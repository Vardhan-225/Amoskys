probe_id: process_spawn
agent: proc
version: "1.0.0"
mitre_techniques:
  - id: T1059
    name: "Command and Scripting Interpreter"
  - id: T1204
    name: "User Execution"
mitre_tactic: execution
intent: >
  Track all new process creation on the host. First-run establishes a baseline
  of existing processes; subsequent scans emit an event for each newly spawned
  process. This is the foundational telemetry probe — it does not classify
  processes as malicious but provides the raw data stream for higher-level
  probes and the fusion engine.
required_inputs:
  - source: psutil.process_iter
    fields: [pid, name, exe, cmdline, username, ppid, create_time]
correlation_group: execution
severity_policy:
  process_spawned: INFO
confidence_policy:
  process_spawned: 1.0
thresholds:
  scan_interval_seconds: 5.0
testing_approach: psutil_mock
known_evasions:
  - id: pid_namespace
    title: "Process in separate PID namespace (container)"
    description: >
      Processes inside containers may not be visible to the host psutil.
      Depends on how the agent is deployed (host-namespaced vs container).
    status: EVADES
    reason: "psutil sees host PID namespace only"

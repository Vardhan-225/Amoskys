probe_id: ptrace_abuse
agent: kernel_audit
version: "1.0.0"
mitre_techniques:
  - id: T1055
    name: "Process Injection"
  - id: T1055.008
    name: "Ptrace System Calls"
mitre_tactic: defense_evasion
intent: >
  Detect ptrace abuse used for process injection, credential theft from process
  memory (e.g., reading sshd/sudo memory), and anti-debugging bypass attempts.
  Also covers process_vm_readv/writev which are higher-level process-memory
  cross-read syscalls commonly used by injection frameworks.
required_inputs:
  - syscall: ptrace
    required_fields: [pid, uid, dest_pid]
  - syscall: process_vm_readv
    required_fields: [pid, uid, dest_pid]
  - syscall: process_vm_writev
    required_fields: [pid, uid, dest_pid]
correlation_group: process_injection
severity_policy:
  kernel_ptrace_abuse_protected: CRITICAL
  kernel_ptrace_abuse_init: CRITICAL
  kernel_ptrace_abuse_non_root: HIGH
  kernel_ptrace_abuse: MEDIUM
confidence_policy:
  kernel_ptrace_abuse: 0.85
thresholds: {}
known_evasions:
  - id: gdb_debugger
    title: "gdb attaching to own process for legitimate debugging"
    description: >
      Developers ptrace their own processes constantly. The probe fires on
      non-root ptrace of sensitive processes; self-ptrace by root for debugging
      fires MEDIUM. High FP context: dev machines.
    status: FP_RISK
    mitigation: "Disable or whitelist probe on known dev workstations"
  - id: yama_ptrace_scope
    title: "Linux: YAMA ptrace scope 2 restricts ptrace to root"
    description: >
      With YAMA scope >=2, unprivileged ptrace fails at kernel level before
      reaching audit. The probe still fires (it detects the attempt), but
      result may be 'failure'. Probe fires on attempt regardless of result.
    status: CAUGHT

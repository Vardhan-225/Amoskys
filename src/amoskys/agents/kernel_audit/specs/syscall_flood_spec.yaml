probe_id: syscall_flood
agent: kernel_audit
version: "1.0.0"
mitre_techniques:
  - id: T1592
    name: "Gather Victim Host Information"
  - id: T1083
    name: "File and Directory Discovery"
mitre_tactic: reconnaissance
intent: >
  Detect abnormal syscall volume per-PID in a collection window. A syscall
  flood indicates automated reconnaissance (filesystem enumeration, socket
  scanning), fuzzing, or exploitation attempts. A high failure rate within
  the flood indicates probing for accessible resources.
required_inputs:
  - syscall: "*"
    purpose: "Aggregate all syscall types per PID"
    required_fields: [pid, result]
correlation_group: reconnaissance
severity_policy:
  kernel_syscall_flood_high_failure: HIGH
  kernel_syscall_flood: MEDIUM
confidence_policy:
  kernel_syscall_flood: 0.70
thresholds:
  flood_threshold: 100        # syscalls per window to trigger
  failure_threshold: 50       # failed syscalls to escalate to HIGH
known_evasions:
  - id: distributed_pids
    title: "100 processes each making 5 syscalls"
    description: >
      Attacker distributes enumeration across many short-lived processes,
      each staying under the per-PID threshold. The probe only tracks
      per-PID rates, so distributed enumeration evades detection.
    status: EVADES
    reason: "Cross-PID aggregation not implemented (P2)"
  - id: compile_burst
    title: "make -j16 build producing 10k syscalls/s across PIDs"
    description: >
      High-concurrency builds produce massive syscall volumes across many
      compiler PIDs. Individual PIDs may each exceed threshold. High FP
      context on build hosts.
    status: FP_RISK
    mitigation: "Disable probe on build agents or raise threshold"

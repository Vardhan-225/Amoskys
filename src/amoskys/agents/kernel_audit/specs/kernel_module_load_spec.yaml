probe_id: kernel_module_load
agent: kernel_audit
version: "1.0.0"
mitre_techniques:
  - id: T1014
    name: "Rootkit"
  - id: T1547.006
    name: "Boot or Logon Autostart: Kernel Modules and Extensions"
mitre_tactic: persistence
intent: >
  Detect kernel module loading (init_module, finit_module) and unloading
  (delete_module). Loading from suspicious paths (/tmp, /home, /var/tmp) is
  a strong rootkit indicator. Loading by non-root is always CRITICAL since
  CAP_SYS_MODULE is required and its presence outside expected paths signals
  a compromised capability set.
required_inputs:
  - syscall: init_module
    required_fields: [exe, uid, path]
  - syscall: finit_module
    required_fields: [exe, uid, path]
  - syscall: delete_module
    required_fields: [exe, uid]
correlation_group: rootkit_defense_evasion
severity_policy:
  kernel_module_loaded_suspicious_path: CRITICAL
  kernel_module_loaded_non_root: CRITICAL
  kernel_module_loaded: HIGH
  kernel_module_unloaded: MEDIUM
confidence_policy:
  kernel_module_loaded: 0.85
  kernel_module_unloaded: 0.85
thresholds: {}
known_evasions:
  - id: signed_module_from_tmp
    title: "Signed kernel module loaded from /tmp"
    description: >
      An attacker with a stolen code-signing key could sign a malicious module.
      The probe catches path-based suspicion regardless of signature status.
    status: CAUGHT
  - id: legitimate_dkms
    title: "DKMS rebuilding driver from /tmp during package install"
    description: >
      DKMS may temporarily stage modules in /tmp. This fires at HIGH/CRITICAL.
      Mitigate by adding DKMS to a whitelist in production configuration.
    status: FP_RISK
    mitigation: "Add dkms to probe whitelist for build hosts"

probe_id: file_permission_tamper
agent: kernel_audit
version: "1.0.0"
mitre_techniques:
  - id: T1222
    name: "File and Directory Permissions Modification"
  - id: T1222.002
    name: "Linux and Mac File and Directory Permissions Modification"
mitre_tactic: defense_evasion
intent: >
  Detect chmod/chown operations on sensitive system files (/etc/shadow,
  /etc/sudoers, /etc/passwd, SSH keys). Attackers use permission modification
  to make credential stores world-readable, add unauthorized SSH keys, or
  create setuid backdoors. Any modification to these files by a non-expected
  process is suspicious.
required_inputs:
  - syscall: chmod
    required_fields: [path, uid]
  - syscall: fchmod
    required_fields: [path, uid]
  - syscall: chown
    required_fields: [path, uid]
  - syscall: fchown
    required_fields: [path, uid]
correlation_group: credential_access
severity_policy:
  kernel_file_permission_tamper_shadow: CRITICAL
  kernel_file_permission_tamper_sudoers: CRITICAL
  kernel_file_permission_tamper: HIGH
confidence_policy:
  kernel_file_permission_tamper: 0.90
thresholds: {}
known_evasions:
  - id: package_manager
    title: "apt/rpm modifying /etc/passwd during package install"
    description: >
      Package managers legitimately modify many system files. The probe fires
      on package manager operations on sensitive files. Context-aware whitelisting
      (checking parent process is package manager) reduces FP rate.
    status: FP_RISK
    mitigation: "Add package manager executables to probe whitelist"
  - id: useradd_via_shadow
    title: "useradd/usermod writing to /etc/shadow"
    description: >
      User management utilities touch shadow files legitimately. These tools
      are root-run; probe fires at CRITICAL for shadow, HIGH for passwd.
      These are expected and should be baselined.
    status: FP_RISK
    mitigation: "Whitelist useradd, usermod, passwd utilities"

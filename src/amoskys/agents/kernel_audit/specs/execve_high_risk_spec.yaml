probe_id: execve_high_risk
agent: kernel_audit
version: "1.0.0"
mitre_techniques:
  - id: T1059
    name: "Command and Scripting Interpreter"
  - id: T1204.002
    name: "User Execution: Malicious File"
mitre_tactic: execution
intent: >
  Detect process execution launched from high-risk directories (/tmp, /var/tmp,
  /dev/shm, home directories). Legitimate system binaries do not live in these
  locations; attackers stage payloads there before execution.
required_inputs:
  - syscall: execve
    required_fields: [exe, uid]
  - syscall: execveat
    required_fields: [exe, uid]
correlation_group: execution
severity_policy:
  kernel_execve_high_risk_root: HIGH
  kernel_execve_high_risk: MEDIUM
confidence_policy:
  kernel_execve_high_risk: 0.75
thresholds: {}
known_evasions:
  - id: subdirectory_nesting
    title: "/tmp/legit/app/bin/tool — deeply nested under /tmp"
    description: >
      Attacker places binary in /tmp/legit/app/bin/ to look legitimate.
      Probe checks prefix match, so /tmp/* at any depth is still caught.
    status: CAUGHT
  - id: bind_mount_from_tmp
    title: "bind-mount /tmp/evil to /usr/bin/evil before exec"
    description: >
      Attacker mounts over a legitimate path. Probe sees the exe path reported
      by the kernel, which is the mount destination (/usr/bin/evil), not /tmp.
    status: EVADES
    reason: "Probe sees kernel-reported exe path, not mount source"
  - id: memfd_exec
    title: "execveat on memfd file descriptor — no filesystem path"
    description: >
      Attacker creates an anonymous memory file (memfd_create), writes payload,
      then executes via execveat with the fd. The exe field may be empty or
      '/memfd:...' which does not match HIGH_RISK_EXEC_PATHS.
    status: EVADES
    reason: "memfd paths don't have /tmp/ prefix"

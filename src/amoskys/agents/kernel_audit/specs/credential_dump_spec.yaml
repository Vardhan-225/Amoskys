# ============================================================================
# AMOSKYS Red-Team Contract: CredentialDumpProbe
# ============================================================================
# This file is the machine-readable specification for the credential_dump
# probe. It defines detection intent, required inputs, severity policy, and
# documented known evasions (with their catch status after each fix cycle).
#
# Every field here has a corresponding red-team test in:
#   tests/unit/agents/test_credential_dump_redteam.py
# ============================================================================

probe_id: credential_dump
agent: kernel_audit
version: "1.4.0"

mitre_techniques:
  - id: T1003
    name: "OS Credential Dumping"
  - id: T1555
    name: "Credentials from Password Stores"
  - id: T1555.001
    name: "Keychain"

mitre_tactic: credential_access

intent: >
  Detect OS credential dumping on macOS and Linux via three complementary
  detection vectors: (1) direct credential-store file access via open/openat
  syscall, (2) known credential-dump tool execution via execve syscall, and
  (3) stateful burst analysis detecting automated keychain harvesting within
  a sliding time window. Also covers interpreter-wrapped variants and
  cross-PID evasion techniques.

# ── Required kernel event inputs ─────────────────────────────────────────────
required_inputs:
  - syscall: openat
    purpose: "Vector 1: direct credential file access"
    required_fields: [path, comm, uid]
    optional_fields: [exe, pid]

  - syscall: open
    purpose: "Vector 1: legacy open() on credential files"
    required_fields: [path, comm, uid]
    optional_fields: [exe, pid]

  - syscall: execve
    purpose: "Vector 2: tool execution (security, dscl, sqlite3, interpreters)"
    required_fields: [exe, cmdline, uid]
    optional_fields: [comm, pid]

  - syscall: execveat
    purpose: "Vector 2: execveat variant (memfd-based execution)"
    required_fields: [exe, cmdline, uid]
    optional_fields: [comm, pid]

# ── Correlation group ─────────────────────────────────────────────────────────
correlation_group: credential_access
correlation_window_seconds: 300

# ── Severity policy ───────────────────────────────────────────────────────────
# Maps event_type → expected severity. Used by the harness to validate that
# probes fire at the right severity and to build the attack story.
severity_policy:
  keychain_direct_access: HIGH
  shadow_file_access: CRITICAL
  user_db_plist_access: HIGH
  master_passwd_access: CRITICAL
  security_cli_exec: HIGH
  security_cli_burst: HIGH
  sqlite3_keychain_access: HIGH
  dscl_credential_query: MEDIUM
  interpreter_security_exec: HIGH      # sh -c 'security ...'
  interpreter_dscl_query: MEDIUM       # osascript -e '... dscl ...'
  interpreter_cred_tool_exec: HIGH     # python3 lazagne.py
  masquerade_whitelist_break: CRITICAL # comm spoofed to daemon name
  sqlite3_temp_db_access: LOW          # copy-then-query (P1.2 low signal)
  keychain_cross_pid_burst: HIGH       # 5+ PIDs same UID (P0.2)

# ── Confidence policy ─────────────────────────────────────────────────────────
confidence_policy:
  masquerade_whitelist_break: 0.92
  shadow_file_access: 0.95
  security_cli_burst: 0.93
  keychain_direct_access: 0.85
  security_cli_exec: 0.88
  interpreter_security_exec_with_dump: 0.75
  interpreter_security_exec_generic: 0.65
  interpreter_dscl_query: 0.65
  interpreter_cred_tool_exec: 0.85
  keychain_cross_pid_burst: 0.88
  sqlite3_keychain_access: 0.90
  sqlite3_temp_db_access: 0.40

# ── Stateful probe parameters ─────────────────────────────────────────────────
thresholds:
  keychain_burst_threshold: 10       # calls per PID to trigger burst
  keychain_burst_window_seconds: 60.0
  cross_pid_burst_threshold: 5       # calls per UID across PIDs
  cross_pid_burst_window_seconds: 60.0

# ── Red-team known evasions registry ─────────────────────────────────────────
# This is the living record of adversarial testing. Each evasion has a status:
#   CAUGHT   — probe detects this after the labeled fix
#   EVADES   — documented blind spot (accepted or P2+)
#   LOW_SIGNAL — probe fires at LOW severity with correlation_needed=True
known_evasions:
  - id: shell_wrap_security
    title: "sh -c 'security dump-keychain'"
    description: >
      Attacker wraps security CLI call inside a shell to avoid direct execve
      of the `security` binary. The dispatch table only matched exe_name, not
      the interpreter wrapping.
    status: CAUGHT
    fixed_in: "P0.1"
    catch_event: interpreter_security_exec
    catch_severity: HIGH
    test: test_EVADES_security_wrapped_in_sh

  - id: bash_heredoc_security
    title: "bash -c 'security find-generic-password'"
    description: >
      Generic `security find-*` call inside bash without dump-keychain specificity.
      Fires at MEDIUM confidence vs HIGH for dump-keychain.
    status: CAUGHT
    fixed_in: "P0.1"
    catch_event: interpreter_security_exec
    catch_severity: MEDIUM
    test: test_EVADES_bash_heredoc_security

  - id: python_script_lazagne
    title: "python3 /tmp/lazagne.py"
    description: >
      Attacker runs a known credential-dump script via python3 interpreter.
      Script filename matches _KNOWN_TOOL_SCRIPT_NAMES.
    status: CAUGHT
    fixed_in: "P0.1"
    catch_event: interpreter_cred_tool_exec
    catch_severity: HIGH
    test: test_CAUGHT_lazagne_via_python_script_name

  - id: osascript_dscl
    title: "osascript -e 'do shell script \"dscl . -read /Users/admin ShadowHashData\"'"
    description: >
      Attacker uses osascript (AppleScript) to execute dscl credential query,
      bypassing the direct dscl tool dispatch.
    status: CAUGHT
    fixed_in: "P0.1"
    catch_event: interpreter_dscl_query
    catch_severity: MEDIUM
    test: test_EVADES_dscl_via_osascript

  - id: multi_pid_rotation
    title: "10 separate PIDs each calling security once"
    description: >
      Attacker spawns N processes each making a single keychain call to stay
      under the per-PID burst threshold. Cross-PID burst tracking by UID
      catches this.
    status: CAUGHT
    fixed_in: "P0.2"
    catch_event: keychain_cross_pid_burst
    catch_severity: HIGH
    test: test_EVADES_multi_pid_rotation

  - id: comm_spoof_with_exe
    title: "prctl(PR_SET_NAME, 'opendirectoryd') but real exe is /tmp/evil"
    description: >
      Attacker renames process comm to a whitelisted daemon name via prctl().
      When exe field is present and doesn't match expected daemon path,
      masquerade_whitelist_break CRITICAL is fired.
    status: CAUGHT
    fixed_in: "P1.1"
    catch_event: masquerade_whitelist_break
    catch_severity: CRITICAL
    test: test_GAP_comm_can_be_spoofed

  - id: sqlite3_lowercase_keychain
    title: "sqlite3 /tmp/kc_copy.db after copying keychain"
    description: >
      Attacker copies keychain to /tmp/kc_copy.db, then queries via sqlite3.
      The copy step evades file_access detection (target is /tmp, not Keychain).
      The sqlite3 step fires LOW signal with correlation_needed=True.
    status: LOW_SIGNAL
    fixed_in: "P1.2"
    catch_event: sqlite3_temp_db_access
    catch_severity: LOW
    note: "correlation_needed=True — fusion engine should correlate with prior copy"
    test: test_GAP_copy_then_query_pattern

  - id: comm_spoof_no_exe
    title: "comm spoofed to opendirectoryd, exe field absent in audit record"
    description: >
      Same as comm_spoof_with_exe but the kernel audit record doesn't include
      the exe field. The probe cannot distinguish from a real daemon and stays
      silent. This is an accepted blind spot until BSM provides exe reliably.
    status: EVADES
    reason: "exe field not present in all BSM audit record types"
    test: test_EVADES_comm_spoofed_to_whitelisted

  - id: read_fd_tracking
    title: "open() keychain, then read() from fd — no execve"
    description: >
      An in-memory-only process opens the keychain DB via open() which IS
      caught, but a process that has a pre-existing fd and only issues read()
      syscalls would not be caught by Vector 1 (which only checks open/openat).
    status: EVADES
    reason: "P2 deferred — requires per-PID FD state across syscalls"
    test: pending

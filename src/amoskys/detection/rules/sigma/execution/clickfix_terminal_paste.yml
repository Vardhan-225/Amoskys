title: ClickFix Terminal Paste-and-Run Attack
id: amoskys-exec-010
status: stable
level: critical
description: >-
  Detects the ClickFix social engineering pattern where a messaging application
  (iMessage, Slack, Teams, Discord) is active and Terminal.app spawns a child
  process running suspicious commands (curl, wget, bash -c). This is the primary
  post-Sequoia stealer delivery mechanism that tricks users into pasting malicious
  commands into Terminal after receiving instructions via messaging apps.
author: AMOSKYS
tags:
    - attack.execution
    - attack.t1204.001
    - attack.t1059
references:
    - https://attack.mitre.org/techniques/T1204/001/
logsource:
    category: process_creation
    product: amoskys
detection:
    selection:
        event_type:
            - clickfix_detected
            - browser_to_terminal
    condition: selection
fields:
    - process_name
    - cmdline
    - parent_name
    - messaging_apps_active
    - pid
    - terminal_pid
falsepositives:
    - Developers copying commands from Slack/Teams into Terminal
    - Legitimate tutorial following with messaging app open
confidence: 0.90

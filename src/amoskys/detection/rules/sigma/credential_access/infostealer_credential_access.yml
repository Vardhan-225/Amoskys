title: Infostealer Credential Store Access
id: amoskys-cred-010
status: stable
level: critical
description: >-
  Detects non-browser processes accessing browser credential databases (Login Data,
  Cookies, logins.json, key4.db). Primary indicator of AMOS, Poseidon, Banshee,
  and Lumma macOS infostealers harvesting saved passwords and session tokens.
author: AMOSKYS
tags:
    - attack.credential_access
    - attack.t1555.003
    - attack.t1539
references:
    - https://attack.mitre.org/techniques/T1555/003/
    - https://www.sentinelone.com/blog/atomic-stealer-threat-actor-spawns-second-variant-of-macos-malware-sold-on-telegram/
logsource:
    category: file_access
    product: amoskys
detection:
    selection:
        event_type:
            - browser_cred_theft
            - session_cookie_theft
            - keychain_access
    condition: selection
fields:
    - process_name
    - file_path
    - access_category
    - pid
    - process_guid
falsepositives:
    - Browser processes accessing their own credential stores
    - Backup software reading browser profiles
    - Browser sync utilities
confidence: 0.90

title: Credential Patterns in Application Logs
id: amoskys-cred-003
status: stable
level: medium
description: Detects credential patterns such as password=, api_key=, or token= appearing in application logs indicating potential credential harvesting
author: AMOSKYS
tags:
    - attack.credential_access
    - attack.t1552.001
logsource:
    category: application
    product: amoskys
detection:
    selection:
        event_type: credential_harvest
    keywords:
        message|contains:
            - 'password='
            - 'api_key='
            - 'token='
    condition: selection and keywords
fields:
    - message
    - log_source
    - file_path
    - username
falsepositives:
    - Debug logging with sanitized credential placeholders
    - Security scanning tools auditing log files
confidence: 0.75

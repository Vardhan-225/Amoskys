title: Fake Password Dialog via osascript
id: amoskys-cred-011
status: stable
level: critical
description: >-
  Detects osascript execution with display dialog containing password-related
  keywords. This is the primary social engineering technique used by AMOS,
  Poseidon, Banshee, and virtually every macOS infostealer to harvest the
  user's system password via a spoofed System Preferences dialog.
author: AMOSKYS
tags:
    - attack.credential_access
    - attack.t1056.002
    - attack.collection
references:
    - https://attack.mitre.org/techniques/T1056/002/
    - https://www.sentinelone.com/blog/atomic-stealer-threat-actor-spawns-second-variant-of-macos-malware-sold-on-telegram/
logsource:
    category: process_creation
    product: amoskys
detection:
    selection:
        event_type: fake_password_dialog
        process_name: osascript
    keywords:
        cmdline|contains:
            - display dialog
            - password
            - credential
            - passphrase
            - authenticate
    condition: selection and keywords
fields:
    - process_name
    - cmdline
    - parent_name
    - pid
    - ppid
falsepositives:
    - Legitimate macOS system password prompts (System Preferences, Software Update)
    - Homebrew cask installations requesting admin password
    - IT management tools using osascript for legitimate auth
confidence: 0.95

{% extends "dashboard/base.html" %}
{% block title %}AMOSKYS — Device{% endblock %}
{% block content %}
<div class="dd">
    <!-- Device sub-navigation (back arrow merged into tab bar) -->
    <div class="dd-subnav" id="dd-subnav">
        <a href="/dashboard/" class="dd-subnav-link dd-subnav-back">&larr; Devices</a>
        <div class="dd-subnav-sep"></div>
        <a href="#" class="dd-subnav-link active" data-tab="overview">Overview</a>
        <a href="/dashboard/cortex" class="dd-subnav-link">Cortex</a>
        <a href="/dashboard/observatory" class="dd-subnav-link">Observatory</a>
        <a href="/dashboard/intelligence" class="dd-subnav-link">Intelligence</a>
        <a href="/dashboard/threats" class="dd-subnav-link">Threats</a>
        <a href="/dashboard/igris" class="dd-subnav-link">IGRIS</a>
        <a href="/dashboard/guardian" class="dd-subnav-link">C2</a>
    </div>

    <!-- Overview (main device telemetry) -->
    <div id="dd-root"><div class="dd-loading"><div class="neural-loading"></div></div></div>
</div>

<style>
.dd { max-width: 1100px; margin: 0 auto; padding: 16px 20px 40px; }
.dd-loading { text-align: center; padding: 60px; }

/* Sub-navigation */
.dd-subnav {
    display: flex;
    align-items: center;
    gap: 0;
    border-bottom: 1px solid #1e2a45;
    margin: 0 0 16px;
    overflow-x: auto;
}
.dd-subnav-back {
    color: #6b7a99 !important;
    border-bottom-color: transparent !important;
}
.dd-subnav-back:hover { color: #fff !important; }
.dd-subnav-sep {
    width: 1px;
    height: 20px;
    background: #1e2a45;
    margin: 0 4px;
    flex-shrink: 0;
}
.dd-subnav-link {
    padding: 10px 16px;
    color: #6b7a99;
    text-decoration: none;
    font-size: 0.8em;
    font-weight: 600;
    letter-spacing: 0.3px;
    border-bottom: 2px solid transparent;
    white-space: nowrap;
    transition: all 0.15s;
}
.dd-subnav-link:hover { color: #c8d6e5; }
.dd-subnav-link.active {
    color: #00d9ff;
    border-bottom-color: #00d9ff;
}


/* Header */
.dd-hdr { display: flex; align-items: center; gap: 14px; margin: 16px 0; }
.dd-dot { width: 14px; height: 14px; border-radius: 50%; flex-shrink: 0; }
.dd-dot.online { background: #00ff88; box-shadow: 0 0 10px #00ff8866; }
.dd-dot.offline { background: #555; }
.dd-name { font-size: 1.4em; font-weight: 800; color: #fff; }
.dd-tags { display: flex; gap: 6px; margin-top: 4px; }
.dd-tag { padding: 2px 8px; background: rgba(0,217,255,0.08); border: 1px solid #1e2a45; border-radius: 4px; font-size: 0.75em; color: #8899bb; }
.dd-badge { padding: 4px 12px; border-radius: 6px; font-weight: 700; font-size: 0.75em; text-transform: uppercase; margin-left: auto; }
.dd-badge.online { background: rgba(0,255,136,0.12); color: #00ff88; }
.dd-badge.offline { background: rgba(100,100,100,0.2); color: #666; }

/* Posture */
.dd-posture { display: flex; align-items: center; gap: 20px; background: #0f1628; border: 1px solid #1e2a45; border-radius: 12px; padding: 18px 22px; margin-bottom: 14px; }
.dd-posture-ring { position: relative; width: 70px; height: 70px; flex-shrink: 0; }
.dd-posture-ring svg { width: 70px; height: 70px; transform: rotate(-90deg); }
.dd-posture-ring .ring-bg { fill: none; stroke: #1e2a45; stroke-width: 6; }
.dd-posture-ring .ring-fg { fill: none; stroke-width: 6; stroke-linecap: round; transition: stroke-dashoffset 0.8s ease-out; }
.dd-posture-score { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); font-size: 1.1em; font-weight: 800; }
.dd-posture-info { flex: 1; }
.dd-posture-level { font-size: 1.1em; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }
.dd-posture-desc { font-size: 0.8em; color: #6b7a99; margin-top: 2px; }
.dd-risk-pills { display: flex; gap: 12px; margin-top: 8px; }
.dd-risk-pill { font-size: 0.78em; font-weight: 700; }

/* Cards row */
.dd-cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 8px; margin-bottom: 14px; }
.dd-card { background: #0f1628; border: 1px solid #1e2a45; border-radius: 10px; padding: 12px 14px; }
.dd-card-l { font-size: 0.65em; color: #6b7a99; text-transform: uppercase; letter-spacing: 0.5px; }
.dd-card-v { font-size: 1.5em; font-weight: 700; margin-top: 2px; line-height: 1.1; }

/* Grid 2-col */
.dd-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 14px; }
@media (max-width: 700px) { .dd-grid { grid-template-columns: 1fr; } }

/* Section */
.dd-sec { background: #0f1628; border: 1px solid #1e2a45; border-radius: 10px; padding: 16px; margin-bottom: 14px; }
.dd-sec-t { font-size: 0.78em; color: #00d9ff; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 10px; }

/* Bars (categories, MITRE, etc) */
.dd-bar-row { display: flex; align-items: center; gap: 8px; padding: 4px 0; }
.dd-bar-label { font-size: 0.78em; min-width: 120px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.dd-bar-bg { flex: 1; height: 14px; background: #0a0e27; border-radius: 3px; overflow: hidden; }
.dd-bar-fill { height: 100%; border-radius: 3px; transition: width 0.5s; }
.dd-bar-count { font-size: 0.72em; color: #6b7a99; min-width: 35px; text-align: right; }

/* MITRE tags */
.dd-mitre-grid { display: flex; flex-wrap: wrap; gap: 6px; }
.dd-mitre-tag { padding: 4px 10px; background: rgba(0,217,255,0.06); border: 1px solid #1e2a45; border-radius: 4px; font-size: 0.78em; color: #00d9ff; font-family: 'SF Mono', monospace; }
.dd-mitre-cnt { color: #6b7a99; margin-left: 4px; }

/* Timeline */
.dd-timeline { display: flex; align-items: flex-end; gap: 2px; height: 60px; }
.dd-tl-bar { flex: 1; min-width: 4px; border-radius: 2px 2px 0 0; transition: height 0.3s; position: relative; }
.dd-tl-bar:hover::after { content: attr(data-tip); position: absolute; bottom: 100%; left: 50%; transform: translateX(-50%); background: #1a1f35; border: 1px solid #2a3050; padding: 2px 6px; border-radius: 3px; font-size: 0.65em; white-space: nowrap; color: #ccc; }

/* Agents list */
.dd-agent-row { display: flex; align-items: center; gap: 8px; padding: 5px 0; border-bottom: 1px solid #0a0e20; }
.dd-agent-row:last-child { border-bottom: none; }
.dd-agent-dot { width: 6px; height: 6px; border-radius: 50%; background: #00ff88; }
.dd-agent-name { font-size: 0.82em; flex: 1; }
.dd-agent-cnt { font-size: 0.75em; color: #6b7a99; }

/* Connections & DNS */
.dd-conn-row { display: flex; gap: 8px; padding: 5px 0; border-bottom: 1px solid #0a0e20; font-size: 0.8em; align-items: center; }
.dd-conn-row:last-child { border-bottom: none; }
.dd-conn-ip { font-family: 'SF Mono', monospace; color: #c8d6e5; min-width: 120px; }
.dd-conn-meta { color: #6b7a99; flex: 1; }
.dd-conn-bytes { color: #6b7a99; font-size: 0.85em; }

/* Events table */
.dd-ev-row { display: grid; grid-template-columns: 110px 1fr 55px 90px 1fr; gap: 8px; padding: 7px 0; border-bottom: 1px solid #0a0e20; font-size: 0.8em; align-items: center; }
.dd-ev-hdr { font-size: 0.68em; color: #6b7a99; text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 1px solid #1e2a45; padding-bottom: 6px; margin-bottom: 2px; }
.dd-ev-time { color: #6b7a99; font-family: 'SF Mono', monospace; font-size: 0.9em; }
.dd-ev-cat { font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.dd-ev-risk { font-weight: 700; text-align: center; }
.dd-risk-c { color: #ff3366; } .dd-risk-h { color: #f0ad4e; } .dd-risk-m { color: #ffcc44; } .dd-risk-l { color: #00ff88; }
.dd-ev-agent { color: #6b7a99; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.dd-ev-detail { color: #6b7a99; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.dd-ev-row:hover { background: #121a30; }

.dd-empty { text-align: center; color: #555; padding: 20px; font-size: 0.85em; }
</style>

<script nonce="{{ csp_nonce() }}">
(function() {
    var deviceId = '{{ device_id }}';
    var root = document.getElementById('dd-root');

    load();
    setInterval(load, 15000);

    async function load() {
        try {
            var resp = await fetch('/dashboard/api/command-center/device/' + deviceId + '/telemetry');
            var data = await resp.json();
            if (!data.device) { root.innerHTML = '<p style="color:#ff5555;padding:40px;">Device not found</p>'; return; }
            // Show device name in header
            var ctxEl = document.getElementById('hdr-device-ctx');
            if (ctxEl) ctxEl.textContent = data.device.hostname || deviceId;
            render(data);
        } catch(e) {
            root.innerHTML = '<p style="color:#ff5555;padding:40px;">Error: ' + e.message + '</p>';
        }
    }

    function render(d) {
        var dev = d.device;
        var p = d.posture;
        var s = d.summary;
        var sc = dev.status === 'online' ? 'online' : 'offline';

        // Posture color
        var pc = p.level === 'safe' ? '#00ff88' : p.level === 'guarded' ? '#f0ad4e' : '#ff3366';
        var circ = 2 * Math.PI * 28;
        var offset = circ * (1 - p.score);

        var html = '';

        // Header
        html += '<div class="dd-hdr"><div class="dd-dot ' + sc + '"></div><div><div class="dd-name">' + esc(dev.hostname) + '</div>'
            + '<div class="dd-tags"><span class="dd-tag">' + esc(dev.os) + ' ' + esc(dev.arch) + '</span><span class="dd-tag">v' + esc(dev.agent_version) + '</span></div>'
            + '</div><span class="dd-badge ' + sc + '">' + sc + '</span></div>';

        // Posture
        html += '<div class="dd-posture">'
            + '<div class="dd-posture-ring"><svg viewBox="0 0 64 64"><circle class="ring-bg" cx="32" cy="32" r="28"/>'
            + '<circle class="ring-fg" cx="32" cy="32" r="28" stroke="' + pc + '" stroke-dasharray="' + circ.toFixed(1) + '" stroke-dashoffset="' + offset.toFixed(1) + '"/></svg>'
            + '<div class="dd-posture-score" style="color:' + pc + '">' + Math.round(p.score * 100) + '</div></div>'
            + '<div class="dd-posture-info"><div class="dd-posture-level" style="color:' + pc + '">' + esc(p.level) + '</div>'
            + '<div class="dd-posture-desc">Security posture based on ' + s.total_events + ' events in the last 24 hours</div>'
            + '<div class="dd-risk-pills">'
            + '<span class="dd-risk-pill" style="color:#ff3366;">' + s.critical + ' critical</span>'
            + '<span class="dd-risk-pill" style="color:#f0ad4e;">' + s.high + ' high</span>'
            + '<span class="dd-risk-pill" style="color:#ffcc44;">' + s.medium + ' medium</span>'
            + '<span class="dd-risk-pill" style="color:#00ff88;">' + s.low + ' low</span>'
            + '</div></div></div>';

        // Cards
        html += '<div class="dd-cards">'
            + card('Events', s.total_events, '#00d9ff') + card('Critical', s.critical, s.critical > 0 ? '#ff3366' : '#00ff88')
            + card('Agents', (d.agents || []).length, '#00d9ff') + card('MITRE', (d.mitre_techniques || []).length, '#00d9ff')
            + card('Processes', (d.processes || []).length, '#8899bb') + card('Connections', (d.connections || []).length, '#8899bb')
            + '</div>';

        // Timeline
        if (d.timeline && d.timeline.length > 0) {
            html += '<div class="dd-sec"><div class="dd-sec-t">Event Timeline (24h)</div><div class="dd-timeline">';
            var maxTl = Math.max.apply(null, d.timeline.map(function(t) { return t.count; }));
            for (var i = 0; i < d.timeline.length; i++) {
                var t = d.timeline[i];
                var h = Math.max(4, (t.count / maxTl) * 100);
                var clr = t.critical > 0 ? '#ff3366' : t.high > 0 ? '#f0ad4e' : '#00d9ff';
                var tip = (t.hour || '').slice(11) + ':00 — ' + t.count + ' events';
                html += '<div class="dd-tl-bar" style="height:' + h + '%;background:' + clr + ';" data-tip="' + tip + '"></div>';
            }
            html += '</div></div>';
        }

        // 2-col: Categories + MITRE
        html += '<div class="dd-grid">';

        // Categories
        html += '<div class="dd-sec"><div class="dd-sec-t">Threat Categories</div>';
        if (d.categories && d.categories.length > 0) {
            var maxCat = d.categories[0].count;
            for (var i = 0; i < d.categories.length; i++) {
                var c = d.categories[i];
                var pct = Math.max(4, (c.count / maxCat) * 100);
                var clr = c.avg_risk >= 0.7 ? '#ff3366' : c.avg_risk >= 0.4 ? '#f0ad4e' : '#00d9ff';
                html += '<div class="dd-bar-row"><span class="dd-bar-label">' + esc(c.category) + '</span>'
                    + '<div class="dd-bar-bg"><div class="dd-bar-fill" style="width:' + pct + '%;background:' + clr + ';"></div></div>'
                    + '<span class="dd-bar-count">' + c.count + '</span></div>';
            }
        } else { html += '<div class="dd-empty">No threats detected</div>'; }
        html += '</div>';

        // MITRE
        html += '<div class="dd-sec"><div class="dd-sec-t">MITRE ATT&CK</div>';
        if (d.mitre_techniques && d.mitre_techniques.length > 0) {
            html += '<div class="dd-mitre-grid">';
            for (var i = 0; i < d.mitre_techniques.length; i++) {
                var m = d.mitre_techniques[i];
                html += '<span class="dd-mitre-tag">' + esc(m.technique) + '<span class="dd-mitre-cnt">' + m.count + '</span></span>';
            }
            html += '</div>';
        } else { html += '<div class="dd-empty">No MITRE hits</div>'; }
        html += '</div></div>';

        // 2-col: Agents + Processes
        html += '<div class="dd-grid">';

        // Agents
        html += '<div class="dd-sec"><div class="dd-sec-t">Active Agents</div>';
        if (d.agents && d.agents.length > 0) {
            for (var i = 0; i < d.agents.length; i++) {
                var a = d.agents[i];
                html += '<div class="dd-agent-row"><div class="dd-agent-dot"></div><span class="dd-agent-name">' + esc(a.name) + '</span><span class="dd-agent-cnt">' + a.event_count + '</span></div>';
            }
        } else { html += '<div class="dd-empty">No agent data</div>'; }
        html += '</div>';

        // Processes
        html += '<div class="dd-sec"><div class="dd-sec-t">Top Processes</div>';
        if (d.processes && d.processes.length > 0) {
            for (var i = 0; i < Math.min(10, d.processes.length); i++) {
                var pr = d.processes[i];
                html += '<div class="dd-agent-row"><span class="dd-agent-name">' + esc(pr.name) + '</span><span class="dd-agent-cnt">' + esc(pr.username || '') + '</span><span class="dd-agent-cnt">' + pr.count + '</span></div>';
            }
        } else { html += '<div class="dd-empty">No process data</div>'; }
        html += '</div></div>';

        // Connections + DNS
        if ((d.connections && d.connections.length > 0) || (d.dns && d.dns.length > 0)) {
            html += '<div class="dd-grid">';
            html += '<div class="dd-sec"><div class="dd-sec-t">Network Connections</div>';
            if (d.connections && d.connections.length > 0) {
                for (var i = 0; i < Math.min(10, d.connections.length); i++) {
                    var cn = d.connections[i];
                    html += '<div class="dd-conn-row"><span class="dd-conn-ip">' + esc(cn.dst_ip) + ':' + (cn.dst_port || '') + '</span>'
                        + '<span class="dd-conn-meta">' + esc(cn.process || '') + ' ' + esc(cn.country || '') + '</span>'
                        + '<span class="dd-conn-bytes">' + fmtBytes(cn.bytes_tx + cn.bytes_rx) + '</span></div>';
                }
            } else { html += '<div class="dd-empty">No connections</div>'; }
            html += '</div>';

            html += '<div class="dd-sec"><div class="dd-sec-t">DNS Queries</div>';
            if (d.dns && d.dns.length > 0) {
                for (var i = 0; i < Math.min(10, d.dns.length); i++) {
                    var dn = d.dns[i];
                    html += '<div class="dd-conn-row"><span class="dd-conn-ip">' + esc(dn.domain) + '</span><span class="dd-conn-bytes">' + dn.count + ' queries</span></div>';
                }
            } else { html += '<div class="dd-empty">No DNS data</div>'; }
            html += '</div></div>';
        }

        // Recent Events
        html += '<div class="dd-sec"><div class="dd-sec-t">Recent Security Events</div>';
        var events = d.recent_events || [];
        if (events.length > 0) {
            html += '<div class="dd-ev-row dd-ev-hdr"><span>Time</span><span>Category</span><span>Risk</span><span>Agent</span><span>Detail</span></div>';
            for (var i = 0; i < events.length; i++) {
                var e = events[i];
                var risk = e.risk_score || 0;
                var rc = risk >= 0.8 ? 'c' : risk >= 0.6 ? 'h' : risk >= 0.3 ? 'm' : 'l';
                html += '<div class="dd-ev-row"><span class="dd-ev-time">' + (esc(e.timestamp_dt) || '').replace('T',' ').slice(11,19) + '</span>'
                    + '<span class="dd-ev-cat">' + esc(e.event_category) + '</span>'
                    + '<span class="dd-ev-risk dd-risk-' + rc + '">' + risk.toFixed(2) + '</span>'
                    + '<span class="dd-ev-agent">' + esc(e.collection_agent) + '</span>'
                    + '<span class="dd-ev-detail">' + esc(e.process_name || e.description || '') + '</span></div>';
            }
        } else { html += '<div class="dd-empty">No events in the last 24 hours</div>'; }
        html += '</div>';

        root.innerHTML = html;
    }

    function card(l, v, c) { return '<div class="dd-card"><div class="dd-card-l">' + l + '</div><div class="dd-card-v" style="color:' + c + ';">' + v + '</div></div>'; }
    function esc(s) { if (!s) return ''; var d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
    function fmtBytes(b) { if (!b || b < 1024) return (b||0) + 'B'; if (b < 1048576) return (b/1024).toFixed(1) + 'KB'; return (b/1048576).toFixed(1) + 'MB'; }
})();
</script>
{% endblock %}

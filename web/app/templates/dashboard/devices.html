{% extends "dashboard/base.html" %}
{% block title %}AMOSKYS{% endblock %}
{% block content %}
<div class="dv">
    <div class="dv-header">
        <h1 class="dv-title">Your Devices</h1>
        <a href="/dashboard/deploy" class="dv-add-btn">
            <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M8 3v10M3 8h10"/></svg>
            Add Device
        </a>
    </div>
    <p class="dv-subtitle" id="dv-subtitle">Loading...</p>
    <div id="dv-list"><div style="text-align:center;padding:40px;"><div class="neural-loading"></div></div></div>
    <div id="dv-empty" class="dv-empty" style="display:none;">
        <img src="{{ url_for('static', filename='images/amoskys-logo.svg') }}" alt="AMOSKYS" width="64" height="64" style="opacity:0.2;margin-bottom:16px;">
        <h2>No devices yet</h2>
        <p>Install the AMOSKYS agent to start protecting your devices.</p>
        <a href="/dashboard/deploy" class="dv-cta">Install on your Mac</a>
    </div>
</div>

<style>
.dv { max-width: 960px; margin: 0 auto; padding: 24px 20px 40px; }
.dv-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
.dv-title { font-size: 1.5em; font-weight: 800; color: #fff; }
.dv-subtitle { font-size: 0.82em; color: #6b7a99; margin-bottom: 18px; }
.dv-add-btn {
    display: flex; align-items: center; gap: 5px; padding: 7px 16px;
    background: linear-gradient(135deg, #00b894, #00d9ff);
    color: #0a0e27; font-weight: 700; font-size: 0.82em;
    border-radius: 8px; text-decoration: none;
}
.dv-add-btn:hover { transform: translateY(-1px); box-shadow: 0 4px 15px rgba(0,217,255,0.3); }

/* ── Device Card ── */
.dv-card {
    background: #0f1628; border: 1px solid #1e2a45; border-radius: 12px;
    margin-bottom: 10px; overflow: hidden; transition: border-color 0.2s;
}
.dv-card.expanded { border-color: #00d9ff33; }
.dv-card-header {
    display: grid; grid-template-columns: 44px 1fr auto auto auto;
    align-items: center; gap: 14px; padding: 16px 20px; cursor: pointer;
}
.dv-card-header:hover { background: #111c34; }

.dv-icon { width: 44px; height: 44px; border-radius: 10px; background: #0a0e20; border: 1px solid #1a2040; display: flex; align-items: center; justify-content: center; position: relative; }
.dv-icon svg { opacity: 0.4; }
.dv-dot { position: absolute; bottom: -2px; right: -2px; width: 10px; height: 10px; border-radius: 50%; border: 2px solid #0f1628; }
.dv-dot-on { background: #00ff88; box-shadow: 0 0 6px #00ff8866; }
.dv-dot-off { background: #555; }
.dv-info { min-width: 0; }
.dv-name { font-size: 0.95em; font-weight: 700; color: #e0e8f0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.dv-meta { display: flex; gap: 6px; margin-top: 4px; flex-wrap: wrap; }
.dv-tag { font-size: 0.65em; padding: 1px 6px; border-radius: 3px; color: #6b7a99; background: rgba(255,255,255,0.03); }
.dv-tag-ok { color: #00ff88; background: rgba(0,255,136,0.06); }
.dv-tag-warn { color: #f0ad4e; background: rgba(240,173,78,0.08); }
.dv-tag-crit { color: #ff3366; background: rgba(255,51,102,0.08); }
.dv-stats { display: flex; gap: 14px; }
.dv-cs { text-align: right; }
.dv-cs-val { font-size: 1.1em; font-weight: 700; }
.dv-cs-lbl { font-size: 0.58em; color: #6b7a99; text-transform: uppercase; }
.vc { color: #ff3366; } .vh { color: #f0ad4e; } .ve { color: #00d9ff; }
/* Status tags */
.dv-tag-status { font-size: 0.68em; padding: 2px 8px; border-radius: 3px; font-weight: 600; }
.dv-online { color: #00ff88; background: rgba(0,255,136,0.1); }
.dv-offline { color: #f0ad4e; background: rgba(240,173,78,0.08); }

.dv-chevron { color: #2a3050; font-size: 1.3em; transition: transform 0.2s, color 0.15s; }
.dv-card.expanded .dv-chevron { transform: rotate(90deg); color: #00d9ff; }

/* ── Expanded Detail ── */
.dv-detail { display: none; padding: 0 20px 18px; border-top: 1px solid #0a0e20; }
.dv-card.expanded .dv-detail { display: block; }

.dv-detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 14px; }
@media (max-width: 600px) { .dv-detail-grid { grid-template-columns: 1fr; } }

.dv-panel { background: #0a0e20; border-radius: 8px; padding: 14px; }
.dv-panel-t { font-size: 0.68em; color: #00d9ff; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; font-weight: 700; }

/* Posture mini */
.dv-posture-mini { display: flex; align-items: center; gap: 12px; }
.dv-mini-ring { position: relative; width: 48px; height: 48px; flex-shrink: 0; }
.dv-mini-ring svg { width: 48px; height: 48px; transform: rotate(-90deg); }
.dv-mini-ring .bg { fill: none; stroke: #1e2a45; stroke-width: 4; }
.dv-mini-ring .fg { fill: none; stroke-width: 4; stroke-linecap: round; }
.dv-mini-val { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); font-size: 0.9em; font-weight: 800; }
.dv-mini-info {}
.dv-mini-level { font-size: 0.85em; font-weight: 700; }
.dv-mini-desc { font-size: 0.72em; color: #6b7a99; margin-top: 2px; }

/* Alert items */
.dv-alert-item { display: flex; align-items: flex-start; gap: 8px; padding: 5px 0; }
.dv-alert-dot { width: 6px; height: 6px; border-radius: 50%; margin-top: 5px; flex-shrink: 0; }
.dv-adot-c { background: #ff3366; } .dv-adot-h { background: #f0ad4e; } .dv-adot-m { background: #00d9ff; }
.dv-alert-text { font-size: 0.78em; color: #c8d6e5; }
.dv-alert-sub { font-size: 0.68em; color: #555; }

/* Bar */
.dv-bar { display: flex; align-items: center; gap: 6px; padding: 2px 0; }
.dv-bar-lbl { font-size: 0.7em; min-width: 110px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.dv-bar-bg { flex: 1; height: 8px; background: #0f1628; border-radius: 2px; overflow: hidden; }
.dv-bar-fill { height: 100%; border-radius: 2px; }
.dv-bar-cnt { font-size: 0.65em; color: #6b7a99; min-width: 24px; text-align: right; }

/* Monitor button */
.dv-monitor-btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 8px 18px; margin-top: 14px;
    background: rgba(0,217,255,0.08); border: 1px solid rgba(0,217,255,0.2);
    color: #00d9ff; font-weight: 700; font-size: 0.8em;
    border-radius: 8px; text-decoration: none; transition: all 0.15s;
}
.dv-monitor-btn:hover { background: rgba(0,217,255,0.15); border-color: #00d9ff; }

/* MITRE mini */
.dv-mt { display: inline-block; padding: 3px 8px; background: rgba(0,217,255,0.04); border: 1px solid #1a2040; border-radius: 4px; font-size: 0.68em; color: #00d9ff; font-family: monospace; margin: 2px; cursor: help; transition: all 0.15s; }
.dv-mt:hover { background: rgba(0,217,255,0.12); border-color: #00d9ff44; }
.dv-mt-cnt { color: #6b7a99; margin-left: 4px; }

/* Empty */
.dv-empty { text-align: center; padding: 60px 20px; }
.dv-empty h2 { font-size: 1.2em; color: #c8d6e5; margin-bottom: 6px; }
.dv-empty p { color: #6b7a99; margin-bottom: 18px; }
.dv-cta { display: inline-block; padding: 10px 22px; background: linear-gradient(135deg, #00b894, #00d9ff); color: #0a0e27; font-weight: 700; border-radius: 8px; text-decoration: none; }
</style>

<script nonce="{{ csp_nonce() }}">
(function() {
    var fleetData = null;
    load(); setInterval(load, 15000);

    async function load() {
        try {
            var r = await fetch('/dashboard/api/command-center/status');
            fleetData = await r.json();
            if (!fleetData.available || !fleetData.devices || !fleetData.devices.length) {
                document.getElementById('dv-list').style.display = 'none';
                document.getElementById('dv-empty').style.display = 'block';
                document.getElementById('dv-subtitle').textContent = 'No devices connected';
                return;
            }
            renderDevices(fleetData);
        } catch(e) {
            document.getElementById('dv-list').style.display = 'none';
            document.getElementById('dv-empty').style.display = 'block';
        }
    }

    function renderDevices(data) {
        var d = data.devices;
        var online = d.filter(function(x) { return x.status === 'online'; }).length;
        document.getElementById('dv-subtitle').textContent = online + ' of ' + d.length + ' device' + (d.length !== 1 ? 's' : '') + ' online';
        var cats = data.top_categories || [];
        var mitre = data.top_mitre_techniques || [];
        var ev = data.last_24h;

        var html = '';
        for (var i = 0; i < d.length; i++) {
            var x = d[i], on = x.status === 'online', risk = x.max_risk || 0;
            // Null-safe: API may return null instead of 0
            var cr = parseInt(x.critical_count) || 0;
            var hi = parseInt(x.high_count) || 0;
            var events = parseInt(x.event_count) || 0;
            var rtag = cr > 0 ? '<span class="dv-tag dv-tag-crit">Critical</span>'
                : hi > 0 ? '<span class="dv-tag dv-tag-warn">High Risk</span>'
                : '<span class="dv-tag dv-tag-ok">Healthy</span>';

            // Posture based on actual threat counts
            var ps, pl, pc;
            if (cr === 0 && hi === 0) { ps = 100; pl = 'All Clear'; pc = '#00ff88'; }
            else if (cr === 0) { ps = Math.max(60, 85 - hi); pl = 'Guarded'; pc = '#f0ad4e'; }
            else if (cr <= 10) { ps = Math.max(20, 55 - cr * 3); pl = 'Needs Attention'; pc = '#f0ad4e'; }
            else { ps = Math.max(5, 20 - Math.floor(cr / 5)); pl = 'Critical'; pc = '#ff3366'; }
            var circ = 2 * Math.PI * 18, off = circ * (1 - ps / 100);

            html += '<div class="dv-card" id="dvc-' + i + '">';

            // Header (clickable to expand)
            html += '<div class="dv-card-header" data-idx="' + i + '">'
                + '<div class="dv-icon">' + osIcon(x.os) + '<div class="dv-dot dv-dot-' + (on ? 'on' : 'off') + '"></div></div>'
                + '<div class="dv-info"><div class="dv-name">' + esc(x.hostname) + '</div>'
                + '<div class="dv-meta">'
                + '<span class="dv-tag-status ' + (on ? 'dv-online' : 'dv-offline') + '">' + (on ? 'Online' : timeAgo(x.last_seen)) + '</span>'
                + rtag + '</div></div>'
                + '<div class="dv-stats">';
            if (cr > 0) html += '<div class="dv-cs"><div class="dv-cs-val vc">' + cr + '</div><div class="dv-cs-lbl">Critical</div></div>';
            if (hi > 0) html += '<div class="dv-cs"><div class="dv-cs-val vh">' + hi + '</div><div class="dv-cs-lbl">High</div></div>';
            html += '<div class="dv-cs"><div class="dv-cs-val ve">' + events + '</div><div class="dv-cs-lbl">Events</div></div>';
            html += '</div><div class="dv-chevron">&#x203A;</div></div>';

            // Expandable detail
            html += '<div class="dv-detail"><div class="dv-detail-grid">';

            // Posture
            html += '<div class="dv-panel"><div class="dv-panel-t">Security Posture</div>'
                + '<div class="dv-posture-mini">'
                + '<div class="dv-mini-ring"><svg viewBox="0 0 44 44"><circle class="bg" cx="22" cy="22" r="18"/>'
                + '<circle class="fg" cx="22" cy="22" r="18" stroke="' + pc + '" stroke-dasharray="' + circ.toFixed(1) + '" stroke-dashoffset="' + off.toFixed(1) + '"/></svg>'
                + '<div class="dv-mini-val" style="color:' + pc + '">' + ps + '</div></div>'
                + '<div class="dv-mini-info"><div class="dv-mini-level" style="color:' + pc + '">' + pl + '</div>'
                + '<div class="dv-mini-desc">' + events + ' events in 24h</div></div></div></div>';

            // Needs Attention
            html += '<div class="dv-panel"><div class="dv-panel-t">Needs Attention</div>';
            if (cr > 0) html += alertItem('c', cr + ' critical threat' + (cr>1?'s':''), 'Review immediately');
            if (hi > 0) html += alertItem('h', hi + ' high-risk event' + (hi>1?'s':''), 'Worth investigating');
            if (cr === 0 && hi === 0) html += '<div style="color:#00ff88;font-size:0.82em;padding:8px 0;">No issues detected</div>';
            html += '</div>';

            // Activity (top categories for this device — using fleet-wide for now)
            html += '<div class="dv-panel"><div class="dv-panel-t">Top Activity</div>';
            if (cats.length > 0) {
                var maxC = cats[0].count;
                for (var j = 0; j < Math.min(4, cats.length); j++) {
                    var c = cats[j], pct = Math.max(3, c.count/maxC*100);
                    var clr = c.avg_risk >= 0.6 ? '#ff3366' : c.avg_risk >= 0.3 ? '#f0ad4e' : '#00d9ff';
                    html += '<div class="dv-bar"><span class="dv-bar-lbl">' + humanize(c.category) + '</span>'
                        + '<div class="dv-bar-bg"><div class="dv-bar-fill" style="width:' + pct + '%;background:' + clr + '"></div></div>'
                        + '<span class="dv-bar-cnt">' + c.count + '</span></div>';
                }
            }
            html += '</div>';

            // MITRE
            html += '<div class="dv-panel"><div class="dv-panel-t">MITRE Techniques Detected (24h)</div>';
            if (mitre.length > 0) {
                for (var j = 0; j < Math.min(6, mitre.length); j++) {
                    var m = mitre[j];
                    html += '<span class="dv-mt" title="' + mitreName(m.technique) + ' — ' + m.count + ' detections">'
                        + esc(m.technique) + ' <span class="dv-mt-cnt">' + m.count + '</span></span>';
                }
            } else { html += '<span style="color:#555;font-size:0.78em;">No detections</span>'; }
            html += '</div>';

            html += '</div>'; // detail-grid

            // Monitor button
            html += '<a href="/dashboard/device/' + encodeURIComponent(x.device_id) + '" class="dv-monitor-btn">'
                + '<svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 8h2l2-3 3 6 2-3h3"/></svg>'
                + 'See what\'s happening</a>';

            html += '</div></div>'; // detail, card
        }

        document.getElementById('dv-list').innerHTML = html;

        // Toggle expand on header click
        document.querySelectorAll('.dv-card-header').forEach(function(hdr) {
            hdr.addEventListener('click', function() {
                var card = document.getElementById('dvc-' + hdr.dataset.idx);
                card.classList.toggle('expanded');
            });
        });
    }

    function alertItem(level, title, sub) {
        return '<div class="dv-alert-item"><div class="dv-alert-dot dv-adot-' + level + '"></div>'
            + '<div><div class="dv-alert-text">' + title + '</div><div class="dv-alert-sub">' + sub + '</div></div></div>';
    }

    function humanize(s) {
        if (!s) return '';
        var map = { 'process_spawned':'Process Execution', 'lolbin_execution':'Suspicious Binary', 'new_external_connection':'External Connection',
            'tcc_permission_denied':'Permission Denied', 'exfil_spike':'Data Exfiltration', 'macos_config_backdoor_new':'Config Backdoor',
            'c2_beacon_suspect':'C2 Beacon', 'topology_new_route':'Route Change', 'dns_beaconing_suspected':'DNS Beaconing',
            'high_cpu':'High CPU', 'full_kill_chain':'Kill Chain', 'rapid_app_switch':'App Switching' };
        return map[s] || s.replace(/_/g, ' ').replace(/\b\w/g, function(c) { return c.toUpperCase(); });
    }
    function osIcon(os) {
        os = (os || '').toLowerCase();
        if (os.includes('darwin') || os.includes('macos') || os.includes('mac')) {
            return '<svg width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M18.7 8.5c-.1.1-2.1 1.2-2.1 3.7 0 2.9 2.5 3.9 2.6 3.9 0 .1-.4 1.4-1.3 2.7-.8 1.2-1.7 2.4-3 2.4s-1.6-.8-3.1-.8-1.9.8-3.1.8-2-.7-2.9-2.4C4.6 16.7 3.7 14 3.7 11.4c0-3.5 2.3-5.4 4.5-5.4 1.2 0 2.2.8 2.9.8.7 0 1.9-.8 3.3-.8.5 0 2.4 0 3.6 1.8l.7.7z" stroke="#6b7a99" stroke-width="1.2"/><circle cx="15" cy="4" r="1.5" fill="#6b7a99" opacity="0.5"/></svg>';
        }
        if (os.includes('linux') || os.includes('ubuntu')) {
            return '<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#6b7a99" stroke-width="1.2"><circle cx="12" cy="8" r="4"/><path d="M8 14c-2 1-3 3-3 5h14c0-2-1-4-3-5"/><circle cx="10" cy="7.5" r="0.8" fill="#6b7a99"/><circle cx="14" cy="7.5" r="0.8" fill="#6b7a99"/></svg>';
        }
        if (os.includes('windows') || os.includes('win')) {
            return '<svg width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M3 5l8-1.2v7.7H3V5zm0 8.5h8v7.7L3 20v-6.5zm9.5-9.9L22 2v9.5h-9.5V3.6zm0 8.4H22V22l-9.5-1.4v-8.6z" stroke="#6b7a99" stroke-width="1.2"/></svg>';
        }
        return '<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#6b7a99" stroke-width="1.5"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>';
    }

    function mitreName(id) {
        var names = {
            'T1059':'Command and Scripting Interpreter','T1059.002':'AppleScript','T1059.004':'Unix Shell',
            'T1204':'User Execution','T1218':'System Binary Proxy Execution','T1071':'Application Layer Protocol',
            'T1071.001':'Web Protocols','T1071.004':'DNS','T1548':'Abuse Elevation Control',
            'T1548.003':'Sudo and Sudo Caching','T1048':'Exfiltration Over Alternative Protocol',
            'T1048.002':'Exfiltration Over Asymmetric Encrypted Non-C2',
            'T1016':'System Network Configuration Discovery','T1046':'Network Service Scanning',
            'T1040':'Network Sniffing','T1110':'Brute Force','T1078':'Valid Accounts',
            'T1543.001':'Launch Agent','T1543.004':'Launch Daemon','T1053.003':'Cron',
            'T1070':'Indicator Removal','T1070.002':'Clear Linux or Mac System Logs',
            'T1565':'Data Manipulation','T1566.002':'Spearphishing Link',
            'T1041':'Exfiltration Over C2 Channel','T1496':'Resource Hijacking',
            'T1553.001':'Gatekeeper Bypass','T1200':'Hardware Additions',
            'T1557.001':'LLMNR/NBT-NS Poisoning','T1572':'Protocol Tunneling',
            'T1583':'Acquire Infrastructure','T1098.004':'SSH Authorized Keys',
            'T1546.004':'Unix Shell Configuration Modification','T1546.015':'Component Object Model Hijacking',
            'T1555.001':'Keychain','T1090.002':'External Proxy','T1090.003':'Multi-hop Proxy',
            'T1567':'Exfiltration Over Web Service','T1018':'Remote System Discovery',
        };
        return names[id] || id;
    }

    function timeAgo(ep) { if(!ep)return'never';var s=Math.floor(Date.now()/1000-ep);if(s<60)return s+'s ago';if(s<3600)return Math.floor(s/60)+'m ago';if(s<86400)return Math.floor(s/3600)+'h ago';return Math.floor(s/86400)+'d ago'; }
    function esc(s) { if(!s)return'';var d=document.createElement('div');d.textContent=s;return d.innerHTML; }
})();
</script>
{% endblock %}

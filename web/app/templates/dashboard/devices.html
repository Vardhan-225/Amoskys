{% extends "dashboard/base.html" %}

{% block title %}AMOSKYS — Devices{% endblock %}

{% block content %}
<div class="dv">

    <!-- Fleet Summary -->
    <div class="dv-summary" id="dv-summary"></div>

    <!-- Header -->
    <div class="dv-header">
        <h2 class="dv-section-title">Devices</h2>
        <a href="/dashboard/deploy" class="dv-add-btn">
            <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M8 3v10M3 8h10"/></svg>
            Add Device
        </a>
    </div>

    <!-- Device List -->
    <div id="dv-list" class="dv-list">
        <div class="dv-loading"><div class="neural-loading"></div></div>
    </div>

    <!-- Empty State -->
    <div id="dv-empty" class="dv-empty" style="display:none;">
        <div class="dv-empty-shield">
            <img src="{{ url_for('static', filename='images/amoskys-logo.svg') }}" alt="AMOSKYS" width="80" height="80" style="opacity:0.3;">
        </div>
        <h2>No devices yet</h2>
        <p>Install the AMOSKYS agent to start protecting your Mac.</p>
        <a href="/dashboard/deploy" class="dv-empty-btn">Install on your Mac</a>
    </div>

</div>

<style>
.dv { max-width: 960px; margin: 0 auto; padding: 20px; }

/* ── Fleet Summary ── */
.dv-summary {
    display: grid;
    grid-template-columns: 2fr 1fr 1fr 1fr 1fr;
    gap: 12px;
    margin-bottom: 24px;
}
@media (max-width: 700px) { .dv-summary { grid-template-columns: 1fr 1fr; } }

.dv-posture-card {
    background: linear-gradient(135deg, #0d1530 0%, #111d3a 100%);
    border: 1px solid #1e2a45;
    border-radius: 14px;
    padding: 20px;
    display: flex;
    align-items: center;
    gap: 18px;
    grid-row: span 1;
}
.dv-posture-ring { position: relative; width: 64px; height: 64px; flex-shrink: 0; }
.dv-posture-ring svg { width: 64px; height: 64px; transform: rotate(-90deg); }
.dv-posture-ring .ring-bg { fill: none; stroke: #1e2a45; stroke-width: 5; }
.dv-posture-ring .ring-fg { fill: none; stroke-width: 5; stroke-linecap: round; }
.dv-posture-val { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); font-size: 1.2em; font-weight: 800; }
.dv-posture-info {}
.dv-posture-label { font-size: 0.7em; color: #6b7a99; text-transform: uppercase; letter-spacing: 0.5px; }
.dv-posture-level { font-size: 1.15em; font-weight: 700; margin-top: 2px; }
.dv-posture-sub { font-size: 0.75em; color: #6b7a99; margin-top: 4px; }

.dv-stat-card {
    background: #0f1628;
    border: 1px solid #1e2a45;
    border-radius: 12px;
    padding: 16px;
    display: flex;
    flex-direction: column;
    justify-content: center;
}
.dv-stat-label { font-size: 0.65em; color: #6b7a99; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
.dv-stat-value { font-size: 1.8em; font-weight: 800; line-height: 1; }
.dv-stat-sub { font-size: 0.7em; color: #6b7a99; margin-top: 4px; }

/* ── Header ── */
.dv-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
.dv-section-title { font-size: 0.85em; color: #6b7a99; text-transform: uppercase; letter-spacing: 1px; font-weight: 700; }
.dv-add-btn {
    display: flex; align-items: center; gap: 5px;
    padding: 6px 14px;
    background: rgba(0,217,255,0.1);
    border: 1px solid rgba(0,217,255,0.2);
    color: #00d9ff;
    font-weight: 700; font-size: 0.78em;
    border-radius: 6px; text-decoration: none;
    transition: all 0.15s;
}
.dv-add-btn:hover { background: rgba(0,217,255,0.2); border-color: #00d9ff; }

/* ── Loading ── */
.dv-loading { text-align: center; padding: 60px; }

/* ── Device Cards ── */
.dv-card {
    background: #0f1628;
    border: 1px solid #1e2a45;
    border-radius: 14px;
    padding: 16px 20px;
    margin-bottom: 10px;
    display: grid;
    grid-template-columns: auto 1fr auto auto;
    align-items: center;
    gap: 16px;
    cursor: pointer;
    transition: all 0.2s;
}
.dv-card:hover {
    border-color: #00d9ff33;
    background: #111c34;
    box-shadow: 0 4px 20px rgba(0,0,0,0.25);
    transform: translateY(-1px);
}

/* Status dot with device icon */
.dv-device-icon {
    width: 42px; height: 42px;
    border-radius: 10px;
    background: #0a0e20;
    border: 1px solid #1e2a45;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    flex-shrink: 0;
}
.dv-device-icon svg { opacity: 0.5; }
.dv-device-dot {
    position: absolute;
    bottom: -2px; right: -2px;
    width: 10px; height: 10px;
    border-radius: 50%;
    border: 2px solid #0f1628;
}
.dv-dot-online { background: #00ff88; box-shadow: 0 0 6px #00ff8866; }
.dv-dot-offline { background: #555; }

/* Device info */
.dv-info { min-width: 0; }
.dv-name { font-size: 0.95em; font-weight: 700; color: #e0e8f0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.dv-meta { display: flex; gap: 8px; margin-top: 3px; flex-wrap: wrap; }
.dv-tag { font-size: 0.68em; color: #6b7a99; padding: 1px 6px; background: rgba(0,217,255,0.05); border-radius: 3px; }
.dv-tag-risk { color: #ff3366; background: rgba(255,51,102,0.08); }
.dv-tag-ok { color: #00ff88; background: rgba(0,255,136,0.08); }

/* Device stats (right side) */
.dv-card-stats { display: flex; gap: 14px; flex-shrink: 0; }
.dv-card-stat { text-align: right; }
.dv-card-stat-val { font-size: 1.1em; font-weight: 700; line-height: 1.2; }
.dv-card-stat-lbl { font-size: 0.6em; color: #6b7a99; text-transform: uppercase; letter-spacing: 0.3px; }
.val-crit { color: #ff3366; }
.val-high { color: #f0ad4e; }
.val-events { color: #00d9ff; }
.val-ok { color: #00ff88; }

/* Arrow */
.dv-arrow { color: #2a3050; font-size: 1.4em; flex-shrink: 0; transition: color 0.15s; }
.dv-card:hover .dv-arrow { color: #00d9ff; }

/* ── Empty ── */
.dv-empty { text-align: center; padding: 80px 20px; }
.dv-empty-shield { margin-bottom: 20px; }
.dv-empty h2 { font-size: 1.2em; color: #c8d6e5; margin-bottom: 6px; }
.dv-empty p { color: #6b7a99; margin-bottom: 20px; font-size: 0.9em; }
.dv-empty-btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 10px 22px; background: linear-gradient(135deg, #00b894, #00d9ff);
    color: #0a0e27; font-weight: 700; font-size: 0.9em;
    border-radius: 8px; text-decoration: none;
}
.dv-empty-btn:hover { box-shadow: 0 4px 15px rgba(0,217,255,0.3); transform: translateY(-1px); }
</style>

<script nonce="{{ csp_nonce() }}">
(function() {
    loadDevices();
    setInterval(loadDevices, 15000);

    async function loadDevices() {
        try {
            var resp = await fetch('/dashboard/api/command-center/status');
            var data = await resp.json();

            var listEl = document.getElementById('dv-list');
            var emptyEl = document.getElementById('dv-empty');
            var summaryEl = document.getElementById('dv-summary');

            if (!data.available || !data.devices || data.devices.length === 0) {
                listEl.style.display = 'none';
                summaryEl.style.display = 'none';
                emptyEl.style.display = 'block';
                return;
            }

            var devices = data.devices;
            var f = data.fleet;
            var e = data.last_24h;

            // Compute fleet posture
            var totalRisk = 0;
            var maxRisk = 0;
            devices.forEach(function(d) {
                totalRisk += (d.max_risk || 0);
                maxRisk = Math.max(maxRisk, d.max_risk || 0);
            });
            var avgRisk = totalRisk / Math.max(devices.length, 1);
            var postureScore = Math.round((1 - avgRisk * 0.6 - maxRisk * 0.4) * 100);
            postureScore = Math.max(0, Math.min(100, postureScore));
            var postureLevel = postureScore >= 80 ? 'Secure' : postureScore >= 60 ? 'Guarded' : postureScore >= 30 ? 'At Risk' : 'Critical';
            var postureColor = postureScore >= 80 ? '#00ff88' : postureScore >= 60 ? '#f0ad4e' : '#ff3366';

            // Summary
            var circ = 2 * Math.PI * 26;
            var offset = circ * (1 - postureScore / 100);
            summaryEl.style.display = 'grid';
            summaryEl.innerHTML =
                '<div class="dv-posture-card">'
                + '<div class="dv-posture-ring"><svg viewBox="0 0 60 60"><circle class="ring-bg" cx="30" cy="30" r="26"/>'
                + '<circle class="ring-fg" cx="30" cy="30" r="26" stroke="' + postureColor + '" stroke-dasharray="' + circ.toFixed(1) + '" stroke-dashoffset="' + offset.toFixed(1) + '"/></svg>'
                + '<div class="dv-posture-val" style="color:' + postureColor + '">' + postureScore + '</div></div>'
                + '<div class="dv-posture-info"><div class="dv-posture-label">Fleet Posture</div>'
                + '<div class="dv-posture-level" style="color:' + postureColor + '">' + postureLevel + '</div>'
                + '<div class="dv-posture-sub">' + f.online + ' of ' + f.total_devices + ' devices online</div></div></div>'
                + statCard('Events', e.total_events, '#00d9ff', '24 hours')
                + statCard('Critical', e.critical, e.critical > 0 ? '#ff3366' : '#00ff88', 'threats')
                + statCard('High', e.high, e.high > 0 ? '#f0ad4e' : '#00ff88', 'threats')
                + statCard('MITRE', (data.top_mitre_techniques || []).length, '#00d9ff', 'techniques');

            // Device cards
            var html = '';
            for (var i = 0; i < devices.length; i++) {
                var d = devices[i];
                var isOnline = d.status === 'online';
                var risk = d.max_risk || 0;
                var crit = d.critical_count || 0;
                var high = d.high_count || 0;
                var events = d.event_count || 0;
                var riskTag = risk >= 0.8 ? '<span class="dv-tag dv-tag-risk">Critical</span>'
                    : risk >= 0.6 ? '<span class="dv-tag dv-tag-risk">High Risk</span>'
                    : '<span class="dv-tag dv-tag-ok">Healthy</span>';
                var lastSeen = d.last_seen ? timeAgo(d.last_seen) : 'never';

                html += '<div class="dv-card" data-href="/dashboard/device/' + encodeURIComponent(d.device_id) + '">'
                    // Device icon + status dot
                    + '<div class="dv-device-icon">'
                    + '<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#6b7a99" stroke-width="1.5"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>'
                    + '<div class="dv-device-dot dv-dot-' + (isOnline ? 'online' : 'offline') + '"></div></div>'
                    // Info
                    + '<div class="dv-info"><div class="dv-name">' + esc(d.hostname) + '</div>'
                    + '<div class="dv-meta">'
                    + '<span class="dv-tag">' + esc(d.os || '') + ' ' + esc(d.arch || '') + '</span>'
                    + '<span class="dv-tag">' + (isOnline ? 'Online' : lastSeen) + '</span>'
                    + riskTag
                    + '</div></div>'
                    // Stats
                    + '<div class="dv-card-stats">';

                if (crit > 0) html += '<div class="dv-card-stat"><div class="dv-card-stat-val val-crit">' + crit + '</div><div class="dv-card-stat-lbl">Critical</div></div>';
                if (high > 0) html += '<div class="dv-card-stat"><div class="dv-card-stat-val val-high">' + high + '</div><div class="dv-card-stat-lbl">High</div></div>';
                html += '<div class="dv-card-stat"><div class="dv-card-stat-val val-events">' + events + '</div><div class="dv-card-stat-lbl">Events</div></div>';

                html += '</div><div class="dv-arrow">&#x203A;</div></div>';
            }

            listEl.innerHTML = html;

            // Click handlers
            listEl.querySelectorAll('.dv-card[data-href]').forEach(function(card) {
                card.addEventListener('click', function() {
                    window.location.href = card.getAttribute('data-href');
                });
            });

        } catch(err) {
            document.getElementById('dv-list').style.display = 'none';
            document.getElementById('dv-empty').style.display = 'block';
        }
    }

    function statCard(label, value, color, sub) {
        return '<div class="dv-stat-card"><div class="dv-stat-label">' + label + '</div>'
            + '<div class="dv-stat-value" style="color:' + color + '">' + value + '</div>'
            + '<div class="dv-stat-sub">' + sub + '</div></div>';
    }

    function timeAgo(epoch) {
        if (!epoch) return 'never';
        var s = Math.floor(Date.now() / 1000 - epoch);
        if (s < 0) return 'now';
        if (s < 60) return s + 's ago';
        if (s < 3600) return Math.floor(s / 60) + 'm ago';
        if (s < 86400) return Math.floor(s / 3600) + 'h ago';
        return Math.floor(s / 86400) + 'd ago';
    }

    function esc(s) {
        if (!s) return '';
        var d = document.createElement('div');
        d.textContent = s;
        return d.innerHTML;
    }
})();
</script>
{% endblock %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Welcome to AMOSKYS</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Inter',-apple-system,sans-serif;background:#060a1a;color:#e0e8f0;overflow:hidden;height:100vh;width:100vw}

        /* Neural grid */
        body::before{content:'';position:fixed;top:0;left:0;width:100%;height:100%;background-image:linear-gradient(rgba(0,217,255,0.025) 1px,transparent 1px),linear-gradient(90deg,rgba(0,217,255,0.025) 1px,transparent 1px);background-size:50px 50px;z-index:0;pointer-events:none}

        /* Steps */
        .step{position:absolute;top:0;left:0;width:100vw;height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity 0.8s ease,transform 0.8s ease;transform:scale(0.95);z-index:1}
        .step.active{opacity:1;pointer-events:auto;transform:scale(1);z-index:10}
        .step.exit{opacity:0;transform:scale(1.05);pointer-events:none}

        /* ═══ STEP 1: IGRIS GREETING ═══ */
        .s1-logo{width:120px;height:120px;margin-bottom:24px;animation:breathe 4s ease-in-out infinite}
        .s1-logo img{width:120px;height:120px;filter:drop-shadow(0 0 30px rgba(0,217,255,0.4))}
        @keyframes breathe{0%,100%{filter:drop-shadow(0 0 30px rgba(0,217,255,0.4));transform:scale(1)}50%{filter:drop-shadow(0 0 50px rgba(0,255,136,0.5));transform:scale(1.03)}}
        .s1-hi{font-size:1.6em;font-weight:300;color:#6b7a99;opacity:0;animation:fadeUp .8s ease-out .3s forwards}
        .s1-name{font-size:2.6em;font-weight:800;background:linear-gradient(135deg,#fff,#00d9ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;opacity:0;animation:fadeUp .8s ease-out .6s forwards}
        .s1-desc{font-size:1em;color:#6b7a99;margin-top:14px;max-width:480px;text-align:center;line-height:1.7;opacity:0;animation:fadeUp .8s ease-out .9s forwards}
        .s1-desc strong{color:#00d9ff;font-weight:700}
        .s1-cta{margin-top:40px;opacity:0;animation:fadeUp .8s ease-out 1.3s forwards}
        .cta-btn{display:flex;align-items:center;gap:8px;padding:12px 28px;background:transparent;border:1px solid rgba(0,217,255,0.3);color:#00d9ff;font-weight:700;font-size:0.9em;border-radius:10px;cursor:pointer;transition:all .25s;letter-spacing:0.5px}
        .cta-btn:hover{background:rgba(0,217,255,0.08);border-color:#00d9ff;transform:translateY(-2px);box-shadow:0 4px 20px rgba(0,217,255,0.15)}
        .cta-btn svg{transition:transform .3s}
        .cta-btn:hover svg{transform:translateX(4px)}
        @keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}

        /* ═══ STEP 2: AGENT SHOWCASE ═══ */
        .s2-canvas{position:relative;width:100vw;height:100vh}

        /* Center stage */
        .stage{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:500px;height:500px}
        @media(max-width:600px){.stage{width:320px;height:320px}}

        /* Center logo */
        .stage-logo{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:70px;height:70px;z-index:20;transition:all 1s}
        .stage-logo img{width:70px;height:70px;filter:drop-shadow(0 0 15px rgba(0,217,255,0.3))}

        /* Agent particles */
        .particle{position:absolute;top:50%;left:50%;width:12px;height:12px;margin:-6px 0 0 -6px;border-radius:50%;background:#1e2a45;border:1.5px solid #2a3858;transition:all 1.2s cubic-bezier(0.34,1.56,0.64,1);opacity:0;z-index:5}
        .particle.deployed{opacity:1;width:36px;height:36px;margin:-18px 0 0 -18px;background:#0a1028;border-color:#1e2a45}
        .particle.active{border-color:#00d9ff;background:#0d1530;box-shadow:0 0 20px rgba(0,217,255,0.3);width:44px;height:44px;margin:-22px 0 0 -22px;z-index:15}
        .particle-inner{width:100%;height:100%;display:flex;align-items:center;justify-content:center;border-radius:50%}
        .particle-inner svg{width:14px;height:14px;opacity:0;transition:opacity .3s}
        .particle.deployed .particle-inner svg{opacity:0.5}
        .particle.active .particle-inner svg{opacity:1}
        .particle-label{position:absolute;top:105%;left:50%;transform:translateX(-50%);white-space:nowrap;font-size:0.55em;color:#555;opacity:0;transition:opacity .3s}
        .particle.active .particle-label{opacity:1;color:#00d9ff}

        /* Connection lines */
        .connections{position:absolute;top:0;left:0;width:100%;height:100%;z-index:1}
        .conn-line{stroke:#1e2a45;stroke-width:0.5;opacity:0;transition:opacity .5s}
        .conn-line.visible{opacity:0.3}
        .conn-line.active{stroke:#00d9ff;opacity:0.6;stroke-width:1}

        /* Info panel (bottom of screen) */
        .info-panel{position:absolute;bottom:0;left:0;right:0;padding:30px 40px 24px;background:linear-gradient(180deg,transparent,rgba(6,10,26,0.95) 30%);z-index:30;opacity:0;transition:opacity .5s}
        .info-panel.visible{opacity:1}
        .info-name{font-size:1.2em;font-weight:800;color:#00d9ff;margin-bottom:4px;min-height:1.2em}
        .info-desc{font-size:0.85em;color:#6b7a99;line-height:1.6;max-width:600px;min-height:40px}
        .info-tags{display:flex;flex-wrap:wrap;gap:5px;margin-top:10px}
        .info-tag{padding:2px 8px;border-radius:3px;font-size:0.68em}
        .info-tag-probe{background:rgba(0,217,255,0.06);border:1px solid #1a2540;color:#00d9ff}
        .info-tag-mitre{background:rgba(255,68,102,0.06);border:1px solid #2a1525;color:#ff6688;font-family:monospace}
        .info-nav{display:flex;align-items:center;gap:12px;margin-bottom:8px}
        .info-arrow{background:none;border:1px solid #1e2a45;color:#6b7a99;width:32px;height:32px;border-radius:6px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s}
        .info-arrow:hover{border-color:#00d9ff;color:#00d9ff}
        .info-counter{font-size:0.7em;color:#555;letter-spacing:1px}

        /* Collapse animation */
        .particle.collapsing{transition:all 1.5s cubic-bezier(0.68,-0.55,0.27,1.55)!important;left:50%!important;top:50%!important;width:8px!important;height:8px!important;margin:-4px 0 0 -4px!important;opacity:0.6!important;border-color:#00d9ff!important}
        .conn-line.collapsing{opacity:0!important;transition:opacity .8s!important}
        .stage-logo.collapsed{transform:translate(-50%,-50%) scale(1.3)!important;filter:drop-shadow(0 0 50px rgba(0,217,255,0.6))!important;transition:all 1s ease-out!important}

        /* Collapse message */
        .collapse-msg{position:absolute;bottom:80px;left:0;right:0;text-align:center;opacity:0;transition:opacity .8s;z-index:35;pointer-events:none}
        .collapse-msg.visible{opacity:1}
        .collapse-title{font-size:2em;font-weight:800;color:#fff;margin-bottom:4px}
        .collapse-sub{font-size:1em;color:#6b7a99}

        /* Progress bar */
        .s2-progress{position:absolute;bottom:12px;left:40px;right:40px;height:2px;background:#1a2040;border-radius:1px;z-index:31;overflow:hidden}
        .s2-progress-fill{height:100%;background:linear-gradient(90deg,#00d9ff,#00ff88);border-radius:1px;transition:width .3s}

        /* Next button */
        .s2-next{position:absolute;bottom:30px;right:40px;z-index:32;opacity:0;transition:opacity .5s}
        .s2-next.visible{opacity:1}

        /* Skip button (step 2) */
        .s2-skip{position:absolute;top:28px;right:40px;z-index:32}
        .s2-skip button{background:none;border:1px solid #1e2a45;color:#555;font-size:0.78em;padding:6px 16px;border-radius:6px;cursor:pointer;transition:all .2s;letter-spacing:0.3px}
        .s2-skip button:hover{border-color:#6b7a99;color:#6b7a99}

        /* ═══ STEP 3: INSTALL ═══ */
        .s3-logo{width:140px;height:140px;margin-bottom:20px}
        .s3-logo img{width:140px;height:140px;filter:drop-shadow(0 0 40px rgba(0,217,255,0.5))}
        .s3-shine{position:absolute;width:300px;height:300px;background:radial-gradient(ellipse,rgba(0,217,255,0.12),transparent 70%);animation:shine 3s ease-in-out infinite;pointer-events:none}
        @keyframes shine{0%,100%{opacity:.3;transform:scale(1)}50%{opacity:1;transform:scale(1.4)}}
        .s3-title{font-size:2em;font-weight:800;color:#fff;margin-bottom:6px;opacity:0;animation:fadeUp .8s ease-out .5s forwards}
        .s3-sub{font-size:0.95em;color:#6b7a99;margin-bottom:30px;opacity:0;animation:fadeUp .8s ease-out .8s forwards}
        .install-btn{display:inline-flex;align-items:center;gap:10px;padding:14px 34px;background:linear-gradient(135deg,#00b894,#00d9ff);color:#060a1a;font-weight:800;font-size:1em;border-radius:12px;text-decoration:none;border:none;cursor:pointer;opacity:0;animation:fadeUp .8s ease-out 1.1s forwards;transition:all .2s}
        .install-btn:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(0,217,255,0.3)}
        .skip-link{color:#444;font-size:0.78em;cursor:pointer;background:none;border:none;margin-top:16px;opacity:0;animation:fadeUp .8s ease-out 1.4s forwards}
        .skip-link:hover{color:#666}
    </style>
</head>
<body>

    <!-- ═══ STEP 1: GREETING ═══ -->
    <div class="step active" id="step1">
        <div class="s1-logo"><img src="/static/images/amoskys-logo.svg" alt="IGRIS"></div>
        <div class="s1-hi">Hi,</div>
        <div class="s1-name">{{ user.full_name or 'there' }}</div>
        <p class="s1-desc">I'm <strong>IGRIS</strong>, your security analyst. I watch your devices for threats, anomalies, and suspicious behavior — so you don't have to.</p>
        <div class="s1-cta">
            <button class="cta-btn" id="btn-start">
                Let's get started
                <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 8h10M9 4l4 4-4 4"/></svg>
            </button>
        </div>
    </div>

    <!-- ═══ STEP 2: AGENT SHOWCASE ═══ -->
    <div class="step" id="step2">
        <div class="s2-canvas">
            <div class="stage" id="stage">
                <svg class="connections" id="conn-svg" viewBox="0 0 500 500"></svg>
                <div class="stage-logo" id="stage-logo"><img src="/static/images/amoskys-logo.svg" alt="AMOSKYS"></div>
            </div>
            <div class="info-panel" id="info-panel">
                <div class="info-nav">
                    <button class="info-arrow" id="info-prev"><svg width="18" height="18" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 4l-4 4 4 4"/></svg></button>
                    <div class="info-counter" id="info-counter"></div>
                    <button class="info-arrow" id="info-next"><svg width="18" height="18" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 4l4 4-4 4"/></svg></button>
                </div>
                <div class="info-name" id="info-name"></div>
                <div class="info-desc" id="info-desc"></div>
                <div class="info-tags" id="info-tags"></div>
            </div>
            <!-- Collapse message (after full cycle) -->
            <div class="collapse-msg" id="collapse-msg">
                <div class="collapse-title" id="collapse-title">AMOSKYS</div>
                <div class="collapse-sub">Securing every layer.</div>
            </div>
            <div class="s2-skip" id="s2-skip"><button id="btn-skip-showcase">Skip</button></div>
            <div class="s2-progress"><div class="s2-progress-fill" id="s2-progress"></div></div>
            <div class="s2-next" id="s2-next">
                <button class="cta-btn" id="btn-install">
                    Install on my Mac
                    <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 8h10M9 4l4 4-4 4"/></svg>
                </button>
            </div>
        </div>
    </div>

    <!-- ═══ STEP 3: INSTALL ═══ -->
    <div class="step" id="step3">
        <div class="s3-shine"></div>
        <div class="s3-logo"><img src="/static/images/amoskys-logo.svg" alt="AMOSKYS"></div>
        <h1 class="s3-title">AMOSKYS</h1>
        <p class="s3-sub">Your partner in securing your devices.</p>
        <a href="/dashboard/deploy" class="install-btn">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M12 2L2 7v6c0 5.5 4.2 10.7 10 12 5.8-1.3 10-6.5 10-12V7L12 2z" stroke="currentColor" stroke-width="2"/><path d="M9 12l2 2 4-4" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
            Install on my Mac
        </a>
        <button class="skip-link" id="skip-setup">I'll do this later</button>
    </div>

<script nonce="{{ csp_nonce() }}">
(function(){
    var agents=[
        {n:'Process Monitor',d:'Tracks every process on your device. Detects suspicious binaries, high CPU anomalies, and unauthorized execution.',p:['Process Spawn','LOLBin Detection','CPU Anomaly','Binary Reputation'],m:['T1059','T1204','T1218']},
        {n:'Auth Guard',d:'Monitors authentication — failed logins, credential access, sudo escalation, and off-hours activity.',p:['Login Monitor','Sudo Watch','Credential Access','Off-Hours Alert'],m:['T1078','T1110','T1548']},
        {n:'Network Flow',d:'Watches every network connection. Detects exfiltration, C2 beacons, port scanning, and tunnels.',p:['Connection Tracker','Exfil Detection','C2 Beacon','Port Scan'],m:['T1071','T1048','T1046']},
        {n:'DNS Intelligence',d:'Analyzes DNS queries for beaconing, DGA domains, DNS tunneling, and newly-seen domains.',p:['Beacon Detector','DGA Analysis','DNS Tunnel','New Domain'],m:['T1071.004','T1572']},
        {n:'File Integrity',d:'Monitors critical files for unauthorized changes, config backdoors, and log tampering.',p:['Critical File Watch','Config Monitor','Log Integrity'],m:['T1070','T1565']},
        {n:'Persistence Watcher',d:'Detects persistence — LaunchAgents, cron jobs, shell profiles, SSH keys.',p:['LaunchAgent Watch','Cron Monitor','Shell Profile','SSH Key'],m:['T1543','T1053','T1546']},
        {n:'Peripheral Guard',d:'Tracks USB devices and removable media connections.',p:['USB Monitor','Media Mount','Device Fingerprint'],m:['T1200']},
        {n:'Discovery Scanner',d:'Maps network topology. Detects new hosts, ARP changes, rogue DHCP.',p:['ARP Watch','Topology Map','Rogue DHCP'],m:['T1016','T1018']},
        {n:'App Log Analyzer',d:'Parses application and system logs for security events and anomalies.',p:['Log Parser','Error Detector','Event Correlator'],m:[]},
        {n:'Internet Activity',d:'Monitors usage patterns — late night connections, geo anomalies, cloud exfil.',p:['Night Watch','Geo Anomaly','Cloud Exfil','VPN Detect'],m:['T1567','T1090']},
        {n:'DB Activity',d:'Monitors database access for unauthorized queries and data patterns.',p:['Query Monitor','Access Pattern'],m:[]},
        {n:'HTTP Inspector',d:'Analyzes HTTP traffic for suspicious patterns and data leaks.',p:['Request Analyzer','Payload Scan'],m:['T1071.001']},
        {n:'Provenance Engine',d:'Tracks process lineage and kill chains. Detects execute-to-exfil patterns.',p:['Kill Chain','PID Anomaly','Exfil Chain'],m:['T1204','T1041']},
        {n:'Quarantine Guard',d:'Monitors Gatekeeper and quarantine bypasses for unverified software.',p:['Gatekeeper Watch','Quarantine Bypass'],m:['T1553']},
        {n:'Infostealer Guard',d:'Detects credential theft — screen capture, keychain access, browser extraction.',p:['Screen Capture','Keychain Watch','Browser Creds'],m:['T1555']},
        {n:'Realtime Sensor',d:'Real-time TCC permissions, Gatekeeper blocks, temp directory execution.',p:['TCC Monitor','Gatekeeper','Temp Execution'],m:['T1548']},
        {n:'Network Sentinel',d:'Network-level threat detection — lateral movement, protocol anomalies.',p:['Lateral Movement','Protocol Anomaly','Network Attack'],m:['T1046','T1040']},
    ];

    var stageW=500,cx=250,cy=250,radius=180;
    var isMobile=window.innerWidth<600;
    if(isMobile){stageW=320;cx=160;cy=160;radius=115}

    // Create particles + connection lines
    var stageEl=document.getElementById('stage');
    var connSvg=document.getElementById('conn-svg');
    connSvg.setAttribute('viewBox','0 0 '+stageW+' '+stageW);
    var connHtml='';
    var particles=[];

    agents.forEach(function(a,i){
        var angle=(i/agents.length)*2*Math.PI-Math.PI/2;
        var tx=cx+radius*Math.cos(angle);
        var ty=cy+radius*Math.sin(angle);

        var el=document.createElement('div');
        el.className='particle';
        el.dataset.idx=i;
        el.dataset.tx=tx;
        el.dataset.ty=ty;
        el.innerHTML='<div class="particle-inner"><svg viewBox="0 0 16 16" fill="none" stroke="#00d9ff" stroke-width="1.5"><circle cx="8" cy="8" r="4"/><circle cx="8" cy="8" r="1" fill="#00d9ff"/></svg></div><div class="particle-label">'+a.n+'</div>';
        stageEl.appendChild(el);
        particles.push(el);

        connHtml+='<line class="conn-line" id="conn-'+i+'" x1="'+cx+'" y1="'+cy+'" x2="'+tx+'" y2="'+ty+'"/>';
    });
    connSvg.innerHTML=connHtml;

    // ── Step transitions ──
    var currentStep=1;

    function goStep(n){
        var cur=document.getElementById('step'+currentStep);
        var next=document.getElementById('step'+n);
        cur.classList.remove('active');
        cur.classList.add('exit');
        setTimeout(function(){cur.classList.remove('exit')},800);
        next.classList.add('active');
        currentStep=n;
        if(n===2) startShowcase();
    }

    document.getElementById('btn-start').addEventListener('click',function(){goStep(2)});
    document.getElementById('btn-install').addEventListener('click',function(){goStep(3)});

    // Skip showcase → jump to step 3
    document.getElementById('btn-skip-showcase').addEventListener('click',function(){goStep(3)});

    // Prev/Next arrows — pause auto-cycle, resume after 5s
    function manualNav(newIdx){
        clearInterval(showcaseTimer);showcaseTimer=null;
        clearTimeout(resumeTimeout);
        showcaseIdx=newIdx;
        showAgent(showcaseIdx);
        // If we've seen the last agent, trigger collapse after a beat
        if(showcaseIdx===agents.length-1 && cycleCount>=1){
            setTimeout(collapseToLogo,2500);
        } else {
            // Resume auto-cycle after 5s of no interaction
            resumeTimeout=setTimeout(function(){
                showcaseTimer=setInterval(showcaseNext,3000);
            },5000);
        }
    }
    var resumeTimeout=null;

    document.getElementById('info-prev').addEventListener('click',function(){
        manualNav((showcaseIdx-1+agents.length)%agents.length);
    });
    document.getElementById('info-next').addEventListener('click',function(){
        var nextIdx=(showcaseIdx+1)%agents.length;
        if(nextIdx===0) cycleCount++;
        manualNav(nextIdx);
    });

    document.getElementById('skip-setup').addEventListener('click',async function(){
        await fetch('/dashboard/api/setup/complete',{method:'POST'});
        window.location.href='/dashboard';
    });

    // ── Agent showcase sequence ──
    var showcaseIdx=-1;
    var showcaseTimer=null;

    function startShowcase(){
        setTimeout(function(){deployAgents()},300);
    }

    function deployAgents(){
        // Fly out particles one by one
        particles.forEach(function(p,i){
            setTimeout(function(){
                var tx=parseFloat(p.dataset.tx);
                var ty=parseFloat(p.dataset.ty);
                p.style.left=tx+'px';
                p.style.top=ty+'px';
                p.classList.add('deployed');
                // Show connection line
                var line=document.getElementById('conn-'+i);
                if(line) line.classList.add('visible');
            }, i*120);
        });

        // After all deployed, start cycling
        setTimeout(function(){
            document.getElementById('info-panel').classList.add('visible');
            showcaseNext();
            showcaseTimer=setInterval(showcaseNext,3000);
        }, agents.length*120+500);
    }

    var cycleCount=0;

    function showcaseNext(){
        showcaseIdx=(showcaseIdx+1)%agents.length;
        if(showcaseIdx===0) cycleCount++;
        showAgent(showcaseIdx);

        // After full cycle: collapse particles into logo
        if(cycleCount>=1 && showcaseIdx===agents.length-1){
            clearInterval(showcaseTimer);showcaseTimer=null;
            setTimeout(collapseToLogo,2500);
        }
    }

    function showAgent(idx){
        var a=agents[idx];

        // Highlight particle
        particles.forEach(function(p,i){
            p.classList.toggle('active',i===idx);
            var line=document.getElementById('conn-'+i);
            if(line) line.classList.toggle('active',i===idx);
        });

        // Counter
        document.getElementById('info-counter').textContent=(idx+1)+' / '+agents.length;

        // Typewriter name
        var nameEl=document.getElementById('info-name');
        nameEl.textContent='';
        typewrite(nameEl,a.n,30);

        // Typewriter desc
        var descEl=document.getElementById('info-desc');
        descEl.textContent='';
        setTimeout(function(){typewrite(descEl,a.d,12)},300);

        // Tags
        var tagsEl=document.getElementById('info-tags');
        tagsEl.innerHTML='';
        a.p.forEach(function(probe,j){
            setTimeout(function(){
                tagsEl.insertAdjacentHTML('beforeend','<span class="info-tag info-tag-probe">'+probe+'</span>');
            },600+j*80);
        });
        a.m.forEach(function(mt,j){
            setTimeout(function(){
                tagsEl.insertAdjacentHTML('beforeend','<span class="info-tag info-tag-mitre">'+mt+'</span>');
            },600+a.p.length*80+j*60);
        });

        // Progress
        document.getElementById('s2-progress').style.width=((idx+1)/agents.length*100)+'%';
    }

    function collapseToLogo(){
        // Hide info panel
        document.getElementById('info-panel').classList.remove('visible');

        // Collapse all particles back to center
        particles.forEach(function(p,i){
            setTimeout(function(){
                p.classList.remove('active','deployed');
                p.classList.add('collapsing');
                var line=document.getElementById('conn-'+i);
                if(line) line.classList.add('collapsing');
            },i*60);
        });

        // Logo grows + glows
        setTimeout(function(){
            document.getElementById('stage-logo').classList.add('collapsed');
        },agents.length*60+300);

        // Show AMOSKYS tagline
        setTimeout(function(){
            document.getElementById('collapse-msg').classList.add('visible');
        },agents.length*60+800);

        // Show install button
        setTimeout(function(){
            document.getElementById('s2-next').classList.add('visible');
        },agents.length*60+1500);
    }

    function typewrite(el,text,speed){
        var i=0;
        function tick(){
            if(i<text.length){el.textContent+=text.charAt(i);i++;setTimeout(tick,speed)}
        }
        tick();
    }
})();
</script>
</body>
</html>

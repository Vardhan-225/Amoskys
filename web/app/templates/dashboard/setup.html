{% extends "dashboard/base.html" %}
{% block title %}AMOSKYS — Setup{% endblock %}
{% block content %}
<div style="max-width:600px;margin:60px auto;text-align:center;padding:20px;">
    <img src="{{ url_for('static', filename='images/amoskys-logo.svg') }}" alt="AMOSKYS" width="100" height="100" style="margin-bottom:24px;filter:drop-shadow(0 0 20px rgba(0,217,255,0.3));">
    <h1 style="font-size:1.8em;font-weight:800;color:#fff;margin-bottom:8px;">Welcome to AMOSKYS</h1>
    <p style="color:#6b7a99;font-size:0.95em;margin-bottom:30px;">IGRIS onboarding is being built. For now, install the agent to get started.</p>
    <a href="/dashboard/deploy" style="display:inline-block;padding:12px 28px;background:linear-gradient(135deg,#00b894,#00d9ff);color:#0a0e27;font-weight:700;border-radius:10px;text-decoration:none;font-size:0.95em;">Install on your Mac</a>
    <p style="margin-top:20px;"><button id="skip-setup" style="background:none;border:none;color:#555;cursor:pointer;font-size:0.82em;">Skip setup for now</button></p>
</div>
<script nonce="{{ csp_nonce() }}">
document.getElementById('skip-setup').addEventListener('click', async function() {
    await fetch('/dashboard/api/setup/complete', { method: 'POST' });
    window.location.href = '/dashboard';
});
</script>
{% endblock %}

{% extends "dashboard/base.html" %}
{% block title %}Investigation — AMOSKYS{% endblock %}
{% block content %}
<div class="inv">
    <div class="inv-loading" id="inv-loading"><div class="neural-loading"></div><div style="margin-top:12px;color:#6b7a99;font-size:0.82em;">Reconstructing incident...</div></div>
    <div id="inv-root" style="display:none;"></div>
    <div id="inv-error" style="display:none;text-align:center;padding:60px;color:#ff3366;"></div>
</div>

<style>
.inv { max-width: 1200px; margin: 0 auto; padding: 16px 20px 60px; }
.inv-loading { text-align: center; padding: 80px 20px; }

/* ── Header ── */
.inv-header { margin-bottom: 20px; }
.inv-breadcrumb { font-size: 0.72em; color: #6b7a99; margin-bottom: 8px; }
.inv-breadcrumb a { color: #6b7a99; text-decoration: none; }
.inv-breadcrumb a:hover { color: #00d9ff; }
.inv-title-row { display: flex; align-items: center; gap: 12px; margin-bottom: 6px; }
.inv-title { font-size: 1.3em; font-weight: 800; color: #fff; flex: 1; }
.inv-sev-badge { font-size: 0.68em; padding: 3px 10px; border-radius: 4px; font-weight: 700; text-transform: uppercase; }
.inv-sev-critical { background: rgba(255,51,102,0.15); color: #ff3366; }
.inv-sev-high { background: rgba(240,173,78,0.15); color: #f0ad4e; }
.inv-sev-medium { background: rgba(0,217,255,0.15); color: #00d9ff; }
.inv-sev-low { background: rgba(37,99,235,0.15); color: #3b82f6; }
.inv-meta { font-size: 0.75em; color: #6b7a99; display: flex; gap: 16px; flex-wrap: wrap; }
.inv-meta strong { color: #b4bcd0; }

/* ── Section Card ── */
.inv-sec { background: #0f1628; border: 1px solid #1e2a45; border-radius: 12px; padding: 20px; margin-bottom: 16px; position: relative; overflow: hidden; }
.inv-sec::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: linear-gradient(90deg, transparent, rgba(0,217,255,0.2), transparent); }
.inv-sec-t { font-size: 0.75em; color: #00d9ff; text-transform: uppercase; letter-spacing: 0.06em; font-weight: 700; margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }
.inv-sec-icon { font-size: 1rem; }

/* ── Narrative ── */
.inv-narrative { font-size: 0.9em; color: #c8d6e5; line-height: 1.7; }
.inv-narrative strong { color: #00d9ff; }
.inv-narrative .inv-technique { color: #f0ad4e; font-family: monospace; font-size: 0.85em; background: rgba(240,173,78,0.08); padding: 1px 5px; border-radius: 3px; }
.inv-narrative .inv-ip { color: #ff3366; font-family: monospace; }
.inv-narrative .inv-proc { color: #00ff88; font-family: monospace; }
.inv-story-meta { display: flex; gap: 20px; margin-top: 14px; padding-top: 12px; border-top: 1px solid #1a2040; font-size: 0.72em; color: #6b7a99; }
.inv-story-meta strong { color: #b4bcd0; }

/* ── Swimlane Timeline ── */
.inv-swimlane { overflow-x: auto; }
.inv-lanes { min-width: 700px; }
.inv-lane { display: flex; align-items: center; gap: 0; margin-bottom: 2px; min-height: 32px; }
.inv-lane-label { width: 90px; flex-shrink: 0; font-size: 0.62em; color: #6b7a99; text-transform: uppercase; letter-spacing: 0.04em; font-weight: 600; text-align: right; padding-right: 10px; }
.inv-lane-track { flex: 1; height: 28px; background: rgba(0,217,255,0.02); border-radius: 4px; position: relative; border: 1px solid #1a2040; }
.inv-evt-dot { position: absolute; top: 50%; transform: translate(-50%, -50%); width: 10px; height: 10px; border-radius: 50%; cursor: pointer; transition: all 0.15s; z-index: 2; }
.inv-evt-dot:hover { transform: translate(-50%, -50%) scale(1.6); z-index: 10; box-shadow: 0 0 8px currentColor; }
.inv-evt-dot.sev-crit { background: #ff3366; }
.inv-evt-dot.sev-high { background: #f0ad4e; }
.inv-evt-dot.sev-med { background: #00d9ff; }
.inv-evt-dot.sev-low { background: #3b82f6; }
.inv-evt-dot.sev-info { background: #6b7a99; }

/* Kill chain bar under swimlane */
.inv-kc-bar { display: flex; margin-top: 6px; margin-left: 90px; gap: 2px; }
.inv-kc-seg { flex: 1; height: 6px; border-radius: 3px; background: #1a2040; position: relative; }
.inv-kc-seg.active { background: linear-gradient(90deg, #00d9ff, #0066ff); }
.inv-kc-seg.hot { background: linear-gradient(90deg, #f0ad4e, #ff3366); }
.inv-kc-seg-lbl { position: absolute; top: 8px; left: 50%; transform: translateX(-50%); font-size: 0.5rem; color: #555; white-space: nowrap; }

/* Timeline tooltip */
.inv-tooltip { display: none; position: fixed; z-index: 100; background: rgba(5,8,22,0.96); border: 1px solid rgba(0,217,255,0.25); border-radius: 8px; padding: 10px 14px; max-width: 320px; font-size: 0.75em; box-shadow: 0 8px 32px rgba(0,0,0,0.7); pointer-events: none; }
.inv-tooltip.show { display: block; }
.inv-tt-cat { color: #00d9ff; font-weight: 600; margin-bottom: 4px; }
.inv-tt-desc { color: #c8d6e5; margin-bottom: 4px; }
.inv-tt-meta { color: #6b7a99; font-size: 0.9em; }

/* ── Analysis Grid ── */
.inv-analysis { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.inv-analysis-card { background: #0a0e20; border-radius: 8px; padding: 14px; }
.inv-analysis-title { font-size: 0.68em; color: #00d9ff; text-transform: uppercase; letter-spacing: 0.04em; font-weight: 700; margin-bottom: 10px; }

/* MITRE mini */
.inv-mitre-grid { display: flex; flex-wrap: wrap; gap: 5px; }
.inv-mt { padding: 3px 8px; background: rgba(0,217,255,0.04); border: 1px solid #1a2040; border-radius: 4px; font-size: 0.7em; color: #00d9ff; font-family: monospace; }
.inv-mt.active { border-color: #f0ad4e44; background: rgba(240,173,78,0.08); color: #f0ad4e; }

/* Scoring bars */
.inv-score-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
.inv-score-lbl { font-size: 0.72em; color: #6b7a99; width: 80px; }
.inv-score-bar { flex: 1; height: 8px; background: #0f1628; border-radius: 4px; overflow: hidden; }
.inv-score-fill { height: 100%; border-radius: 4px; transition: width 0.5s; }
.inv-score-val { font-size: 0.68em; color: #b4bcd0; width: 40px; text-align: right; font-weight: 600; }

/* Factors */
.inv-factors { margin-top: 10px; }
.inv-factor { display: flex; align-items: center; gap: 6px; padding: 3px 0; font-size: 0.72em; }
.inv-factor-name { color: #b4bcd0; flex: 1; }
.inv-factor-val { color: #f0ad4e; font-weight: 600; font-family: monospace; }

/* ── IGRIS Hunt ── */
.inv-hunt-prompt { display: flex; gap: 8px; margin-top: 12px; }
.inv-hunt-input { flex: 1; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; padding: 10px 14px; color: #fff; font-size: 0.85em; font-family: inherit; }
.inv-hunt-input:focus { border-color: #00d9ff; outline: none; box-shadow: 0 0 8px rgba(0,217,255,0.15); }
.inv-hunt-input::placeholder { color: rgba(255,255,255,0.3); }
.inv-hunt-btn { padding: 10px 20px; background: var(--neural-primary); color: #0a0e27; border: none; border-radius: 8px; font-weight: 700; cursor: pointer; font-size: 0.82em; }
.inv-hunt-btn:hover { background: #33e5ff; }
.inv-hunt-msgs { margin-top: 12px; display: flex; flex-direction: column; gap: 8px; max-height: 300px; overflow-y: auto; }
.inv-hunt-msg { padding: 10px 14px; border-radius: 8px; font-size: 0.82em; line-height: 1.5; }
.inv-hunt-bot { background: rgba(0,217,255,0.06); border: 1px solid rgba(0,217,255,0.12); color: #c8d6e5; }
.inv-hunt-user { background: rgba(0,217,255,0.15); border: 1px solid rgba(0,217,255,0.2); color: #fff; align-self: flex-end; max-width: 80%; }
.inv-hunt-msg strong { color: #00d9ff; }
.inv-hunt-msg code { background: rgba(0,0,0,0.3); padding: 1px 4px; border-radius: 3px; font-size: 0.9em; color: #00ff88; }

/* ── Actions bar ── */
.inv-actions { display: flex; gap: 8px; margin-top: 16px; }
.inv-action-btn { padding: 8px 16px; border-radius: 8px; font-weight: 600; font-size: 0.78em; cursor: pointer; border: 1px solid; transition: all 0.2s; text-decoration: none; display: inline-flex; align-items: center; gap: 6px; }
.inv-action-primary { background: rgba(0,217,255,0.08); border-color: rgba(0,217,255,0.25); color: #00d9ff; }
.inv-action-primary:hover { background: rgba(0,217,255,0.15); }
.inv-action-danger { background: rgba(255,51,102,0.06); border-color: rgba(255,51,102,0.2); color: #ff3366; }

/* ── Responsive ── */
@media (max-width: 768px) {
    .inv-analysis { grid-template-columns: 1fr; }
    .inv-lane-label { width: 60px; font-size: 0.55em; }
}
</style>

<script nonce="{{ csp_nonce() }}">
(function() {
    'use strict';
    var incidentId = '{{ incident_id }}';
    var tooltip = null;

    load();

    async function load() {
        try {
            // Fetch incident context + basic incident data in parallel
            var [ctxResp, incResp] = await Promise.all([
                fetch('/dashboard/api/investigation/' + incidentId + '/context'),
                fetch('/dashboard/api/incidents/' + incidentId),
            ]);
            var ctx = await ctxResp.json();
            var incData = await incResp.json();

            if (ctx.status === 'error' && incData.status === 'error') {
                showError(ctx.message || 'Incident not found');
                return;
            }

            var incident = ctx.incident || (incData.incident || {});
            render(incident, ctx);
        } catch(e) {
            showError('Failed to load investigation: ' + e.message);
        }
    }

    function showError(msg) {
        document.getElementById('inv-loading').style.display = 'none';
        var el = document.getElementById('inv-error');
        el.style.display = 'block';
        el.textContent = msg;
    }

    function render(incident, ctx) {
        document.getElementById('inv-loading').style.display = 'none';
        var root = document.getElementById('inv-root');
        root.style.display = 'block';

        var sev = incident.severity || 'medium';
        var html = '';

        /* ═══ HEADER ═══ */
        html += '<div class="inv-header">';
        html += '<div class="inv-breadcrumb"><a href="/dashboard/">Overview</a> / <a href="/dashboard/threats">Threats</a> / Investigation #' + esc(incidentId) + '</div>';
        html += '<div class="inv-title-row">';
        html += '<div class="inv-title">' + esc(incident.title || incident.rule_name || 'Incident #' + incidentId) + '</div>';
        html += '<span class="inv-sev-badge inv-sev-' + sev + '">' + sev + '</span>';
        html += '</div>';
        html += '<div class="inv-meta">';
        if (incident.created_at) html += '<span>Created: <strong>' + esc(incident.created_at.split('.')[0]) + '</strong></span>';
        if (incident.status) html += '<span>Status: <strong>' + esc(incident.status) + '</strong></span>';
        if (incident.device_id) html += '<span>Device: <strong>' + esc((incident.device_id || '').substring(0, 12)) + '</strong></span>';
        html += '</div></div>';

        /* ═══ SECTION 1: NARRATIVE ═══ */
        html += '<div class="inv-sec">';
        html += '<div class="inv-sec-t"><span class="inv-sec-icon">&#x1F4D6;</span> Attack Narrative</div>';
        if (ctx.narrative) {
            var n = ctx.narrative;
            html += '<div class="inv-narrative">';
            html += '<p><strong>' + esc(n.pattern_label || 'Attack Chain Detected') + '</strong></p>';
            // Build narrative from kill chain stages
            if (n.kill_chain && n.kill_chain.length > 0) {
                n.kill_chain.forEach(function(stage) {
                    html += '<p>' + esc(stage.summary) + '</p>';
                });
            }
            if (incident.description) {
                html += '<p>' + esc(incident.description) + '</p>';
            }
            html += '<div class="inv-story-meta">';
            html += '<span>Confidence: <strong>' + ((n.confidence * 100).toFixed(0)) + '%</strong></span>';
            html += '<span>Duration: <strong>' + formatDuration(n.duration_seconds) + '</strong></span>';
            html += '<span>Events: <strong>' + n.raw_event_count + '</strong></span>';
            html += '<span>Techniques: <strong>' + (n.techniques || []).length + '</strong></span>';
            html += '</div></div>';
        } else {
            // Fallback: use incident description
            html += '<div class="inv-narrative">';
            html += '<p>' + esc(incident.description || 'No narrative available. The StoryEngine could not reconstruct an attack chain for this incident.') + '</p>';
            html += '</div>';
        }
        html += '</div>';

        /* ═══ SECTION 2: SWIMLANE TIMELINE ═══ */
        html += '<div class="inv-sec">';
        html += '<div class="inv-sec-t"><span class="inv-sec-icon">&#x23F1;</span> Evidence Timeline</div>';
        var timeline = ctx.timeline || [];
        if (timeline.length > 0) {
            html += renderSwimlane(timeline);
        } else {
            html += '<div style="color:#6b7a99;font-size:0.82em;text-align:center;padding:20px;">No timeline events available for this incident window.</div>';
        }
        html += '</div>';

        /* ═══ SECTION 3: ANALYSIS ═══ */
        html += '<div class="inv-sec">';
        html += '<div class="inv-sec-t"><span class="inv-sec-icon">&#x1F50D;</span> Analysis</div>';
        html += '<div class="inv-analysis">';

        // MITRE panel
        var techniques = ctx.mitre_techniques || [];
        html += '<div class="inv-analysis-card"><div class="inv-analysis-title">MITRE ATT&CK Mapping</div>';
        if (techniques.length > 0) {
            html += '<div class="inv-mitre-grid">';
            techniques.forEach(function(t) {
                html += '<span class="inv-mt active" title="' + mitreName(t) + '">' + esc(t) + '</span>';
            });
            html += '</div>';
        } else {
            html += '<div style="color:#6b7a99;font-size:0.82em;">No MITRE techniques mapped</div>';
        }
        html += '</div>';

        // Scoring panel
        var explanations = ctx.explanations || [];
        html += '<div class="inv-analysis-card"><div class="inv-analysis-title">Scoring Decomposition</div>';
        if (explanations.length > 0) {
            var exp = explanations[0]; // Primary event explanation
            var scores = exp.scores || {};
            html += scoreBar('Geometric', scores.geometric || 0, '#00d9ff');
            html += scoreBar('Temporal', scores.temporal || 0, '#f0ad4e');
            html += scoreBar('Behavioral', scores.behavioral || 0, '#00ff88');
            html += scoreBar('Composite', scores.composite || 0, '#ff3366');
            if (exp.factors && exp.factors.length > 0) {
                html += '<div class="inv-factors">';
                exp.factors.slice(0, 6).forEach(function(f) {
                    var name = f.name || f.detail || f.factor || '';
                    var val = f.contribution || f.value || f.weight || 0;
                    html += '<div class="inv-factor"><span class="inv-factor-name">' + esc(name) + '</span><span class="inv-factor-val">+' + (typeof val === 'number' ? val.toFixed(2) : val) + '</span></div>';
                });
                html += '</div>';
            }
        } else {
            html += '<div style="color:#6b7a99;font-size:0.82em;">No scoring data available</div>';
        }
        html += '</div>';

        html += '</div></div>'; // analysis grid + section

        /* ═══ SECTION 4: IGRIS HUNT ═══ */
        html += '<div class="inv-sec">';
        html += '<div class="inv-sec-t"><span class="inv-sec-icon">&#x1F441;</span> IGRIS Hunt</div>';
        html += '<div class="inv-hunt-msgs" id="inv-hunt-msgs">';
        html += '<div class="inv-hunt-msg inv-hunt-bot">I have the context for incident #' + esc(incidentId) + '. Ask me to analyze the process tree, trace network connections, search for related events, or explain the scoring. What would you like to investigate?</div>';
        html += '</div>';
        html += '<div class="inv-hunt-prompt">';
        html += '<input type="text" class="inv-hunt-input" id="inv-hunt-input" placeholder="Ask IGRIS about this incident..." />';
        html += '<button class="inv-hunt-btn" id="inv-hunt-send">Ask</button>';
        html += '</div>';
        html += '</div>';

        /* ═══ ACTIONS ═══ */
        html += '<div class="inv-actions">';
        html += '<a href="/dashboard/threats" class="inv-action-btn inv-action-primary">&#x2190; Back to Threats</a>';
        html += '</div>';

        root.innerHTML = html;

        // Bind hunt input
        var huntInput = document.getElementById('inv-hunt-input');
        var huntSend = document.getElementById('inv-hunt-send');
        if (huntInput && huntSend) {
            huntSend.addEventListener('click', function() { sendHunt(); });
            huntInput.addEventListener('keydown', function(e) { if (e.key === 'Enter') sendHunt(); });
        }

        // Bind tooltip events on swimlane dots
        setupTooltips();
    }

    /* ── Swimlane Renderer ── */
    function renderSwimlane(events) {
        var lanes = { process: [], network: [], dns: [], auth: [], filesystem: [], persistence: [], other: [] };
        var laneMap = {
            'macos_process': 'process', 'process': 'process',
            'macos_network': 'network', 'network': 'network', 'network_sentinel': 'network', 'macos_internet_activity': 'network',
            'macos_dns': 'dns', 'dns': 'dns',
            'macos_auth': 'auth', 'auth': 'auth',
            'macos_filesystem': 'filesystem', 'fim': 'filesystem', 'macos_realtime_sensor': 'filesystem',
            'macos_persistence': 'persistence', 'persistence': 'persistence', 'macos_provenance': 'persistence',
        };

        var minTs = Infinity, maxTs = -Infinity;
        events.forEach(function(e) {
            var ts = e.ts || 0;
            if (ts < minTs) minTs = ts;
            if (ts > maxTs) maxTs = ts;
            var lane = laneMap[(e.source || '').toLowerCase()] || 'other';
            lanes[lane].push(e);
        });

        var range = maxTs - minTs;
        if (range <= 0) range = 1;

        var laneNames = ['process', 'network', 'dns', 'auth', 'filesystem', 'persistence', 'other'];
        var laneLabels = { process: 'Process', network: 'Network', dns: 'DNS', auth: 'Auth', filesystem: 'File/FIM', persistence: 'Persist', other: 'Other' };

        var html = '<div class="inv-swimlane"><div class="inv-lanes">';
        laneNames.forEach(function(name) {
            var evts = lanes[name];
            html += '<div class="inv-lane">';
            html += '<div class="inv-lane-label">' + laneLabels[name] + '</div>';
            html += '<div class="inv-lane-track">';
            evts.forEach(function(e) {
                var pct = ((e.ts - minTs) / range * 100).toFixed(2);
                var risk = e.risk_score || 0;
                var sevCls = risk >= 0.8 ? 'sev-crit' : risk >= 0.6 ? 'sev-high' : risk >= 0.3 ? 'sev-med' : risk > 0 ? 'sev-low' : 'sev-info';
                html += '<div class="inv-evt-dot ' + sevCls + '" style="left:' + pct + '%;" '
                    + 'data-cat="' + esc(e.category || '') + '" '
                    + 'data-desc="' + esc((e.description || '').substring(0, 120)) + '" '
                    + 'data-proc="' + esc(e.process_name || '') + '" '
                    + 'data-ip="' + esc(e.remote_ip || '') + '" '
                    + 'data-risk="' + risk.toFixed(2) + '" '
                    + 'data-src="' + esc(e.source || '') + '"'
                    + '></div>';
            });
            html += '</div></div>';
        });

        // Kill chain bar
        html += '<div class="inv-kc-bar">';
        var stages = ['Recon', 'Weapon', 'Deliver', 'Exploit', 'Install', 'C2', 'Action'];
        stages.forEach(function(s) {
            html += '<div class="inv-kc-seg"><div class="inv-kc-seg-lbl">' + s + '</div></div>';
        });
        html += '</div>';

        html += '</div></div>';
        return html;
    }

    /* ── Tooltip ── */
    function setupTooltips() {
        if (!tooltip) {
            tooltip = document.createElement('div');
            tooltip.className = 'inv-tooltip';
            document.body.appendChild(tooltip);
        }
        document.querySelectorAll('.inv-evt-dot').forEach(function(dot) {
            dot.addEventListener('mouseenter', function(ev) {
                var cat = dot.getAttribute('data-cat');
                var desc = dot.getAttribute('data-desc');
                var proc = dot.getAttribute('data-proc');
                var ip = dot.getAttribute('data-ip');
                var risk = dot.getAttribute('data-risk');
                var src = dot.getAttribute('data-src');
                tooltip.innerHTML = '<div class="inv-tt-cat">' + humanize(cat) + '</div>'
                    + (desc ? '<div class="inv-tt-desc">' + esc(desc) + '</div>' : '')
                    + '<div class="inv-tt-meta">'
                    + (proc ? 'Process: ' + esc(proc) + '<br>' : '')
                    + (ip ? 'IP: ' + esc(ip) + '<br>' : '')
                    + 'Risk: ' + risk + ' | Agent: ' + esc(src)
                    + '</div>';
                var r = dot.getBoundingClientRect();
                tooltip.style.left = (r.left + 15) + 'px';
                tooltip.style.top = (r.top - 10) + 'px';
                tooltip.classList.add('show');
            });
            dot.addEventListener('mouseleave', function() {
                tooltip.classList.remove('show');
            });
        });
    }

    /* ── IGRIS Hunt Chat ── */
    var huntSending = false;
    function sendHunt() {
        var input = document.getElementById('inv-hunt-input');
        var text = input.value.trim();
        if (!text || huntSending) return;
        huntSending = true;
        input.value = '';

        var msgs = document.getElementById('inv-hunt-msgs');
        msgs.innerHTML += '<div class="inv-hunt-msg inv-hunt-user">' + esc(text) + '</div>';
        msgs.innerHTML += '<div class="inv-hunt-msg inv-hunt-bot" id="inv-hunt-typing" style="color:#6b7a99;">Analyzing...</div>';
        msgs.scrollTop = msgs.scrollHeight;

        // Send to IGRIS with incident context
        var contextMsg = '[Investigation context: incident #' + incidentId + '] ' + text;
        fetch('/dashboard/api/igris/chat', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ message: contextMsg }),
        })
        .then(function(r) { return r.json(); })
        .then(function(d) {
            var typing = document.getElementById('inv-hunt-typing');
            if (typing) typing.remove();
            var resp = d.status === 'success' ? d.response : 'Error: ' + (d.message || 'Unknown');
            var formatted = resp.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
                .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
                .replace(/`([^`]+)`/g, '<code>$1</code>')
                .replace(/\n/g, '<br>');
            msgs.innerHTML += '<div class="inv-hunt-msg inv-hunt-bot">' + formatted + '</div>';
            msgs.scrollTop = msgs.scrollHeight;
            huntSending = false;
        })
        .catch(function(e) {
            var typing = document.getElementById('inv-hunt-typing');
            if (typing) typing.remove();
            msgs.innerHTML += '<div class="inv-hunt-msg inv-hunt-bot" style="color:#ff3366;">Connection error: ' + esc(e.message) + '</div>';
            huntSending = false;
        });
    }

    /* ── Helpers ── */
    function scoreBar(label, value, color) {
        var pct = Math.min(100, Math.max(0, (value || 0) * 100));
        return '<div class="inv-score-row">'
            + '<div class="inv-score-lbl">' + label + '</div>'
            + '<div class="inv-score-bar"><div class="inv-score-fill" style="width:' + pct + '%;background:' + color + ';"></div></div>'
            + '<div class="inv-score-val">' + (value || 0).toFixed(2) + '</div></div>';
    }

    function formatDuration(s) {
        if (!s || s <= 0) return '< 1s';
        if (s < 60) return Math.round(s) + 's';
        if (s < 3600) return Math.round(s / 60) + 'm ' + Math.round(s % 60) + 's';
        return Math.round(s / 3600) + 'h ' + Math.round((s % 3600) / 60) + 'm';
    }

    function humanize(s) {
        if (!s) return 'Event';
        var map = {
            'process_spawned': 'Process Execution', 'lolbin_execution': 'Suspicious Binary',
            'new_external_connection': 'External Connection', 'c2_beacon_suspect': 'C2 Beacon',
            'dns_beaconing_detected': 'DNS Beaconing', 'exfil_spike': 'Data Exfiltration',
            'full_kill_chain': 'Kill Chain Activity', 'gatekeeper_block': 'Gatekeeper Block',
            'suspicious_script': 'Suspicious Script', 'credential_theft_command': 'Credential Theft',
            'macos_launchagent_new': 'New LaunchAgent', 'macos_config_backdoor_new': 'Config Backdoor',
        };
        return map[s] || s.replace(/_/g, ' ').replace(/\b\w/g, function(c) { return c.toUpperCase(); });
    }

    function mitreName(id) {
        var names = {
            'T1059':'Command & Scripting','T1071':'App Layer Protocol','T1548':'Elevation Control',
            'T1543.001':'Launch Agent','T1041':'Exfil Over C2','T1078':'Valid Accounts',
            'T1110':'Brute Force','T1046':'Network Service Scan','T1204':'User Execution',
        };
        return names[id] || id;
    }

    function esc(s) { if(!s) return ''; var d=document.createElement('div'); d.textContent=s; return d.innerHTML; }
})();
</script>

{% extends "dashboard/base.html" %}
{% block title %}AMOSKYS — Dashboard{% endblock %}

{% block extra_head %}
<script src="https://cdn.jsdelivr.net/npm/globe.gl@2"></script>
{% endblock %}

{% block content %}
<div class="ov">
    <div id="ov-root"><div style="text-align:center;padding:60px;"><div class="neural-loading"></div></div></div>
    <div id="ov-empty" class="ov-empty" style="display:none;">
        <img src="{{ url_for('static', filename='images/amoskys-logo.svg') }}" alt="AMOSKYS" width="80" height="80" style="opacity:0.25;margin-bottom:20px;">
        <h2>No devices yet</h2>
        <p>Install the AMOSKYS agent to start protecting your Mac.</p>
        <a href="/dashboard/deploy" class="ov-cta">Install on your Mac</a>
    </div>
</div>

<style>
.ov { max-width: 1400px; margin: 0 auto; padding: 16px 20px 60px; }

/* ── Hero: Posture + Globe ── */
.ov-hero {
    display: grid; grid-template-columns: 1fr 1fr; gap: 28px;
    align-items: center; margin-bottom: 24px; min-height: 400px;
}
.ov-posture-side { display: flex; flex-direction: column; align-items: center; gap: 16px; }
.ov-ring-wrap { position: relative; width: 180px; height: 180px; }
.ov-ring-wrap svg { width: 100%; height: 100%; transform: rotate(-90deg); }
.ov-ring-wrap .bg { fill: none; stroke: #1e2a45; stroke-width: 5; }
.ov-ring-wrap .fg { fill: none; stroke-width: 5; stroke-linecap: round; transition: stroke-dashoffset 1s cubic-bezier(0.4,0,0.2,1), stroke 0.5s; }
.ov-ring-center { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); text-align: center; }
.ov-ring-score { font-size: 2.8rem; font-weight: 800; line-height: 1; transition: color 0.5s; }
.ov-ring-label { font-size: 0.82rem; font-weight: 600; transition: color 0.5s; margin-top: 4px; }
.ov-posture-desc { font-size: 0.82rem; color: #8899bb; text-align: center; max-width: 340px; line-height: 1.5; }

/* Metrics row inside hero */
.ov-metrics { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; width: 100%; }
.ov-metric { background: #0f1628; border: 1px solid #1e2a45; border-radius: 10px; padding: 12px 8px; text-align: center; transition: all 0.2s; }
.ov-metric:hover { border-color: rgba(0,217,255,0.25); transform: translateY(-2px); }
.ov-metric-val { font-size: 1.3rem; font-weight: 700; color: #00d9ff; }
.ov-metric-lbl { font-size: 0.6rem; color: #6b7a99; text-transform: uppercase; letter-spacing: 0.04em; margin-top: 2px; }
.ov-metric-trend { font-size: 0.62rem; font-weight: 600; margin-top: 3px; min-height: 14px; }
.ov-metric.crit-on .ov-metric-val { color: #ff3366; }
.trend-up { color: #ff3366; }
.trend-down { color: #00ff88; }
.trend-flat { color: #555; }

/* Globe side */
.ov-globe-side { display: flex; flex-direction: column; align-items: center; }
.ov-globe-box {
    width: 100%; height: 400px; border-radius: 12px; overflow: hidden;
    background: radial-gradient(ellipse at center, #0a1028 0%, #050816 70%);
    border: 1px solid rgba(0,217,255,0.1); position: relative;
}
.ov-globe-loading { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); }
.ov-globe-legend { display: flex; gap: 14px; margin-top: 6px; }
.ov-gl { display: flex; align-items: center; gap: 4px; font-size: 0.65rem; color: #6b7a99; }
.ov-gl-dot { width: 6px; height: 6px; border-radius: 50%; }

/* ── Section ── */
.ov-sec { background: #0f1628; border: 1px solid #1e2a45; border-radius: 12px; padding: 18px 20px; margin-bottom: 14px; }
.ov-sec-hdr { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
.ov-sec-t { font-size: 0.75em; color: #00d9ff; text-transform: uppercase; letter-spacing: 0.6px; font-weight: 700; }
.ov-sec-badge { font-size: 0.68em; padding: 2px 8px; border-radius: 4px; font-weight: 700; }
.badge-red { background: rgba(255,51,102,0.1); color: #ff3366; }
.badge-grn { background: rgba(0,255,136,0.08); color: #00ff88; }
.ov-sec-link { font-size: 0.72em; color: #6b7a99; text-decoration: none; }
.ov-sec-link:hover { color: #00d9ff; }

/* ── Needs Attention ── */
.ov-attn { display: flex; align-items: center; gap: 12px; padding: 10px 14px; border-radius: 8px; margin-bottom: 6px; text-decoration: none; transition: all 0.15s; cursor: pointer; }
.ov-attn:hover { background: rgba(0,217,255,0.04); }
.ov-attn-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.ov-attn-dot.critical { background: #ff3366; box-shadow: 0 0 8px rgba(255,51,102,0.4); }
.ov-attn-dot.high { background: #f0ad4e; box-shadow: 0 0 6px rgba(240,173,78,0.3); }
.ov-attn-dot.medium { background: #00d9ff; }
.ov-attn-text { flex: 1; font-size: 0.85em; color: #e0e8f0; }
.ov-attn-action { font-size: 0.68em; color: #6b7a99; }
.ov-attn-go { color: #2a3050; font-size: 1.1em; }
.ov-attn-ok { text-align: center; padding: 16px; color: #00ff88; font-size: 0.88em; }

/* ── Device card ── */
.ov-fleet { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 10px; }
.ov-dev {
    display: grid; grid-template-columns: 36px 1fr auto; align-items: center; gap: 10px;
    padding: 14px 16px; background: #0a0e20; border-radius: 8px; text-decoration: none;
    border: 1px solid transparent; transition: all 0.2s; cursor: pointer;
}
.ov-dev:hover { border-color: rgba(0,217,255,0.2); transform: translateY(-1px); }
.ov-dev-icon { width: 36px; height: 36px; border-radius: 8px; background: #0f1628; border: 1px solid #1a2040; display: flex; align-items: center; justify-content: center; position: relative; }
.ov-dev-dot { position: absolute; bottom: -2px; right: -2px; width: 8px; height: 8px; border-radius: 50%; border: 2px solid #0a0e20; }
.ov-dev-dot-on { background: #00ff88; }
.ov-dev-dot-off { background: #555; }
.ov-dev-info { min-width: 0; }
.ov-dev-name { font-size: 0.85em; font-weight: 700; color: #e0e8f0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.ov-dev-meta { font-size: 0.65em; color: #6b7a99; margin-top: 2px; display: flex; gap: 8px; align-items: center; }
.ov-dev-tag { font-size: 0.62em; padding: 1px 6px; border-radius: 3px; font-weight: 600; }
.ov-dev-tag-ok { color: #00ff88; background: rgba(0,255,136,0.06); }
.ov-dev-tag-warn { color: #f0ad4e; background: rgba(240,173,78,0.06); }
.ov-dev-tag-crit { color: #ff3366; background: rgba(255,51,102,0.06); }
.ov-dev-gauge { width: 36px; height: 36px; position: relative; }
.ov-dev-gauge svg { width: 100%; height: 100%; transform: rotate(-90deg); }
.ov-dev-gauge .bg { fill: none; stroke: #1e2a45; stroke-width: 3.5; }
.ov-dev-gauge .fg { fill: none; stroke-width: 3.5; stroke-linecap: round; }
.ov-dev-gauge-v { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); font-size: 0.6rem; font-weight: 700; }

/* ── Two col ── */
.ov-2col { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }

/* ── Kill chain bar ── */
.ov-kc { display: flex; gap: 4px; }
.ov-kc-s { flex: 1; text-align: center; padding: 8px 2px; border-radius: 6px; background: rgba(0,217,255,0.03); border: 1px solid transparent; transition: all 0.3s; }
.ov-kc-s.active { border-color: rgba(0,217,255,0.2); background: rgba(0,217,255,0.06); }
.ov-kc-s.hot { border-color: rgba(255,51,102,0.25); background: rgba(255,51,102,0.04); }
.ov-kc-name { display: block; font-size: 0.55rem; color: #6b7a99; text-transform: uppercase; letter-spacing: 0.04em; }
.ov-kc-val { display: block; font-size: 0.95rem; font-weight: 700; color: #2a3050; margin-top: 2px; }
.ov-kc-s.active .ov-kc-val { color: #00d9ff; }
.ov-kc-s.hot .ov-kc-val { color: #ff3366; }

/* ── MITRE pills ── */
.ov-mt-grid { display: flex; flex-wrap: wrap; gap: 5px; }
.ov-mt { padding: 3px 8px; background: rgba(0,217,255,0.04); border: 1px solid #1a2040; border-radius: 4px; font-size: 0.7em; color: #00d9ff; font-family: monospace; cursor: help; transition: all 0.15s; }
.ov-mt:hover { background: rgba(0,217,255,0.12); border-color: #00d9ff44; }
.ov-mt span { color: #555; margin-left: 3px; }
.ov-mt-none { color: #6b7a99; font-size: 0.82em; padding: 8px 0; }

/* ── Activity bars ── */
.ov-act-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 6px; }
.ov-act { display: flex; align-items: center; gap: 8px; padding: 6px 0; }
.ov-act-name { font-size: 0.73em; min-width: 120px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: #b4bcd0; }
.ov-act-bar { flex: 1; height: 8px; background: #0a0e27; border-radius: 2px; overflow: hidden; }
.ov-act-fill { height: 100%; border-radius: 2px; transition: width 0.4s; }
.ov-act-cnt { font-size: 0.65em; color: #6b7a99; min-width: 28px; text-align: right; }

/* ── Agent health grid ── */
.ov-agents { display: flex; gap: 6px; flex-wrap: wrap; }
.ov-ag-pill { font-size: 0.68em; padding: 3px 8px; border-radius: 4px; font-weight: 600; }
.ov-ag-ok { background: rgba(0,255,136,0.06); color: #00ff88; }
.ov-ag-down { background: rgba(255,51,102,0.06); color: #ff3366; }

/* ── Empty ── */
.ov-empty { text-align: center; padding: 80px 20px; }
.ov-empty h2 { font-size: 1.2em; color: #c8d6e5; margin-bottom: 6px; }
.ov-empty p { color: #6b7a99; margin-bottom: 18px; }
.ov-cta { display: inline-block; padding: 10px 22px; background: linear-gradient(135deg, #00b894, #00d9ff); color: #0a0e27; font-weight: 700; border-radius: 8px; text-decoration: none; }

/* ── Responsive ── */
@media (max-width: 900px) {
    .ov-hero { grid-template-columns: 1fr; }
    .ov-globe-box { height: 300px; }
    .ov-metrics { grid-template-columns: repeat(2, 1fr); }
    .ov-2col { grid-template-columns: 1fr; }
}
@media (max-width: 600px) {
    .ov-metrics { grid-template-columns: 1fr 1fr; }
    .ov-fleet { grid-template-columns: 1fr; }
    .ov-kc { flex-wrap: wrap; }
}
</style>

<script nonce="{{ csp_nonce() }}">
(function() {
    'use strict';

    var globe = null;
    var deviceLat = null, deviceLon = null;

    load();
    setInterval(function() { if (!document.hidden) load(); }, 20000);

    async function load() {
        try {
            var r = await fetch('/dashboard/api/overview');
            var data = await r.json();
            if (!data.available || (!data.devices || !data.devices.length)) {
                // Fall back to command center API
                r = await fetch('/dashboard/api/command-center/status');
                data = await r.json();
                if (!data.available || !data.devices || !data.devices.length) {
                    document.getElementById('ov-root').style.display = 'none';
                    document.getElementById('ov-empty').style.display = 'block';
                    return;
                }
                // Adapt old API shape
                data.posture = computePosture(data.last_24h.critical, data.last_24h.high);
                data.previous_24h = { total_events: 0, critical: 0 };
                data.mitre = { unique_techniques: (data.top_mitre_techniques || []).length, top: data.top_mitre_techniques || [] };
                data.signals = { active: 0, items: [] };
                data.agents = { total: 0, healthy: 0 };
                data.needs_attention = [];
                // Add posture to each device
                data.devices.forEach(function(d) {
                    d.posture = computePosture(d.critical_count || 0, d.high_count || 0);
                });
            }
            render(data);
        } catch(e) {
            document.getElementById('ov-root').style.display = 'none';
            document.getElementById('ov-empty').style.display = 'block';
        }
    }

    function computePosture(cr, hi) {
        cr = cr || 0; hi = hi || 0;
        if (cr === 0 && hi === 0) return { score: 100, label: 'All Clear', color: '#00ff88' };
        if (cr === 0 && hi <= 3) return { score: Math.max(70, 90 - hi * 5), label: 'Guarded', color: '#f0ad4e' };
        if (cr <= 5) return { score: Math.max(30, 60 - cr * 5 - hi * 2), label: 'Needs Attention', color: '#f0ad4e' };
        return { score: Math.max(5, 25 - cr), label: 'Critical', color: '#ff3366' };
    }

    function render(data) {
        var d = data.devices, f = data.fleet, ev = data.last_24h;
        var cats = data.top_categories || [];
        var mitre = data.mitre || { unique_techniques: 0, top: [] };
        var p = data.posture;
        var prev = data.previous_24h || {};

        var circ = 2 * Math.PI * 72;
        var off = circ * (1 - p.score / 100);

        var html = '';

        /* ═══ HERO ═══ */
        html += '<div class="ov-hero">';

        // Left: posture + metrics
        html += '<div class="ov-posture-side">';
        html += '<div class="ov-ring-wrap"><svg viewBox="0 0 160 160">'
            + '<circle class="bg" cx="80" cy="80" r="72"/>'
            + '<circle class="fg" cx="80" cy="80" r="72" stroke="' + p.color + '" stroke-dasharray="' + circ.toFixed(1) + '" stroke-dashoffset="' + off.toFixed(1) + '"/></svg>'
            + '<div class="ov-ring-center">'
            + '<div class="ov-ring-score" style="color:' + p.color + '">' + p.score + '</div>'
            + '<div class="ov-ring-label" style="color:' + p.color + '">' + p.label + '</div>'
            + '</div></div>';
        html += '<div class="ov-posture-desc">' + ev.total_events + ' event' + (ev.total_events !== 1 ? 's' : '') + ' analyzed in the last 24 hours</div>';

        // Metric cards
        var critTrend = trend(ev.critical, prev.critical || 0, true);
        var evtTrend = trend(ev.total_events, prev.total_events || 0, true);
        html += '<div class="ov-metrics">'
            + metric(f.online + '/' + f.total_devices, 'Devices Online', '')
            + metric(ev.critical, 'Critical (24h)', critTrend, ev.critical > 0)
            + metric(data.signals.active, 'Active Signals', '')
            + metric(mitre.unique_techniques, 'MITRE T-IDs', '')
            + '</div>';
        html += '</div>';

        // Right: globe
        html += '<div class="ov-globe-side">'
            + '<div class="ov-globe-box" id="ov-globe-container"><div class="ov-globe-loading"><div class="neural-loading"></div></div></div>'
            + '<div class="ov-globe-legend">'
            + '<span class="ov-gl"><span class="ov-gl-dot" style="background:#00ff88"></span>Clean</span>'
            + '<span class="ov-gl"><span class="ov-gl-dot" style="background:#ff3366"></span>Threat</span>'
            + '<span class="ov-gl"><span class="ov-gl-dot" style="background:#00d9ff"></span>Device</span>'
            + '</div></div>';

        html += '</div>'; // hero

        /* ═══ NEEDS ATTENTION ═══ */
        var attn = data.needs_attention || [];
        if (attn.length === 0) {
            // Build from raw data if overview API not available
            if (ev.critical > 0) attn.push({ severity: 'critical', text: ev.critical + ' critical event' + (ev.critical > 1 ? 's' : ''), action: 'Review now', link: '/dashboard/threats' });
            if (ev.high > 0) attn.push({ severity: 'high', text: ev.high + ' high-risk events', action: 'Investigate', link: '/dashboard/threats' });
            var offDev = d.filter(function(x) { return x.status !== 'online'; });
            if (offDev.length > 0) attn.push({ severity: 'medium', text: offDev.length + ' device' + (offDev.length > 1 ? 's' : '') + ' offline', action: 'Check', link: '/dashboard/devices' });
        }

        html += '<div class="ov-sec"><div class="ov-sec-hdr"><span class="ov-sec-t">Needs Attention</span>'
            + '<span class="ov-sec-badge ' + (attn.length > 0 ? 'badge-red' : 'badge-grn') + '">'
            + (attn.length > 0 ? attn.length + ' item' + (attn.length > 1 ? 's' : '') : 'All clear') + '</span></div>';
        if (attn.length > 0) {
            for (var i = 0; i < Math.min(5, attn.length); i++) {
                var a = attn[i];
                html += '<a href="' + esc(a.link || '#') + '" class="ov-attn">'
                    + '<div class="ov-attn-dot ' + esc(a.severity) + '"></div>'
                    + '<div class="ov-attn-text">' + esc(a.text) + '</div>'
                    + '<div class="ov-attn-action">' + esc(a.action) + '</div>'
                    + '<div class="ov-attn-go">&#x203A;</div></a>';
            }
        } else {
            html += '<div class="ov-attn-ok">No issues detected. Your devices are secure.</div>';
        }
        html += '</div>';

        /* ═══ FLEET ═══ */
        html += '<div class="ov-sec"><div class="ov-sec-hdr"><span class="ov-sec-t">Fleet</span>'
            + '<a href="/dashboard/devices" class="ov-sec-link">View All &rarr;</a></div>';
        html += '<div class="ov-fleet">';
        for (var i = 0; i < d.length; i++) {
            var x = d[i], on = x.status === 'online';
            var cr = x.critical_count || 0, hi = x.high_count || 0;
            var dp = x.posture || computePosture(cr, hi);
            var gc = 2 * Math.PI * 13, go = gc * (1 - dp.score / 100);
            var tagCls = cr > 0 ? 'crit' : hi > 0 ? 'warn' : 'ok';
            var tagText = cr > 0 ? 'Critical' : hi > 0 ? 'High Risk' : 'Healthy';

            html += '<a href="/dashboard/device/' + encodeURIComponent(x.device_id) + '" class="ov-dev">'
                + '<div class="ov-dev-icon">' + osIcon(x.os) + '<div class="ov-dev-dot ov-dev-dot-' + (on ? 'on' : 'off') + '"></div></div>'
                + '<div class="ov-dev-info"><div class="ov-dev-name">' + esc(x.hostname) + '</div>'
                + '<div class="ov-dev-meta">'
                + '<span class="ov-dev-tag ov-dev-tag-' + tagCls + '">' + tagText + '</span>'
                + '<span>' + (x.event_count || 0) + ' events</span>'
                + '</div></div>'
                + '<div class="ov-dev-gauge"><svg viewBox="0 0 32 32">'
                + '<circle class="bg" cx="16" cy="16" r="13"/>'
                + '<circle class="fg" cx="16" cy="16" r="13" stroke="' + dp.color + '" stroke-dasharray="' + gc.toFixed(1) + '" stroke-dashoffset="' + go.toFixed(1) + '"/></svg>'
                + '<div class="ov-dev-gauge-v" style="color:' + dp.color + '">' + dp.score + '</div></div></a>';
        }
        if (d.length === 0) {
            html += '<a href="/dashboard/deploy" class="ov-dev" style="justify-content:center;grid-template-columns:1fr;">'
                + '<div style="text-align:center;color:#6b7a99;">No devices &mdash; <strong style="color:#00d9ff">Install Agent</strong></div></a>';
        }
        html += '</div></div>';

        /* ═══ DETECTION & MITRE ═══ */
        html += '<div class="ov-2col">';

        // Kill chain
        html += '<div class="ov-sec"><div class="ov-sec-t" style="margin-bottom:10px">Kill Chain Progression</div>'
            + '<div class="ov-kc">';
        var kcStages = ['Recon', 'Weapon', 'Deliver', 'Exploit', 'Install', 'C2', 'Action'];
        var kcMap = buildKillChain(cats);
        for (var i = 0; i < kcStages.length; i++) {
            var cnt = kcMap[i] || 0;
            var cls = cnt > 0 ? (cnt >= 5 ? 'hot' : 'active') : '';
            html += '<div class="ov-kc-s ' + cls + '">'
                + '<span class="ov-kc-name">' + kcStages[i] + '</span>'
                + '<span class="ov-kc-val">' + cnt + '</span></div>';
        }
        html += '</div></div>';

        // MITRE
        html += '<div class="ov-sec"><div class="ov-sec-t" style="margin-bottom:10px">MITRE ATT&amp;CK Detected (24h)</div>';
        if (mitre.top && mitre.top.length > 0) {
            html += '<div class="ov-mt-grid">';
            var mList = mitre.top;
            for (var i = 0; i < mList.length; i++) {
                var t = mList[i].technique || mList[i];
                var c = mList[i].count || '';
                html += '<span class="ov-mt" title="' + mitreName(t) + '">' + esc(t) + (c ? ' <span>' + c + '</span>' : '') + '</span>';
            }
            html += '</div>';
        } else {
            html += '<div class="ov-mt-none">No technique detections in the last 24h</div>';
        }
        html += '</div></div>';

        /* ═══ ACTIVITY ═══ */
        html += '<div class="ov-sec"><div class="ov-sec-t" style="margin-bottom:10px">Top Activity (24h)</div>';
        if (cats.length > 0) {
            var maxC = cats[0].count;
            html += '<div class="ov-act-grid">';
            for (var i = 0; i < Math.min(8, cats.length); i++) {
                var c = cats[i], pct = Math.max(5, c.count / maxC * 100);
                var clr = c.avg_risk >= 0.6 ? '#ff3366' : c.avg_risk >= 0.3 ? '#f0ad4e' : '#00d9ff';
                html += '<div class="ov-act"><span class="ov-act-name">' + humanize(c.category) + '</span>'
                    + '<div class="ov-act-bar"><div class="ov-act-fill" style="width:' + pct + '%;background:' + clr + '"></div></div>'
                    + '<span class="ov-act-cnt">' + c.count + '</span></div>';
            }
            html += '</div>';
        }
        html += '</div>';

        /* ═══ AGENTS ═══ */
        if (data.agents && data.agents.total > 0) {
            html += '<div class="ov-sec"><div class="ov-sec-hdr"><span class="ov-sec-t">Agent Health</span>'
                + '<span class="ov-sec-badge ' + (data.agents.healthy === data.agents.total ? 'badge-grn' : 'badge-red') + '">'
                + data.agents.healthy + '/' + data.agents.total + ' healthy</span></div>'
                + '<div class="ov-agents">'
                + '<span class="ov-ag-pill ov-ag-ok">' + data.agents.healthy + ' online</span>';
            var down = data.agents.total - data.agents.healthy;
            if (down > 0) html += '<span class="ov-ag-pill ov-ag-down">' + down + ' offline</span>';
            html += '</div></div>';
        }

        document.getElementById('ov-root').innerHTML = html;

        // Init globe after DOM render
        setTimeout(initGlobe, 50);
    }

    /* ── Helpers ── */

    function metric(val, label, trendHtml, isCrit) {
        return '<div class="ov-metric' + (isCrit ? ' crit-on' : '') + '">'
            + '<div class="ov-metric-val">' + val + '</div>'
            + '<div class="ov-metric-lbl">' + label + '</div>'
            + '<div class="ov-metric-trend">' + trendHtml + '</div></div>';
    }

    function trend(curr, prev, higherIsBad) {
        if (prev === 0 && curr === 0) return '<span class="trend-flat">&mdash; flat</span>';
        var diff = curr - prev;
        if (diff > 0) {
            var cls = higherIsBad ? 'trend-up' : 'trend-down';
            return '<span class="' + cls + '">&uarr;' + diff + ' vs yesterday</span>';
        }
        if (diff < 0) {
            var cls = higherIsBad ? 'trend-down' : 'trend-up';
            return '<span class="' + cls + '">&darr;' + Math.abs(diff) + ' vs yesterday</span>';
        }
        return '<span class="trend-flat">&mdash; same</span>';
    }

    function buildKillChain(cats) {
        // Map event categories to kill chain stages (0-6)
        var map = {
            'dns_beaconing_suspected': 0, 'topology_new_route': 0,
            'lolbin_execution': 1, 'credential_access_indirect': 1,
            'new_external_connection': 2,
            'process_spawned': 3, 'tcc_permission_denied': 3,
            'macos_config_backdoor_new': 4,
            'c2_beacon_suspect': 5,
            'exfil_spike': 6, 'full_kill_chain': 6,
        };
        var counts = {};
        (cats || []).forEach(function(c) {
            var stage = map[c.category];
            if (stage !== undefined) counts[stage] = (counts[stage] || 0) + c.count;
        });
        return counts;
    }

    function humanize(s) {
        if (!s) return '';
        var map = {
            'process_spawned': 'Process Exec', 'lolbin_execution': 'Suspicious Binary',
            'new_external_connection': 'External Conn', 'tcc_permission_denied': 'Perm Denied',
            'exfil_spike': 'Data Exfil', 'macos_config_backdoor_new': 'Config Backdoor',
            'c2_beacon_suspect': 'C2 Beacon', 'topology_new_route': 'Route Change',
            'full_kill_chain': 'Kill Chain', 'rapid_app_switch': 'App Switch',
            'dns_beaconing_suspected': 'DNS Beacon', 'high_cpu': 'High CPU',
            'credential_access_indirect': 'Credential Access',
        };
        return map[s] || s.replace(/_/g, ' ').replace(/\b\w/g, function(c) { return c.toUpperCase(); });
    }

    function mitreName(id) {
        var names = {
            'T1059':'Command & Scripting','T1059.002':'AppleScript','T1059.004':'Unix Shell',
            'T1204':'User Execution','T1218':'System Binary Proxy','T1071':'App Layer Protocol',
            'T1071.001':'Web Protocols','T1071.004':'DNS','T1548':'Elevation Control',
            'T1548.003':'Sudo Caching','T1048':'Alt Protocol Exfil',
            'T1016':'Network Config Discovery','T1046':'Network Service Scan',
            'T1040':'Network Sniffing','T1110':'Brute Force','T1078':'Valid Accounts',
            'T1543.001':'Launch Agent','T1543.004':'Launch Daemon','T1053.003':'Cron',
            'T1070':'Indicator Removal','T1565':'Data Manipulation',
            'T1041':'Exfil Over C2','T1496':'Resource Hijacking',
            'T1553.001':'Gatekeeper Bypass','T1200':'Hardware Additions',
            'T1572':'Protocol Tunneling','T1098.004':'SSH Auth Keys',
            'T1567':'Exfil Over Web Service','T1018':'Remote System Discovery',
        };
        return names[id] || id;
    }

    function osIcon(os) {
        os = (os || '').toLowerCase();
        if (os.includes('darwin') || os.includes('macos') || os.includes('mac'))
            return '<svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M18.7 8.5c-.1.1-2.1 1.2-2.1 3.7 0 2.9 2.5 3.9 2.6 3.9 0 .1-.4 1.4-1.3 2.7-.8 1.2-1.7 2.4-3 2.4s-1.6-.8-3.1-.8-1.9.8-3.1.8-2-.7-2.9-2.4C4.6 16.7 3.7 14 3.7 11.4c0-3.5 2.3-5.4 4.5-5.4 1.2 0 2.2.8 2.9.8.7 0 1.9-.8 3.3-.8.5 0 2.4 0 3.6 1.8l.7.7z" stroke="#6b7a99" stroke-width="1.2"/><circle cx="15" cy="4" r="1.5" fill="#6b7a99" opacity="0.5"/></svg>';
        if (os.includes('linux'))
            return '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#6b7a99" stroke-width="1.2"><circle cx="12" cy="8" r="4"/><path d="M8 14c-2 1-3 3-3 5h14c0-2-1-4-3-5"/></svg>';
        if (os.includes('windows'))
            return '<svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M3 5l8-1.2v7.7H3V5zm0 8.5h8v7.7L3 20v-6.5zm9.5-9.9L22 2v9.5h-9.5V3.6zm0 8.4H22V22l-9.5-1.4v-8.6z" stroke="#6b7a99" stroke-width="1.2"/></svg>';
        return '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#6b7a99" stroke-width="1.5"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>';
    }

    function esc(s) { if(!s) return ''; var d=document.createElement('div'); d.textContent=s; return d.innerHTML; }

    /* ══════════════════════════════════════════════════════════════
       Globe.gl — Embedded overview globe
       ══════════════════════════════════════════════════════════════ */

    function initGlobe() {
        var container = document.getElementById('ov-globe-container');
        if (!container || typeof Globe === 'undefined') return;
        if (globe) return; // Already initialized

        container.innerHTML = '';

        if (typeof THREE !== 'undefined' && THREE.TextureLoader) {
            var origLoad = THREE.TextureLoader.prototype.load;
            THREE.TextureLoader.prototype.load = function(url, onLoad, onProgress, onError) {
                this.crossOrigin = 'anonymous';
                return origLoad.call(this, url, onLoad, onProgress, onError);
            };
        }

        globe = Globe()(container)
            .backgroundColor('rgba(0,0,0,0)')
            .globeImageUrl('https://cdn.jsdelivr.net/npm/three-globe/example/img/earth-dark.jpg')
            .bumpImageUrl('https://cdn.jsdelivr.net/npm/three-globe/example/img/earth-topology.png')
            .showAtmosphere(true)
            .atmosphereColor('#0099cc')
            .atmosphereAltitude(0.22)
            .width(container.clientWidth)
            .height(container.clientHeight || 400)
            .arcColor(function(d) { return d.color; })
            .arcStroke(function(d) { return d.stroke; })
            .arcAltitudeAutoScale(0.25)
            .arcDashLength(0.4)
            .arcDashGap(0.15)
            .arcDashAnimateTime(function(d) { return d.animTime; })
            .arcLabel(function(d) {
                return '<div style="background:rgba(5,8,22,0.96);border:1px solid ' + (d.threat ? 'rgba(255,51,102,0.35)' : 'rgba(0,217,255,0.25)') + ';border-radius:8px;padding:0.5rem 0.7rem;font-size:0.7rem;box-shadow:0 8px 32px rgba(0,0,0,0.7);">'
                    + '<div style="font-weight:700;color:' + (d.threat ? '#ff3366' : '#e2e8f0') + ';">' + esc(d.asnOrg) + '</div>'
                    + '<div style="color:#6b7a99;font-size:0.65rem;">' + esc(d.city ? d.city + ', ' + d.country : d.label) + '</div></div>';
            })
            .pointColor(function(d) { return d.color; })
            .pointAltitude(function(d) { return d.alt; })
            .pointRadius(function(d) { return d.radius; })
            .pointLabel(function() { return null; })
            .ringsData([])
            .ringColor(function() { return function(t) { return 'rgba(0,217,255,' + (1 - t) * 0.3 + ')'; }; })
            .ringMaxRadius(3)
            .ringPropagationSpeed(1.5)
            .ringRepeatPeriod(2000);

        globe.controls().autoRotate = true;
        globe.controls().autoRotateSpeed = 0.5;
        globe.controls().enableZoom = false;
        globe.pointOfView({ lat: 30, lng: -20, altitude: 2.5 });

        window.addEventListener('resize', function() {
            if (globe && container.clientWidth) {
                globe.width(container.clientWidth).height(container.clientHeight || 400);
            }
        });

        loadGlobeData();
    }

    function loadGlobeData() {
        fetch('/dashboard/api/network/device-location')
            .then(function(r) { return r.json(); })
            .then(function(d) { if (d.lat && d.lon) { deviceLat = d.lat; deviceLon = d.lon; } })
            .catch(function() {});

        fetch('/dashboard/api/network/geo-points?hours=24&limit=200')
            .then(function(r) { return r.json(); })
            .then(function(points) {
                if (!globe || !Array.isArray(points) || points.length === 0) return;
                var srcLat = deviceLat || 37.77, srcLon = deviceLon || -122.42;
                var arcs = [], pts = [], rings = [];

                pts.push({ lat: srcLat, lng: srcLon, color: '#00d9ff', alt: 0.02, radius: 0.6 });
                rings.push({ lat: srcLat, lng: srcLon, threat: false });

                points.forEach(function(p) {
                    if (!p.lat || !p.lon) return;
                    var isThreat = !!p.threat;
                    var bytes = p.bytes || 0;
                    var sw = Math.min(1.5, 0.3 + Math.log10(Math.max(1, bytes)) * 0.1);
                    arcs.push({
                        startLat: srcLat, startLng: srcLon, endLat: p.lat, endLng: p.lon,
                        color: isThreat ? ['rgba(255,51,102,0.7)', 'rgba(255,51,102,0.3)'] : ['rgba(0,255,136,0.5)', 'rgba(0,255,136,0.15)'],
                        stroke: sw, animTime: isThreat ? 1500 : 3000 + Math.random() * 2000,
                        threat: isThreat, asnOrg: p.asn_org || 'Unknown',
                        city: p.city || '', country: p.country || '', label: p.country || 'Unknown',
                        bytes: bytes, count: p.count || 1,
                    });
                    pts.push({ lat: p.lat, lng: p.lon, color: isThreat ? '#ff3366' : 'rgba(0,255,136,0.6)', alt: 0.01, radius: 0.25 });
                    if (isThreat) rings.push({ lat: p.lat, lng: p.lon, threat: true });
                });

                globe.arcsData(arcs).pointsData(pts).ringsData(rings);
            })
            .catch(function() {});
    }
})();
</script>

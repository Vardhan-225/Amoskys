{% extends "dashboard/base.html" %}
{% block title %}AMOSKYS — Dashboard{% endblock %}

{% block extra_head %}
<script src="https://cdn.jsdelivr.net/npm/globe.gl@2"></script>
{% endblock %}

{% block content %}
<div class="ov">
    <div id="ov-root"><div style="text-align:center;padding:80px;"><div class="neural-loading"></div><div style="margin-top:12px;color:#6b7a99;font-size:0.82em;">Loading fleet data...</div></div></div>
    <div id="ov-empty" class="ov-empty" style="display:none;">
        <img src="{{ url_for('static', filename='images/amoskys-logo.svg') }}" alt="AMOSKYS" width="80" height="80" style="opacity:0.25;margin-bottom:20px;">
        <h2>No devices yet</h2>
        <p>Install the AMOSKYS agent to start protecting your devices.</p>
        <a href="/dashboard/deploy" class="ov-cta">Install on your Mac</a>
    </div>
</div>

<style>
.ov { max-width: 1600px; margin: 0 auto; padding: 0 0 60px; }

/* ── Globe Section (full-width hero) ── */
.ov-globe-section {
    position: relative; width: 100%; background: #030712;
    border-bottom: 1px solid rgba(0,217,255,0.1);
}
.ov-globe-container {
    width: 100%; height: 520px; position: relative; cursor: grab;
    background: radial-gradient(ellipse at center, #0a1028 0%, #030712 70%);
}
.ov-globe-container:active { cursor: grabbing; }
.ov-globe-overlay {
    position: absolute; top: 0; left: 0; right: 0; bottom: 0;
    pointer-events: none; z-index: 5;
}
/* Posture badge — top-left on globe */
.ov-posture-badge {
    position: absolute; top: 20px; left: 24px; pointer-events: auto;
    background: rgba(5,8,22,0.92); border: 1px solid rgba(0,217,255,0.2);
    border-radius: 12px; padding: 16px 20px; backdrop-filter: blur(12px);
    min-width: 160px;
}
.ov-pb-label { font-size: 1.4rem; font-weight: 800; line-height: 1; }
.ov-pb-score { font-size: 0.72rem; opacity: 0.6; margin-top: 4px; }
.ov-pb-events { font-size: 0.68rem; color: #6b7a99; margin-top: 8px; }
/* Metrics — top-right on globe */
.ov-globe-metrics {
    position: absolute; top: 20px; right: 24px; pointer-events: auto;
    display: flex; gap: 8px;
}
.ov-gm {
    background: rgba(5,8,22,0.88); border: 1px solid rgba(255,255,255,0.08);
    border-radius: 8px; padding: 10px 14px; backdrop-filter: blur(12px);
    text-align: center; min-width: 80px;
}
.ov-gm-val { font-size: 1.1rem; font-weight: 700; color: #00d9ff; }
.ov-gm-val.danger { color: #ff3366; }
.ov-gm-lbl { font-size: 0.55rem; color: #6b7a99; text-transform: uppercase; letter-spacing: 0.04em; margin-top: 2px; }
.ov-gm-trend { font-size: 0.55rem; margin-top: 2px; }
.trend-up { color: #ff3366; } .trend-down { color: #00ff88; } .trend-flat { color: #555; }
/* Controls — bottom-left on globe */
.ov-globe-controls {
    position: absolute; bottom: 16px; left: 24px; pointer-events: auto;
    display: flex; gap: 6px;
}
.ov-gc-btn {
    background: rgba(5,8,22,0.88); border: 1px solid rgba(0,217,255,0.15);
    border-radius: 6px; padding: 5px 12px; color: #6b7a99;
    font-size: 0.68rem; font-weight: 600; cursor: pointer;
    backdrop-filter: blur(12px); transition: all 0.2s;
}
.ov-gc-btn:hover { border-color: rgba(0,217,255,0.4); color: #b4bcd0; }
.ov-gc-btn.active { border-color: #00d9ff; color: #00d9ff; background: rgba(0,217,255,0.06); }
/* Legend — bottom-right on globe */
.ov-globe-legend {
    position: absolute; bottom: 16px; right: 24px; pointer-events: auto;
    display: flex; gap: 12px;
    background: rgba(5,8,22,0.88); border: 1px solid rgba(255,255,255,0.06);
    border-radius: 6px; padding: 5px 12px; backdrop-filter: blur(12px);
}
.ov-gl { display: flex; align-items: center; gap: 4px; font-size: 0.62rem; color: #6b7a99; }
.ov-gl-dot { width: 6px; height: 6px; border-radius: 50%; }

/* ── NLP Summary ── */
.ov-nlp {
    padding: 16px 24px; background: rgba(0,217,255,0.02);
    border-bottom: 1px solid rgba(0,217,255,0.06);
    font-size: 0.88rem; color: #b4bcd0; line-height: 1.6;
}
.ov-nlp strong { color: #00d9ff; }
.ov-nlp .warn { color: #ff3366; font-weight: 600; }

/* ── Content area (below globe) ── */
.ov-content { padding: 20px 24px; }

/* ── Sections ── */
.ov-sec { background: #0f1628; border: 1px solid #1e2a45; border-radius: 12px; padding: 18px 20px; margin-bottom: 14px; }
.ov-sec-hdr { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
.ov-sec-t { font-size: 0.72rem; color: #00d9ff; text-transform: uppercase; letter-spacing: 0.06em; font-weight: 700; }
.ov-sec-badge { font-size: 0.65rem; padding: 2px 8px; border-radius: 4px; font-weight: 700; }
.badge-red { background: rgba(255,51,102,0.1); color: #ff3366; }
.badge-grn { background: rgba(0,255,136,0.08); color: #00ff88; }
.ov-sec-link { font-size: 0.72rem; color: #6b7a99; text-decoration: none; }
.ov-sec-link:hover { color: #00d9ff; }

/* ── Needs Attention ── */
.ov-attn { display: flex; align-items: center; gap: 12px; padding: 10px 14px; border-radius: 8px; margin-bottom: 4px; text-decoration: none; transition: all 0.15s; }
.ov-attn:hover { background: rgba(0,217,255,0.04); }
.ov-attn-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.ov-attn-dot.critical { background: #ff3366; box-shadow: 0 0 8px rgba(255,51,102,0.4); }
.ov-attn-dot.high { background: #f0ad4e; box-shadow: 0 0 6px rgba(240,173,78,0.3); }
.ov-attn-dot.medium { background: #00d9ff; }
.ov-attn-text { flex: 1; font-size: 0.85em; color: #e0e8f0; }
.ov-attn-action { font-size: 0.68em; color: #6b7a99; }
.ov-attn-go { color: #2a3050; }
.ov-attn-ok { text-align: center; padding: 16px; color: #00ff88; font-size: 0.85em; }

/* ── Device cards ── */
.ov-fleet { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 10px; }
.ov-dev {
    display: grid; grid-template-columns: 40px 1fr auto; align-items: center; gap: 12px;
    padding: 14px 16px; background: #0a0e20; border-radius: 8px; text-decoration: none;
    border: 1px solid transparent; transition: all 0.2s; cursor: pointer;
}
.ov-dev:hover { border-color: rgba(0,217,255,0.2); transform: translateY(-1px); box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
.ov-dev-icon { width: 40px; height: 40px; border-radius: 10px; background: #0f1628; border: 1px solid #1a2040; display: flex; align-items: center; justify-content: center; position: relative; }
.ov-dev-dot { position: absolute; bottom: -2px; right: -2px; width: 9px; height: 9px; border-radius: 50%; border: 2px solid #0a0e20; }
.ov-dev-dot-on { background: #00ff88; box-shadow: 0 0 6px rgba(0,255,136,0.4); }
.ov-dev-dot-off { background: #555; }
.ov-dev-info { min-width: 0; }
.ov-dev-name { font-size: 0.88em; font-weight: 700; color: #e0e8f0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.ov-dev-meta { font-size: 0.68em; color: #6b7a99; margin-top: 3px; display: flex; gap: 8px; align-items: center; }
.ov-dev-tag { font-size: 0.62em; padding: 1px 6px; border-radius: 3px; font-weight: 600; }
.ov-dev-tag-ok { color: #00ff88; background: rgba(0,255,136,0.06); }
.ov-dev-tag-warn { color: #f0ad4e; background: rgba(240,173,78,0.06); }
.ov-dev-tag-crit { color: #ff3366; background: rgba(255,51,102,0.06); }
.ov-dev-gauge { width: 40px; height: 40px; position: relative; }
.ov-dev-gauge svg { width: 100%; height: 100%; transform: rotate(-90deg); }
.ov-dev-gauge .bg { fill: none; stroke: #1e2a45; stroke-width: 3.5; }
.ov-dev-gauge .fg { fill: none; stroke-width: 3.5; stroke-linecap: round; }
.ov-dev-gauge-v { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); font-size: 0.62rem; font-weight: 700; }

/* ── Two col ── */
.ov-2col { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }

/* ── Kill chain ── */
.ov-kc { display: flex; gap: 4px; }
.ov-kc-s { flex: 1; text-align: center; padding: 8px 2px; border-radius: 6px; background: rgba(0,217,255,0.03); border: 1px solid transparent; transition: all 0.3s; }
.ov-kc-s.active { border-color: rgba(0,217,255,0.2); background: rgba(0,217,255,0.06); }
.ov-kc-s.hot { border-color: rgba(255,51,102,0.25); background: rgba(255,51,102,0.04); }
.ov-kc-name { display: block; font-size: 0.55rem; color: #6b7a99; text-transform: uppercase; }
.ov-kc-val { display: block; font-size: 0.95rem; font-weight: 700; color: #2a3050; margin-top: 2px; }
.ov-kc-s.active .ov-kc-val { color: #00d9ff; }
.ov-kc-s.hot .ov-kc-val { color: #ff3366; }

/* ── MITRE pills ── */
.ov-mt-grid { display: flex; flex-wrap: wrap; gap: 5px; }
.ov-mt { padding: 3px 8px; background: rgba(0,217,255,0.04); border: 1px solid #1a2040; border-radius: 4px; font-size: 0.7em; color: #00d9ff; font-family: monospace; cursor: help; transition: all 0.15s; }
.ov-mt:hover { background: rgba(0,217,255,0.12); border-color: #00d9ff44; }
.ov-mt span { color: #555; margin-left: 3px; }

/* ── Activity ── */
.ov-act-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 6px; }
.ov-act { display: flex; align-items: center; gap: 8px; padding: 5px 0; }
.ov-act-name { font-size: 0.73em; min-width: 120px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: #b4bcd0; }
.ov-act-bar { flex: 1; height: 8px; background: #0a0e27; border-radius: 2px; overflow: hidden; }
.ov-act-fill { height: 100%; border-radius: 2px; transition: width 0.4s; }
.ov-act-cnt { font-size: 0.65em; color: #6b7a99; min-width: 28px; text-align: right; }

/* ── Empty ── */
.ov-empty { text-align: center; padding: 80px 20px; }
.ov-empty h2 { font-size: 1.2em; color: #c8d6e5; margin-bottom: 6px; }
.ov-empty p { color: #6b7a99; margin-bottom: 18px; }
.ov-cta { display: inline-block; padding: 10px 22px; background: linear-gradient(135deg, #00b894, #00d9ff); color: #0a0e27; font-weight: 700; border-radius: 8px; text-decoration: none; }

/* ── Responsive ── */
@media (max-width: 900px) {
    .ov-globe-container { height: 360px; }
    .ov-globe-metrics { flex-wrap: wrap; top: auto; bottom: 50px; right: 12px; }
    .ov-2col { grid-template-columns: 1fr; }
    .ov-fleet { grid-template-columns: 1fr; }
}
@media (max-width: 600px) {
    .ov-globe-container { height: 280px; }
    .ov-posture-badge { padding: 10px 14px; }
    .ov-pb-label { font-size: 1rem; }
    .ov-kc { flex-wrap: wrap; }
}
</style>

<script nonce="{{ csp_nonce() }}">
(function() {
    'use strict';

    var globe = null;
    var deviceLat = null, deviceLon = null;
    var geoPointsCache = [];
    var fleetData = null;

    load();
    setInterval(function() { if (!document.hidden) load(); }, 25000);

    async function load() {
        try {
            // Try new overview API first, fall back to command center
            var r = await fetch('/dashboard/api/overview');
            var data = await r.json();
            if (!data.available) {
                r = await fetch('/dashboard/api/command-center/status');
                data = await r.json();
                if (!data.available || !data.devices || !data.devices.length) {
                    document.getElementById('ov-root').style.display = 'none';
                    document.getElementById('ov-empty').style.display = 'block';
                    return;
                }
                // Adapt shape
                data.posture = computePosture(data.last_24h.critical, data.last_24h.high);
                data.previous_24h = { total_events: 0, critical: 0 };
                data.mitre = { unique_techniques: (data.top_mitre_techniques || []).length, top: data.top_mitre_techniques || [] };
                data.signals = { active: 0 };
                data.needs_attention = [];
                data.devices.forEach(function(d) {
                    d.posture = computePosture(d.critical_count || 0, d.high_count || 0);
                });
            }
            fleetData = data;
            render(data);
        } catch(e) {
            document.getElementById('ov-root').style.display = 'none';
            document.getElementById('ov-empty').style.display = 'block';
        }
    }

    function computePosture(cr, hi) {
        cr = cr || 0; hi = hi || 0;
        if (cr === 0 && hi === 0) return { score: 100, label: 'All Clear', color: '#00ff88' };
        if (cr === 0 && hi <= 3) return { score: Math.max(70, 90 - hi * 5), label: 'Guarded', color: '#f0ad4e' };
        if (cr <= 5) return { score: Math.max(30, 60 - cr * 5 - hi * 2), label: 'Needs Attention', color: '#f0ad4e' };
        return { score: Math.max(5, 25 - cr), label: 'Critical', color: '#ff3366' };
    }

    function render(data) {
        var d = data.devices, f = data.fleet, ev = data.last_24h;
        var cats = data.top_categories || [];
        var mitre = data.mitre || { unique_techniques: 0, top: [] };
        var p = data.posture;
        var prev = data.previous_24h || {};
        var html = '';

        /* ═══ GLOBE SECTION (full width) ═══ */
        html += '<div class="ov-globe-section">';
        html += '<div class="ov-globe-container" id="ov-globe-container"></div>';
        html += '<div class="ov-globe-overlay">';

        // Posture badge — top-left
        html += '<div class="ov-posture-badge">';
        html += '<div class="ov-pb-label" style="color:' + p.color + '">' + p.label + '</div>';
        html += '<div class="ov-pb-score" style="color:' + p.color + '">' + p.score + ' / 100</div>';
        html += '<div class="ov-pb-events">' + fmtNum(ev.total_events) + ' events (24h)</div>';
        html += '</div>';

        // Metrics — top-right
        var critTrend = trend(ev.critical, prev.critical || 0, true);
        html += '<div class="ov-globe-metrics">';
        html += gMetric(f.online + '/' + f.total_devices, 'Devices', false, '');
        html += gMetric(ev.critical, 'Critical', ev.critical > 0, critTrend);
        html += gMetric(data.signals ? data.signals.active : 0, 'Signals', false, '');
        html += gMetric(mitre.unique_techniques, 'MITRE T-IDs', false, '');
        html += '</div>';

        // Controls — bottom-left
        html += '<div class="ov-globe-controls">';
        html += '<button class="ov-gc-btn active" id="gc-all">All</button>';
        html += '<button class="ov-gc-btn" id="gc-threats">Threats</button>';
        html += '<button class="ov-gc-btn" id="gc-rotate">Rotate</button>';
        html += '</div>';

        // Legend — bottom-right
        html += '<div class="ov-globe-legend">';
        html += '<span class="ov-gl"><span class="ov-gl-dot" style="background:#00ff88"></span>Clean</span>';
        html += '<span class="ov-gl"><span class="ov-gl-dot" style="background:#ff3366"></span>Threat</span>';
        html += '<span class="ov-gl"><span class="ov-gl-dot" style="background:#00d9ff"></span>Device</span>';
        html += '</div>';

        html += '</div>'; // overlay
        html += '</div>'; // globe section

        /* ═══ NLP SUMMARY ═══ */
        html += '<div class="ov-nlp" id="ov-nlp">';
        var nlp = 'In the last <strong>24 hours</strong>, your fleet of <strong>' + f.total_devices + ' device' + (f.total_devices !== 1 ? 's' : '') + '</strong> generated <strong>' + fmtNum(ev.total_events) + ' security events</strong>.';
        if (ev.critical > 0) nlp += ' <span class="warn">' + ev.critical + ' critical</span> and ' + (ev.high || 0) + ' high-risk events require attention.';
        else nlp += ' No critical threats detected &mdash; traffic appears clean.';
        html += nlp + '</div>';

        /* ═══ CONTENT BELOW GLOBE ═══ */
        html += '<div class="ov-content">';

        // Needs Attention
        var attn = data.needs_attention || [];
        if (attn.length === 0) {
            if (ev.critical > 0) attn.push({ severity: 'critical', text: ev.critical + ' critical events', action: 'Review now', link: '/dashboard/threats' });
            if (ev.high > 0) attn.push({ severity: 'high', text: ev.high + ' high-risk events', action: 'Investigate', link: '/dashboard/threats' });
            var offDev = d.filter(function(x) { return x.status !== 'online'; });
            if (offDev.length > 0) attn.push({ severity: 'medium', text: offDev.length + ' device' + (offDev.length > 1 ? 's' : '') + ' offline', action: 'Check', link: '/dashboard/devices' });
        }
        if (attn.length > 0) {
            html += '<div class="ov-sec"><div class="ov-sec-hdr"><span class="ov-sec-t">Needs Attention</span>';
            html += '<span class="ov-sec-badge badge-red">' + attn.length + ' item' + (attn.length > 1 ? 's' : '') + '</span></div>';
            for (var i = 0; i < Math.min(5, attn.length); i++) {
                var a = attn[i];
                html += '<a href="' + esc(a.link || '#') + '" class="ov-attn">'
                    + '<div class="ov-attn-dot ' + esc(a.severity) + '"></div>'
                    + '<div class="ov-attn-text">' + esc(a.text) + '</div>'
                    + '<div class="ov-attn-action">' + esc(a.action) + '</div>'
                    + '<div class="ov-attn-go">&#x203A;</div></a>';
            }
            html += '</div>';
        }

        // Personal Devices
        html += '<div class="ov-sec"><div class="ov-sec-hdr"><span class="ov-sec-t">Personal Devices</span>';
        html += '<a href="/dashboard/devices" class="ov-sec-link">View All &rarr;</a></div>';
        html += '<div class="ov-fleet">';
        for (var i = 0; i < d.length; i++) {
            var x = d[i], on = x.status === 'online';
            var cr = x.critical_count || 0, hi = x.high_count || 0;
            var dp = x.posture || computePosture(cr, hi);
            var gc = 2 * Math.PI * 14, go = gc * (1 - dp.score / 100);
            var tagCls = cr > 0 ? 'crit' : hi > 0 ? 'warn' : 'ok';
            var tagText = cr > 0 ? 'Critical' : hi > 0 ? 'High Risk' : 'Healthy';
            html += '<a href="/dashboard/device/' + encodeURIComponent(x.device_id) + '" class="ov-dev">'
                + '<div class="ov-dev-icon">' + osIcon(x.os) + '<div class="ov-dev-dot ov-dev-dot-' + (on ? 'on' : 'off') + '"></div></div>'
                + '<div class="ov-dev-info"><div class="ov-dev-name">' + esc(x.hostname) + '</div>'
                + '<div class="ov-dev-meta"><span class="ov-dev-tag ov-dev-tag-' + tagCls + '">' + tagText + '</span>'
                + '<span>' + (on ? 'Online' : 'Offline') + '</span>'
                + '<span>' + fmtNum(x.event_count || 0) + ' events</span></div></div>'
                + '<div class="ov-dev-gauge"><svg viewBox="0 0 36 36"><circle class="bg" cx="18" cy="18" r="14"/>'
                + '<circle class="fg" cx="18" cy="18" r="14" stroke="' + dp.color + '" stroke-dasharray="' + gc.toFixed(1) + '" stroke-dashoffset="' + go.toFixed(1) + '"/></svg>'
                + '<div class="ov-dev-gauge-v" style="color:' + dp.color + '">' + dp.score + '</div></div></a>';
        }
        html += '</div></div>';

        // Kill Chain + MITRE
        html += '<div class="ov-2col">';
        // Kill chain
        html += '<div class="ov-sec"><div class="ov-sec-t" style="margin-bottom:10px">Kill Chain Progression</div><div class="ov-kc">';
        var kcStages = ['Recon', 'Weapon', 'Deliver', 'Exploit', 'Install', 'C2', 'Action'];
        var kcMap = buildKillChain(cats);
        for (var k = 0; k < kcStages.length; k++) {
            var cnt = kcMap[k] || 0;
            var cls = cnt > 0 ? (cnt >= 5 ? 'hot' : 'active') : '';
            html += '<div class="ov-kc-s ' + cls + '"><span class="ov-kc-name">' + kcStages[k] + '</span><span class="ov-kc-val">' + fmtNum(cnt) + '</span></div>';
        }
        html += '</div></div>';
        // MITRE
        html += '<div class="ov-sec"><div class="ov-sec-t" style="margin-bottom:10px">MITRE ATT&CK (24h)</div>';
        if (mitre.top && mitre.top.length > 0) {
            html += '<div class="ov-mt-grid">';
            (mitre.top || []).forEach(function(m) {
                var t = m.technique || m; var c = m.count || '';
                html += '<span class="ov-mt" title="' + mitreName(t) + '">' + esc(t) + (c ? ' <span>' + c + '</span>' : '') + '</span>';
            });
            html += '</div>';
        } else { html += '<div style="color:#6b7a99;font-size:0.82em;">No detections</div>'; }
        html += '</div></div>';

        // Activity
        if (cats.length > 0) {
            html += '<div class="ov-sec"><div class="ov-sec-t" style="margin-bottom:10px">Top Activity (24h)</div><div class="ov-act-grid">';
            var maxC = cats[0].count;
            for (var i = 0; i < Math.min(8, cats.length); i++) {
                var c = cats[i], pct = Math.max(5, c.count / maxC * 100);
                var clr = c.avg_risk >= 0.6 ? '#ff3366' : c.avg_risk >= 0.3 ? '#f0ad4e' : '#00d9ff';
                html += '<div class="ov-act"><span class="ov-act-name">' + humanize(c.category) + '</span>'
                    + '<div class="ov-act-bar"><div class="ov-act-fill" style="width:' + pct + '%;background:' + clr + '"></div></div>'
                    + '<span class="ov-act-cnt">' + fmtNum(c.count) + '</span></div>';
            }
            html += '</div></div>';
        }

        html += '</div>'; // content

        document.getElementById('ov-root').innerHTML = html;

        // Init globe after DOM
        setTimeout(initGlobe, 100);

        // Bind globe controls
        setTimeout(bindControls, 200);
    }

    /* ── Globe ── */
    function initGlobe() {
        var container = document.getElementById('ov-globe-container');
        if (!container || typeof Globe === 'undefined' || globe) return;

        if (typeof THREE !== 'undefined' && THREE.TextureLoader) {
            var origLoad = THREE.TextureLoader.prototype.load;
            THREE.TextureLoader.prototype.load = function(url, onLoad, onProgress, onError) {
                this.crossOrigin = 'anonymous';
                return origLoad.call(this, url, onLoad, onProgress, onError);
            };
        }

        globe = Globe()(container)
            .backgroundColor('rgba(0,0,0,0)')
            .globeImageUrl('https://cdn.jsdelivr.net/npm/three-globe/example/img/earth-dark.jpg')
            .bumpImageUrl('https://cdn.jsdelivr.net/npm/three-globe/example/img/earth-topology.png')
            .backgroundImageUrl('https://cdn.jsdelivr.net/npm/three-globe/example/img/night-sky.png')
            .showAtmosphere(true)
            .atmosphereColor('#0099cc')
            .atmosphereAltitude(0.22)
            .width(container.clientWidth)
            .height(container.clientHeight || 520)
            .arcColor(function(d) { return d.color; })
            .arcStroke(function(d) { return d.stroke; })
            .arcAltitudeAutoScale(0.25)
            .arcDashLength(0.4)
            .arcDashGap(0.15)
            .arcDashAnimateTime(function(d) { return d.animTime; })
            .arcLabel(function(d) {
                return '<div style="background:rgba(5,8,22,0.96);border:1px solid ' + (d.threat ? 'rgba(255,51,102,0.35)' : 'rgba(0,217,255,0.25)') + ';border-radius:8px;padding:0.6rem 0.8rem;font-size:0.72rem;min-width:180px;box-shadow:0 8px 32px rgba(0,0,0,0.7);">'
                    + '<div style="display:flex;align-items:center;gap:0.3rem;margin-bottom:0.3rem;border-bottom:1px solid rgba(255,255,255,0.06);padding-bottom:0.3rem;">'
                    + '<span style="width:6px;height:6px;border-radius:50%;background:' + (d.threat ? '#ff3366' : '#00ff88') + ';"></span>'
                    + '<span style="font-weight:700;color:' + (d.threat ? '#ff3366' : '#e2e8f0') + ';">' + esc(d.asnOrg) + '</span></div>'
                    + '<div style="display:grid;grid-template-columns:auto 1fr;gap:0.1rem 0.6rem;font-size:0.68rem;">'
                    + '<span style="color:#6b7a99;">Location</span><span style="color:#e2e8f0;text-align:right;">' + esc(d.city ? d.city + ', ' + d.country : d.country) + '</span>'
                    + '<span style="color:#6b7a99;">Data</span><span style="color:#00d9ff;text-align:right;font-weight:600;">' + fmtBytes(d.bytes) + '</span>'
                    + '<span style="color:#6b7a99;">Flows</span><span style="color:#b4bcd0;text-align:right;">' + fmtNum(d.count) + '</span>'
                    + '</div></div>';
            })
            .pointColor(function(d) { return d.color; })
            .pointAltitude(function(d) { return d.alt; })
            .pointRadius(function(d) { return d.radius; })
            .pointLabel(function() { return null; })
            .ringsData([])
            .ringColor(function(d) { return function(t) { return d.threat ? 'rgba(255,51,102,' + Math.max(0, 0.5 - t * 0.5) + ')' : 'rgba(0,255,136,' + Math.max(0, 0.3 - t * 0.3) + ')'; }; })
            .ringMaxRadius(2.5)
            .ringPropagationSpeed(1.2)
            .ringRepeatPeriod(function(d) { return d.threat ? 1400 : 2800; })
            .htmlElementsData([])
            .htmlElement(function(d) {
                var el = document.createElement('div');
                el.style.cssText = 'pointer-events:none;text-align:center;transform:translateX(-50%);';
                if (d.isDevice) {
                    el.innerHTML = '<div style="font-size:0.65rem;font-weight:700;color:#00d9ff;text-shadow:0 0 8px rgba(0,217,255,0.6),0 1px 3px rgba(0,0,0,1);white-space:nowrap;">' + esc(d.name) + '</div>'
                        + '<div style="font-size:0.5rem;color:#6b9abf;white-space:nowrap;text-shadow:0 1px 3px rgba(0,0,0,1);">' + esc(d.loc || '') + '</div>';
                } else {
                    var nc = d.threat ? '#ff6688' : '#c8d8e8';
                    el.innerHTML = '<div style="font-size:0.58rem;font-weight:600;color:' + nc + ';white-space:nowrap;text-shadow:0 0 4px rgba(0,0,0,1),0 1px 3px rgba(0,0,0,1);">' + esc((d.asnOrg || '').split(/[\s,]/)[0]) + '</div>'
                        + '<div style="font-size:0.48rem;color:#7a9ab8;white-space:nowrap;text-shadow:0 1px 3px rgba(0,0,0,1);">' + esc(d.country || '') + ' &middot; ' + fmtBytes(d.bytes || 0) + '</div>';
                }
                return el;
            })
            .htmlAltitude(function(d) { return d.isDevice ? 0.045 : 0.025; })
            .onArcClick(function(d) {
                globe.pointOfView({ lat: d.endLat, lng: d.endLng, altitude: 1.3 }, 1000);
            });

        // Globe material polish
        globe.onGlobeReady(function() {
            var mat = globe.globeMaterial();
            mat.bumpScale = 3;
            if (typeof THREE !== 'undefined') {
                mat.emissive = new THREE.Color('#071530');
                mat.emissiveIntensity = 0.1;
            }
        });

        globe.controls().autoRotate = true;
        globe.controls().autoRotateSpeed = 0.4;
        globe.controls().enableDamping = true;
        globe.controls().dampingFactor = 0.12;
        globe.controls().rotateSpeed = 0.6;
        globe.controls().zoomSpeed = 0.8;
        globe.controls().minDistance = 120;
        globe.controls().maxDistance = 500;
        globe.pointOfView({ lat: 32, lng: -90, altitude: 2.0 }, 0);

        window.addEventListener('resize', function() {
            if (globe && container.clientWidth) globe.width(container.clientWidth).height(container.clientHeight || 520);
        });

        loadGlobeData();
    }

    function loadGlobeData() {
        fetch('/dashboard/api/network/device-location')
            .then(function(r) { return r.json(); })
            .then(function(d) { if (d.lat && d.lon) { deviceLat = d.lat; deviceLon = d.lon; } })
            .catch(function() {});

        fetch('/dashboard/api/overview/geo-points?hours=24&limit=300')
            .then(function(r) { return r.json(); })
            .then(function(points) {
                geoPointsCache = points;
                if (globe && Array.isArray(points) && points.length > 0) renderGlobeArcs(points);
            })
            .catch(function() {});
    }

    function renderGlobeArcs(points) {
        var srcLat = deviceLat || 33.45, srcLon = deviceLon || -112.07;
        var arcs = [], pts = [], rings = [], labels = [];
        var maxBytes = Math.max(1, Math.max.apply(null, points.map(function(p) { return p.bytes || 1; })));

        // Device marker
        pts.push({ lat: srcLat, lng: srcLon, color: '#00d9ff', alt: 0.025, radius: 0.7 });
        rings.push({ lat: srcLat, lng: srcLon, threat: false });
        labels.push({ lat: srcLat, lng: srcLon, isDevice: true, name: 'YOUR FLEET', loc: '' });

        points.forEach(function(p) {
            if (!p.lat || !p.lon) return;
            var isThreat = !!p.threat;
            var bytes = p.bytes || 0;
            var volRatio = bytes / maxBytes;
            var sw = 0.3 + volRatio * 2.5;
            var speed = isThreat ? 900 : Math.round(3500 - volRatio * 2500);

            arcs.push({
                startLat: srcLat, startLng: srcLon, endLat: p.lat, endLng: p.lon,
                color: isThreat ? ['rgba(255,51,102,0.85)', 'rgba(255,51,102,0.35)'] : ['rgba(0,217,255,0.45)', 'rgba(0,255,136,0.20)'],
                stroke: sw, animTime: speed, threat: isThreat,
                asnOrg: p.asn_org || 'Unknown', city: p.city || '', country: p.country || '',
                bytes: bytes, count: p.count || 1,
            });
            pts.push({ lat: p.lat, lng: p.lon, color: isThreat ? '#ff3366' : 'rgba(0,255,136,0.6)', alt: 0.01, radius: Math.max(0.2, Math.min(0.6, volRatio * 0.8)) });
            if (isThreat) rings.push({ lat: p.lat, lng: p.lon, threat: true });

            // Labels for top destinations
            if (volRatio > 0.05 || isThreat) {
                labels.push({ lat: p.lat, lng: p.lon, isDevice: false, asnOrg: p.asn_org, country: p.country, city: p.city, bytes: bytes, threat: isThreat });
            }
        });

        globe.arcsData(arcs).pointsData(pts).ringsData(rings).htmlElementsData(labels);
    }

    function bindControls() {
        var rotateBtn = document.getElementById('gc-rotate');
        if (rotateBtn) {
            rotateBtn.addEventListener('click', function() {
                if (!globe) return;
                var c = globe.controls();
                c.autoRotate = !c.autoRotate;
                rotateBtn.classList.toggle('active', c.autoRotate);
            });
        }
        var allBtn = document.getElementById('gc-all');
        var threatsBtn = document.getElementById('gc-threats');
        if (allBtn) allBtn.addEventListener('click', function() {
            allBtn.classList.add('active'); if (threatsBtn) threatsBtn.classList.remove('active');
            renderGlobeArcs(geoPointsCache);
        });
        if (threatsBtn) threatsBtn.addEventListener('click', function() {
            threatsBtn.classList.add('active'); if (allBtn) allBtn.classList.remove('active');
            renderGlobeArcs(geoPointsCache.filter(function(p) { return p.threat; }));
        });
    }

    /* ── Helpers ── */
    function gMetric(val, label, isDanger, trendHtml) {
        return '<div class="ov-gm"><div class="ov-gm-val' + (isDanger ? ' danger' : '') + '">' + val + '</div>'
            + '<div class="ov-gm-lbl">' + label + '</div>'
            + (trendHtml ? '<div class="ov-gm-trend">' + trendHtml + '</div>' : '') + '</div>';
    }
    function trend(curr, prev, higherIsBad) {
        if (prev === 0 && curr === 0) return '<span class="trend-flat">&mdash;</span>';
        var diff = curr - prev;
        if (diff > 0) return '<span class="' + (higherIsBad ? 'trend-up' : 'trend-down') + '">&uarr;' + diff + '</span>';
        if (diff < 0) return '<span class="' + (higherIsBad ? 'trend-down' : 'trend-up') + '">&darr;' + Math.abs(diff) + '</span>';
        return '<span class="trend-flat">&mdash;</span>';
    }
    function buildKillChain(cats) {
        var map = { 'topology_new_route':0,'port_scan_detected':0,'arp_new_host':0, 'lolbin_execution':1,'credential_access_indirect':1,'credential_theft_command':1, 'new_external_connection':2,'new_domain_first_seen':2, 'process_spawned':3,'tcc_permission_denied':3,'suspicious_script':3,'execution_from_temp':3,'gatekeeper_block':3, 'macos_config_backdoor_new':4,'macos_launchagent_new':4,'macos_launchdaemon_new':4, 'c2_beacon_suspect':5,'dns_beaconing_suspected':5,'dns_beaconing_detected':5,'connection_burst_detected':5,'long_lived_connection':5, 'exfil_spike':6,'full_kill_chain':6,'cloud_exfil_detected':6,'execute_to_exfil':6 };
        var counts = {};
        (cats || []).forEach(function(c) { var s = map[c.category]; if (s !== undefined) counts[s] = (counts[s] || 0) + c.count; });
        return counts;
    }
    function humanize(s) {
        if (!s) return '';
        var m = { 'process_spawned':'Process Exec','lolbin_execution':'Suspicious Binary','new_external_connection':'External Conn','tcc_permission_denied':'Perm Denied','exfil_spike':'Data Exfil','macos_config_backdoor_new':'Config Backdoor','c2_beacon_suspect':'C2 Beacon','dns_beaconing_suspected':'DNS Beacon','dns_beaconing_detected':'DNS Beacon','full_kill_chain':'Kill Chain','cloud_exfil_detected':'Cloud Exfil','new_domain_first_seen':'New Domain' };
        return m[s] || s.replace(/_/g,' ').replace(/\b\w/g, function(c) { return c.toUpperCase(); });
    }
    function mitreName(id) {
        var n = { 'T1059':'Command & Scripting','T1204':'User Execution','T1071':'App Layer Protocol','T1071.004':'DNS','T1059.002':'AppleScript','T1218':'System Binary Proxy','T1548':'Elevation Control','T1583':'Acquire Infrastructure','T1048':'Alt Protocol Exfil','T1568.002':'DNS Calc','T1567':'Web Service Exfil' };
        return n[id] || id;
    }
    function osIcon(os) {
        os = (os || '').toLowerCase();
        if (os.includes('darwin') || os.includes('mac')) return '<svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M18.7 8.5c-.1.1-2.1 1.2-2.1 3.7 0 2.9 2.5 3.9 2.6 3.9 0 .1-.4 1.4-1.3 2.7-.8 1.2-1.7 2.4-3 2.4s-1.6-.8-3.1-.8-1.9.8-3.1.8-2-.7-2.9-2.4C4.6 16.7 3.7 14 3.7 11.4c0-3.5 2.3-5.4 4.5-5.4 1.2 0 2.2.8 2.9.8.7 0 1.9-.8 3.3-.8.5 0 2.4 0 3.6 1.8l.7.7z" stroke="#6b7a99" stroke-width="1.2"/><circle cx="15" cy="4" r="1.5" fill="#6b7a99" opacity="0.5"/></svg>';
        if (os.includes('linux')) return '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#6b7a99" stroke-width="1.2"><circle cx="12" cy="8" r="4"/><path d="M8 14c-2 1-3 3-3 5h14c0-2-1-4-3-5"/></svg>';
        return '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#6b7a99" stroke-width="1.5"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>';
    }
    function fmtNum(n) { if (n >= 1e6) return (n/1e6).toFixed(1) + 'M'; if (n >= 1e3) return (n/1e3).toFixed(1) + 'K'; return String(n); }
    function fmtBytes(b) { if (b >= 1e12) return (b/1e12).toFixed(1) + ' TB'; if (b >= 1e9) return (b/1e9).toFixed(1) + ' GB'; if (b >= 1e6) return (b/1e6).toFixed(1) + ' MB'; if (b >= 1e3) return (b/1e3).toFixed(0) + ' KB'; return b + ' B'; }
    function esc(s) { if (!s) return ''; var d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
})();
</script>
{% endblock %}
